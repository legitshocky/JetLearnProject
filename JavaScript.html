            if(totalPayableEl) totalPayableEl.value = '';
            if(amountPaidEl) amountPaidEl.value = '';
            if(balanceDueEl) balanceDueEl.value = '';
            return;
        }

        const pricingDetails = calculateInvoicePricingClient(formData);
        const isInstallment = document.getElementById('onboardingParentPaymentInstallment').checked;
        const numInstallments = parseInt(document.getElementById('onboardingParentNumberOfInstallments').value) || 1;
        
        let amountPaid = parseFloat(formData.customPaidAmount) || 0;
        
        // If partial payment is not entered, calculate based on payment type
        if (amountPaid === 0) {
            if (isInstallment && numInstallments > 0) {
                // This is the first installment amount
                amountPaid = pricingDetails.finalTotal / numInstallments;
            } else {
                // Upfront, so amount paid is the full amount
                amountPaid = pricingDetails.finalTotal;
            }
        }

        const balanceDue = pricingDetails.finalTotal - amountPaid;

        if(totalPayableEl) totalPayableEl.value = `${pricingDetails.currencySymbol}${pricingDetails.finalTotal.toFixed(2)}`;
        if(amountPaidEl) amountPaidEl.value = `${pricingDetails.currencySymbol}${amountPaid.toFixed(2)}`;
        if(balanceDueEl) balanceDueEl.value = `${pricingDetails.currencySymbol}${balanceDue.toFixed(2)}`;
        
        // Update label
        const amountPaidLabel = document.getElementById('onboardingParentAmountPaidLabel');
        if (amountPaidLabel) {
            amountPaidLabel.textContent = isInstallment ? 'Amount Paid / Installment' : 'Amount Paid';
        }

        // Force set colors
        if(totalPayableEl) totalPayableEl.style.setProperty('color', 'var(--primary)', 'important');
        if(amountPaidEl) amountPaidEl.style.setProperty('color', 'var(--success)', 'important');
        if (balanceDueEl) {
            if (balanceDue > 0) {
                balanceDueEl.style.setProperty('color', 'var(--danger)', 'important');
            } else {
                balanceDueEl.style.setProperty('color', 'var(--success)', 'important');
            }
        }
    }



    function updateParentOnboardingPlanDetails() {
        const planName = onboardingParentPlanName.value;
        const startDateString = onboardingParentStartDate.value;
        const userSelectedTenureMonths = parseInt(onboardingParentSubscriptionTenure.value || '0');
        const previousPlanName = onboardingParentPlanName.dataset.previousPlanName;
        const planChanged = planName !== previousPlanName;
        onboardingParentPlanName.dataset.previousPlanName = planName;

        if (!startDateString) { // Bug fix: Prevent error on empty date
            calculateAndDisplayParentOnboardingTotal();
            return;
        }

        if (planChanged || userSelectedTenureMonths !== parseInt(onboardingParentSubscriptionTenure.dataset.previousTenure || '0')) {
            isParentInvoiceEndDateManuallySet = false;
        }
        onboardingParentSubscriptionTenure.dataset.previousTenure = userSelectedTenureMonths;

        handleCurrencyChange('onboardingParent');

        const selectedPlan = globalInvoiceProducts.find(p => p['Plan Name'] === planName);
        if (selectedPlan) {
            if (!isParentInvoiceEndDateManuallySet) {
                 const freeClasses = parseInt(onboardingParentFreeClasses.value || '0');
                 const currentSessionsPerWeekCount = parseInt((onboardingParentSessionsPerWeek.value || '0 Session/week').split(' ')[0]);
                 const fixedClassesPerPlan = parseInt(selectedPlan['Fixed Classes'] || '0');

                 let totalClasses = (fixedClassesPerPlan > 0)
                    ? fixedClassesPerPlan + freeClasses
                    : (userSelectedTenureMonths * 4 * currentSessionsPerWeekCount) + freeClasses;
                
                 totalClasses = Math.max(0, totalClasses);
                 let weeksRequired = (currentSessionsPerWeekCount > 0) ? Math.ceil(totalClasses / currentSessionsPerWeekCount) : (totalClasses > 0 ? totalClasses : 0);
                 
                 const startDate = new Date(startDateString);
                 if (!isNaN(startDate)) { // Bug fix: Check for valid date before calculation
                    const endDate = new Date(startDate);
                    if (weeksRequired > 0) {
                        endDate.setDate(startDate.getDate() + (weeksRequired * 7) - 1);
                    }
                    onboardingParentEndDate.value = endDate.toISOString().split('T')[0];
                 }
            }
        }
        calculateAndDisplayParentOnboardingTotal();
    }

    // Add event listeners to trigger calculations on the parent onboarding tab
    const parentOnboardingCalcFields = [
        onboardingParentPlanName, onboardingParentSubscriptionTenure, onboardingParentStartDate,
        onboardingParentSessionsPerWeek, onboardingParentFreeClasses, onboardingParentDiscount,
        onboardingParentPartialPayment, onboardingParentCurrency,
        document.getElementById('onboardingParentCustomCurrencyCode'),
        document.getElementById('onboardingParentCustomCurrencyRate'),
        document.getElementById('onboardingParentCustomCurrencyExtraDiscountPercentage'),
        document.getElementById('onboardingParentNumberOfInstallments') // <-- ADD THIS LINE

    ];

    parentOnboardingCalcFields.forEach(el => {
        if (el) {
            el.addEventListener('change', updateParentOnboardingPlanDetails);
            el.addEventListener('input', updateParentOnboardingPlanDetails);
        }
    });

    onboardingParentEndDate.addEventListener('input', () => {
        isParentInvoiceEndDateManuallySet = true;
        calculateAndDisplayParentOnboardingTotal();
    });

function loadTeacherLoadPage() {
    const inputEl = document.getElementById('hsTeacherSearchInput');
    const listEl  = document.getElementById('hsTeacherOptionsList');

    if (!inputEl || !listEl) return;

    // Wire up persona status filter dropdown
    const filterEl = document.getElementById('personaStatusFilter');
    if (filterEl) filterEl.onchange = function() { renderPersonaTable(); };

    // Fetch full teacher details if cache is empty
    if (allTeacherDetailsCache.length === 0) {
        showLoading('Loading teacher directory...');
        google.script.run
            .withSuccessHandler(function(teachers) {
                hideLoading();
                allTeacherDetailsCache = teachers || [];
                globalTeacherDataList  = allTeacherDetailsCache.map(function(t) { return t.name || t; });
                renderTeacherOptions(globalTeacherDataList);
            })
            .withFailureHandler(function(err) { hideLoading(); showError(err); })
            .getTeacherDetailsForTable();
    } else {
        globalTeacherDataList = allTeacherDetailsCache.map(function(t) { return t.name || t; });
        renderTeacherOptions(globalTeacherDataList);
    }

    // Show list on focus
    inputEl.addEventListener('focus', function() { listEl.classList.add('show'); });

    // Filter as you type
    inputEl.addEventListener('input', function() {
        var searchTerm = this.value.toLowerCase();
        var filtered   = globalTeacherDataList.filter(function(t) { return t.toLowerCase().includes(searchTerm); });
        renderTeacherOptions(filtered);
        listEl.classList.add('show');
    });

    // Close when clicking outside
    document.addEventListener('click', function(e) {
        if (!inputEl.contains(e.target) && !listEl.contains(e.target)) {
            listEl.classList.remove('show');
        }
    });
}


// Helper to render the HTML list
function renderTeacherOptions(teachers) {
    const listEl = document.getElementById('hsTeacherOptionsList');
    const inputEl = document.getElementById('hsTeacherSearchInput');
    
    if (!listEl) return;
    listEl.innerHTML = ''; 

    // SAFETY FIX: Default to empty array if null
    const safeList = teachers || []; 

    if (safeList.length === 0) {
        listEl.innerHTML = '<div class="hs-option" style="color:#999; cursor:default;">No teachers found</div>';
        return;
    }

    safeList.forEach(teacherName => {
        const div = document.createElement('div');
        div.className = 'hs-option';

    // =============================================
    // SESSION TIMEOUT
    // =============================================
    const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 minutes
    const WARNING_BEFORE_MS  =  2 * 60 * 1000; // warn 2 mins before
    let sessionTimer = null;
    let sessionWarningTimer = null;

    function resetSessionTimer() {
        if (!currentUser) return;
        clearTimeout(sessionTimer);
        clearTimeout(sessionWarningTimer);

        sessionWarningTimer = setTimeout(() => {
            if (!currentUser) return;
            showToast('warning', 'Session Expiring', 'You will be logged out in 2 minutes due to inactivity.', 10000);
        }, SESSION_TIMEOUT_MS - WARNING_BEFORE_MS);

        sessionTimer = setTimeout(() => {
            if (!currentUser) return;
          currentUser = null;
          sessionStorage.removeItem('currentUser');
          stopPolling();
          stopSessionTimer();
          appContainer.style.display = 'none';
            loginPage.style.display = 'flex';
            switchLoginView('loginView');
            loginForm.reset();
            const inactivityMsg = document.getElementById('inactivityMessage');
            if (inactivityMsg) inactivityMsg.style.display = 'flex';
            showToast('warning', 'Session Expired', 'You have been logged out due to inactivity.');
        }, SESSION_TIMEOUT_MS);
    }

    function startSessionTimer() {
        ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(event => {
            document.addEventListener(event, resetSessionTimer, { passive: true });
        });
        resetSessionTimer();
    }

    function stopSessionTimer() {
        clearTimeout(sessionTimer);
        clearTimeout(sessionWarningTimer);
        ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(event => {
            document.removeEventListener(event, resetSessionTimer);
        });
    }

    
function populateInvoiceFormWithAIPlan(plan) {
    if (plan.aiReasoning) {
        showToast('info', 'AI Agent Reasoning', plan.aiReasoning, 10000);
    }
    
    // Helper to safely set values on form elements
    const setValue = (element, value) => {
        if (element && value !== undefined && value !== null) {
            if (element.tagName === 'SELECT') {
                if ([...element.options].some(opt => opt.value === value)) {
                    element.value = value;
                } else {
                    console.warn(`Value "${value}" not found in select element #${element.id}. Creating and selecting it.`);
                    const newOption = new Option(value, value, true, true);
                    element.appendChild(newOption);
                }
            } else {
                element.value = value;
            }
        }
    };

    // --- POPULATE ALL FIELDS ---
    setValue(invoiceLearnerName, plan.learnerName);
    setValue(invoiceParentName, plan.parentName);
    setValue(invoiceParentEmail, plan.parentEmail);
    setValue(invoiceParentContact, plan.parentContact);
    setValue(invoicePlanName, plan.planName);
    setValue(invoiceCurrency, plan.currency);
    setValue(invoiceSessionsPerWeek, plan.sessionsPerWeek);
    setValue(invoiceDiscount, plan.discount);
    setValue(invoiceSubscriptionTenure, plan.subscriptionTenure);
    
    // Handle dates
    if (plan.startDate) {
        invoiceStartDate.value = plan.startDate;
    }
     if (plan.endDate) {
        invoiceEndDate.value = plan.endDate;
        isInvoiceEndDateManuallySet = true; // Mark that AI has set this
    }

    // Handle payment type and complex installments
    if (plan.paymentType === 'Installment' && plan.installments && plan.installments.length > 0) {
        paymentInstallment.checked = true;
        installmentOptionsGroup.style.display = 'block';
        invoiceNumberOfInstallments.value = plan.installments.length;

        // Check for uneven installments
        const firstAmount = plan.installments[0].amount;
        const isUneven = plan.installments.some(inst => inst.amount !== firstAmount);
        
        if (isUneven) {
            showToast('warning', 'Uneven Installments Detected', 'The AI generated a custom installment plan. The UI will show an even split, but the final PDF will be correct if generated now.', 12000);
            invoiceCustomPaidAmount.value = plan.finalPayable;
        } else {
            invoiceCustomPaidAmount.value = '';
        }

        if (plan.installments[0].dueDate) {
            document.getElementById('invoiceFirstPaymentDate').value = plan.installments[0].dueDate;
        }

    } else { // Handle Upfront payment
        paymentUpfront.checked = true;
        installmentOptionsGroup.style.display = 'none';
        invoiceCustomPaidAmount.value = plan.finalPayable || '';
    }

    // Trigger the UI to update all calculated totals
    updateInvoicePlanDetails();
}

    // ===================================
    // === DEFINITIVE ERROR HANDLER V2 ===
    // ===================================
    function showError(error) {
        hideLoading();
        console.error('Client-side: GAS Error caught by handler:', error);
        
        // Default message in case the error object is completely unreadable
        let errorMessage = 'An unexpected server error occurred. The server may have returned a null response.';
        
        if (error) {
            // Case 1: Handle Google Apps Script's complex error object format
            if (typeof error.message === 'string' && error.message.includes("Error in protected function")) {
                // Try to get the deeper, more specific cause of the error
                if (error.cause && error.cause.message) {
                    errorMessage = error.cause.message;
                } else {
                    errorMessage = error.message; // Fallback to the generic wrapper message
                }
            } 
            // Case 2: Handle the simple { message: '...' } object created in server-side code
            else if (typeof error.message === 'string') {
                errorMessage = error.message;
            } 
            // Case 3: Handle plain string errors
            else if (typeof error === 'string') {
                errorMessage = error;
            } 
            // Case 4: Fallback for other non-null object types
            else if (typeof error === 'object') {
                try {
                    // Try to stringify for debugging, but provide a user-friendly message
                    console.error("Full error object:", JSON.stringify(error));
                    errorMessage = "An complex error object was received. Check console for details.";
                } catch (e) {
                    errorMessage = 'An unreadable error object was received from the server.';
                }
            }
        }
        
        // Display the final, processed error message to the user
        showToast('error', 'System Error', errorMessage);
    }

function recalcRenewalTotals(e) {
        const unit = parseFloat(document.getElementById('renewalUnitPrice').value) || 0;
        const discInput = document.getElementById('renewalDiscount');
        const netInput = document.getElementById('renewalNetPrice');
        
        if (e && e.target.id === 'renewalNetPrice') {
            const net = parseFloat(netInput.value) || 0;
            discInput.value = (unit - net).toFixed(2);
        } else {
            const disc = parseFloat(discInput.value) || 0;
            netInput.value = (unit - disc).toFixed(2);
        }
    }

    function renderMigrationIntelPanel(result) {
      var panel = document.getElementById('migrationIntelPanel');
      if (!panel) return;
      panel.style.display = 'block';

      var bannerContainer = document.getElementById('migrationAlertBanners');
      bannerContainer.innerHTML = '';

      if (!result || !result.success) {
        bannerContainer.innerHTML =
          '<div style="padding:0.6rem 1rem;background:#fef2f2;border:1px solid #fca5a5;border-radius:6px;color:#b91c1c;font-size:0.83rem;">'
          + '<i class="fas fa-exclamation-circle" style="margin-right:6px;"></i>'
          + escapeHtml((result && result.message) ? result.message : 'Could not retrieve intelligence.') + '</div>';
        return;
      }

      // Alert banners
      var levelStyles = {
        danger:  { bg:'#fef2f2', border:'#fca5a5', color:'#b91c1c', icon:'fas fa-exclamation-triangle' },
        warning: { bg:'#fffbeb', border:'#fcd34d', color:'#92400e', icon:'fas fa-exclamation-circle' },
        info:    { bg:'#eff6ff', border:'#93c5fd', color:'#1e40af', icon:'fas fa-info-circle' },
        success: { bg:'#f0fdf4', border:'#86efac', color:'#15803d', icon:'fas fa-heart' }
      };

      if (result.alerts && result.alerts.length > 0) {
        result.alerts.forEach(function(alert) {
          var s = levelStyles[alert.level] || levelStyles.info;
          var iconClass = alert.icon ? 'fas fa-' + alert.icon : s.icon;
          bannerContainer.innerHTML +=
            '<div style="padding:0.65rem 1rem;background:' + s.bg + ';border:1px solid ' + s.border + ';border-radius:6px;color:' + s.color + ';font-size:0.84rem;">'
            + '<i class="' + iconClass + '" style="margin-right:7px;"></i>' + escapeHtml(alert.message) + '</div>';
        });
      } else {
        bannerContainer.innerHTML =
          '<div style="padding:0.65rem 1rem;background:#f0fdf4;border:1px solid #86efac;border-radius:6px;color:#15803d;font-size:0.84rem;">'
          + '<i class="fas fa-check-circle" style="margin-right:7px;"></i>No alerts — this looks like a safe migration.</div>';
      }

      // Frequency counts
      var set = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };
      set('mip_count30', result.migrationCount30d != null ? result.migrationCount30d : '—');
      set('mip_count60', result.migrationCount60d != null ? result.migrationCount60d : '—');
      set('mip_count90', result.migrationCount90d != null ? result.migrationCount90d : '—');
      set('mip_total',   result.totalMigrations   != null ? result.totalMigrations   : '—');

      // Last migration
      var lastDate = result.lastMigrationDate
        ? new Date(result.lastMigrationDate).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'})
        : '—';
      set('mip_lastDate',   lastDate);
      set('mip_lastReason', result.lastMigrationReason || '—');

      // Risk badge
      var riskEl = document.getElementById('mip_riskBadge');
      if (riskEl) {
        var risk = (result.riskLevel || 'Unknown').toLowerCase();

    function renderEmailActivitiesTable(response) {

            return;
        }

        const { data, pagination } = response;

            tableBody.innerHTML = '<tr><td colspan="5" style="text-align: center;">No email activities found.</td></tr>';

            return;
        }

        data.forEach(log => {

            switch(log.Status) {
                case 'Opened': statusBadge = `<span class="status-badge status-success">Opened on ${new Date(log.OpenedAt).toLocaleDateString()}</span>`; break;
                case 'Replied': statusBadge = `<span class="status-badge status-info">Replied on ${new Date(log.RepliedAt).toLocaleDateString()}</span>`; break;
                case 'Failed': statusBadge = `<span class="status-badge status-failed">Failed</span>`; break;
                default: statusBadge = `<span class="status-badge status-skipped">Sent</span>`;
            }
            const tr = `
                <tr>
                    <td>${new Date(log.SentAt).toLocaleString()}</td>
                    <td>${log.Recipient}</td>
                    <td>${log.Subject}</td>
                    <td>${statusBadge}</td>
                    <td><button class="btn btn-outline btn-sm" onclick="viewEmailActivityDetails('${log.TrackingID}')">View Details</button></td>
                </tr>
            `;
            tableBody.innerHTML += tr;
        });

        // Pagination
        document.getElementById('emailActivitiesPagination').style.display = 'flex';
        document.getElementById('emailStartItem').textContent = (pagination.currentPage - 1) * pagination.pageSize + 1;
        document.getElementById('emailEndItem').textContent = (pagination.currentPage - 1) * pagination.pageSize + data.length;
        document.getElementById('emailTotalItems').textContent = pagination.totalItems;
        document.getElementById('emailPageNumberDisplay').textContent = pagination.currentPage;
        document.getElementById('emailPrevPage').disabled = pagination.currentPage <= 1;
        document.getElementById('emailNextPage').disabled = pagination.currentPage >= pagination.totalPages;
    }

                    learnerInput.value = data.learnerName;

                    if(globalTz) globalTz.value = parentTz;

                    const visibleSelects = document.querySelectorAll('.class-timezone-select');
                    
                    visibleSelects.forEach(select => {
                        // Try to set the value
                        select.value = parentTz;

                        if (select.value === "" && parentTz !== "") {

                        addOptionIfNotExists(migrationCourseSelect, data.course);

                    }

                    if (reasonOfMigrationSelect && data.migrationReason) {

                        reasonOfMigrationSelect.value = data.migrationReason;
                        
                        // --- ADD THIS LINE HERE ---
                        // This forces the WATI Template logic to run immediately
                        reasonOfMigrationSelect.dispatchEvent(new Event('change'));
                        // --------------------------
                    }

                    if (clsManagerSelect) clsManagerSelect.value = data.clsManagerName || '';
                    if (jetGuideSelect) jetGuideSelect.value = data.jetGuideName || '';

                    // 3. Populate Teachers
                    if (oldTeacherSelect && data.currentTeacher) {
                        addOptionIfNotExists(oldTeacherSelect, data.currentTeacher);
                        oldTeacherSelect.value = data.currentTeacher;
                    }
                    if (newTeacherSelect && data.newTeacher) {
                        addOptionIfNotExists(newTeacherSelect, data.newTeacher);
                        newTeacherSelect.value = data.newTeacher;
                    }

                    // 4. Populate Schedule from Ticket (if available)
                    classSessionsContainer.innerHTML = '';
                    if (data.ticketSchedule && (data.ticketSchedule.day || data.ticketSchedule.time)) {
                        const newGroup = createClassSessionGroup(true, 'migration');
                        classSessionsContainer.appendChild(newGroup);
                        
                        if(data.ticketSchedule.day) {
                             const daySelect = newGroup.querySelector('.class-day-select');
                             const dayVal = data.ticketSchedule.day.trim();
                             if([...daySelect.options].some(o => o.value === dayVal)) daySelect.value = dayVal;
                        }
                        if(data.ticketSchedule.time) {
                            const t = data.ticketSchedule.time.toUpperCase();
                            const match = t.match(/(\d+)/);
                            if(match) newGroup.querySelector('.class-hour-select').value = match[0].padStart(2,'0');

                            newGroup.querySelector('.class-meridiem-select').value = t.includes('AM') ? 'AM' : 'PM';
                        }
                    } else {

                        classSessionsContainer.appendChild(createClassSessionGroup(true, 'migration'));
                    }

                    // Re-apply timezone to the newly created row (just in case)
                    const refreshedSelects = document.querySelectorAll('.class-timezone-select');
                    refreshedSelects.forEach(select => {
                        select.value = parentTz;

// 2. Helper to add missing teachers to dropdowns dynamically
function addOptionIfNotExists(selectElement, value) {
    if (!value) return;
    // Check if option exists (case-insensitive check is safer)
    const exists = Array.from(selectElement.options).some(o => o.value.toLowerCase() === value.toLowerCase());
    
    if (!exists) {
        const newOpt = document.createElement('option');
        newOpt.value = value;
        newOpt.textContent = value;
        selectElement.appendChild(newOpt);
        console.log(`Added dynamic teacher option: ${value}`);
    }
}

// Helper to copy text from an input field
function copyToClipboard(elementId) {
    const copyText = document.getElementById(elementId);
    copyText.select();
    copyText.setSelectionRange(0, 99999); // For mobile devices
    navigator.clipboard.writeText(copyText.value).then(() => {
        showToast('success', 'Copied!', 'Text copied to clipboard.');
    });
}

function fillRenewalFinancials(item) {
    // Plan Name
    const planSelect = document.getElementById('renewalPlanName');
    planSelect.innerHTML = `<option value="${item.name}" selected>${item.name}</option>`;

    // Financials
    document.getElementById('renewalUnitPrice').value = item.unitPrice || 0;
    document.getElementById('renewalDiscount').value = item.discount || 0;
    document.getElementById('renewalNetPrice').value = item.netPrice || 0;
    
    // Payment Date
    const dateInput = document.getElementById('renewalPaymentDate');
    if (item.paymentDate) {
        dateInput.value = item.paymentDate; 
    } else {
        dateInput.valueAsDate = new Date();
    }

    // Payment Type Logic
    const type = (item.paymentType || '').toLowerCase();
    
    if (type.includes('installment')) {
        const instRadio = document.getElementById('renewalPayInstallment');
        instRadio.checked = true;
        
        const installBox = document.getElementById('renewalInstallmentBox');
        if(installBox) installBox.style.display = 'block';

        document.getElementById('renewalInstallmentCount').value = item.installments || 1;
        
        // Match Frequency
        const freqSelect = document.getElementById('renewalInstallmentFreq');
        const incomingFreq = (item.frequency || '').toLowerCase();
        
        for (let i = 0; i < freqSelect.options.length; i++) {
            if (incomingFreq.includes(freqSelect.options[i].value.toLowerCase())) {
                freqSelect.selectedIndex = i;
                break;
            }
        }
    } else {
        const upfrontRadio = document.getElementById('renewalPayUpfront');
        upfrontRadio.checked = true;
        const installBox = document.getElementById('renewalInstallmentBox');
        if(installBox) installBox.style.display = 'none';
    }
    
    // Close modal if open
    const modal = document.getElementById('lineItemPickerModal');
    if (modal) modal.classList.remove('active');
    
    showToast('success', 'Data Loaded', `Filled form for: ${item.name}`);
}

function showLineItemPicker(items) {

    if(modal) modal.classList.add('active');

function getShortTimezoneLabel(longTz) {
    if (!longTz) return "";
    
    // Convert to lowercase for easier matching
    const tz = longTz.toLowerCase();

    // --- North America ---
    if (tz.includes("eastern time") || tz.includes("indiana (east)")) return "EST"; 
    if (tz.includes("central time") || tz.includes("central america") || tz.includes("mexico city") || tz.includes("saskatchewan")) return "CST"; 
    if (tz.includes("mountain time") || tz.includes("arizona") || tz.includes("chihuahua")) return "MST"; 
    if (tz.includes("pacific time") || tz.includes("baja california")) return "PST"; 
    if (tz.includes("alaska")) return "AKST";
    if (tz.includes("hawaii")) return "HST";
    if (tz.includes("atlantic time") || tz.includes("la paz") || tz.includes("santiago")) return "AST"; 
    if (tz.includes("newfoundland")) return "NST";

    // --- Europe ---
    if (tz.includes("london") || tz.includes("dublin") || tz.includes("lisbon") || tz.includes("edinburgh") || tz.includes("casablanca") || tz.includes("monrovia")) return "UK Time";
    if (tz.includes("amsterdam") || tz.includes("berlin") || tz.includes("paris") || tz.includes("rome") || tz.includes("madrid") || tz.includes("vienna") || tz.includes("stockholm") || tz.includes("brussels") || tz.includes("copenhagen") || tz.includes("warsaw") || tz.includes("prague") || tz.includes("budapest") || tz.includes("belgrade") || tz.includes("west central africa")) return "CET";
    if (tz.includes("athens") || tz.includes("bucharest") || tz.includes("helsinki") || tz.includes("kyiv") || tz.includes("riga") || tz.includes("sofia") || tz.includes("tallinn") || tz.includes("vilnius") || tz.includes("cairo") || tz.includes("jerusalem") || tz.includes("beirut") || tz.includes("amman") || tz.includes("harare")) return "EET";
    if (tz.includes("moscow") || tz.includes("st. petersburg") || tz.includes("volgograd") || tz.includes("minsk")) return "MSK";

    // --- Asia & Middle East (Updated for your screenshot) ---
    // Matches: India, Kolkata, Chennai, Mumbai, New Delhi, Bombay, Calcutta, Madras
    if (tz.includes("india") || tz.includes("kolkata") || tz.includes("chennai") || tz.includes("mumbai") || tz.includes("new delhi") || tz.includes("bombay") || tz.includes("calcutta") || tz.includes("madras") || tz.includes("sri jayawardenepura")) return "IST";
    
    if (tz.includes("dubai") || tz.includes("muscat") || tz.includes("abu dhabi")) return "GST";
    if (tz.includes("kuwait") || tz.includes("riyadh") || tz.includes("baghdad") || tz.includes("nairobi")) return "AST"; 
    if (tz.includes("tehran")) return "IRST";
    if (tz.includes("islamabad") || tz.includes("karachi") || tz.includes("tashkent")) return "PKT";
    if (tz.includes("kathmandu")) return "NPT";
    if (tz.includes("dhaka") || tz.includes("astana")) return "BST"; 
    if (tz.includes("yangon")) return "MMT";
    if (tz.includes("bangkok") || tz.includes("hanoi") || tz.includes("jakarta")) return "ICT"; 
    if (tz.includes("singapore") || tz.includes("kuala lumpur") || tz.includes("hong kong") || tz.includes("beijing") || tz.includes("chongqing") || tz.includes("taipei") || tz.includes("perth") || tz.includes("ulaanbaatar")) return "SGT"; 
    if (tz.includes("tokyo") || tz.includes("osaka") || tz.includes("sapporo") || tz.includes("seoul")) return "JST";

    // --- Australia & Pacific ---
    if (tz.includes("adelaide") || tz.includes("darwin")) return "ACST";
    if (tz.includes("brisbane") || tz.includes("canberra") || tz.includes("melbourne") || tz.includes("sydney") || tz.includes("hobart") || tz.includes("guam") || tz.includes("port moresby")) return "AEST";
    if (tz.includes("auckland") || tz.includes("wellington")) return "NZT";
    if (tz.includes("fiji")) return "FJT";

    // --- South America ---
    if (tz.includes("brasilia") || tz.includes("buenos aires") || tz.includes("georgetown")) return "BRT";
    if (tz.includes("bogota") || tz.includes("lima") || tz.includes("quito")) return "PET"; 

    // --- Fallback: Extract (GMT+XX:XX) ---
    // Updated Regex to handle space: matches (GMT+05:30) AND (GMT +5:30)
    const gmtMatch = longTz.match(/\(GMT\s*[+-]\d{1,2}:\d{2}\)/);
    if(gmtMatch) return gmtMatch[0];

    return longTz;
}

            return;
        }
 
        var total    = allTeacherDetailsCache.length;
        var filtered = statusFilter === 'All'
            ? allTeacherDetailsCache
            : allTeacherDetailsCache.filter(function(t) { return t.status === statusFilter; });
 
        var statusLabel = statusFilter === 'All' ? 'All Teachers' : statusFilter + ' Teachers';
        if (countLabel) countLabel.textContent = statusLabel + ': ' + filtered.length + ' / ' + total;
 
        if (filtered.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:1rem;'
                + 'color:var(--text-muted);">No teachers found.</td></tr>';
            return;
        }
 
        filtered.forEach(function(teacher) {
            var totalLearners = teacher.activeCourses || 0;
            var coding        = teacher.activeCoding  || 0;
            var math          = teacher.activeMath    || 0;
            var loadColor     = totalLearners > 20 ? '#b91c1c' : totalLearners < 5 ? '#d97706' : '#15803d';
 
            var learnerHtml =
                '<span style="font-weight:700;color:' + loadColor + ';font-size:1rem;">' + totalLearners + '</span>'
                + ' <span style="font-size:0.75rem;color:var(--text-muted);">total</span>'
                + '&nbsp;&nbsp;'
                + '<span style="font-size:0.75rem;background:#eff6ff;color:#1d4ed8;'
                + 'border:1px solid #bfdbfe;padding:2px 7px;border-radius:4px;margin-right:4px;">'
                + '<i class="fas fa-code" style="margin-right:3px;"></i>' + coding + ' Coding</span>'
                + '<span style="font-size:0.75rem;background:#fdf4ff;color:#7e22ce;'
                + 'border:1px solid #e9d5ff;padding:2px 7px;border-radius:4px;">'
                + '<i class="fas fa-square-root-alt" style="margin-right:3px;"></i>' + math + ' Math</span>';
 
            var isHidden = teacher.hiddenInSearch === 'Yes' || teacher.hiddenInSearch === true;
            var tr = document.createElement('tr');
            if (isHidden) tr.style.opacity = '0.55';
            tr.innerHTML =
                '<td><strong>' + escapeHtml(teacher.name) + '</strong>'
                + (isHidden ? ' <span style="font-size:0.68rem;background:#fee2e2;color:#b91c1c;'
                    + 'border-radius:4px;padding:1px 6px;margin-left:4px;">Hidden</span>' : '')
                + '</td>'
                + '<td><span class="status-badge status-'
                + teacher.status.toLowerCase().replace(/ /g, '-') + '">'
                + escapeHtml(teacher.status) + '</span></td>'
                + '<td>' + learnerHtml + '</td>'
                + '<td style="text-align:right;display:flex;gap:6px;justify-content:flex-end;">'
                    + '<button class="btn btn-outline btn-sm view-profile-btn">'
                    + '<i class="fas fa-user"></i> View Profile'
                    + '</button>'
                    + '<button class="btn btn-primary btn-sm find-replacement-btn">'
                    + '<i class="fas fa-robot"></i> Find Replacement'
                    + '</button>'
                    + '<button class="btn btn-sm toggle-visibility-btn" style="'
                    + (isHidden
                        ? 'background:#dcfce7;color:#15803d;border:1px solid #86efac;'
                        : 'background:#fee2e2;color:#b91c1c;border:1px solid #fca5a5;')
                    + '">'
                    + (isHidden ? '<i class="fas fa-eye"></i> Show' : '<i class="fas fa-eye-slash"></i> Hide')
                    + '</button>'
                + '</td>';
            tr.querySelector('.view-profile-btn').dataset.teacherName = teacher.name;
            tr.querySelector('.view-profile-btn').addEventListener('click', function() {
                switchPage('teacherProfilePage', this.dataset.teacherName);
            });
            tr.querySelector('.find-replacement-btn').dataset.teacherName = teacher.name;
            tr.querySelector('.find-replacement-btn').addEventListener('click', function() {
                openCloneModal(this.dataset.teacherName);
            });
            tr.querySelector('.toggle-visibility-btn').dataset.teacherName = teacher.name;
            tr.querySelector('.toggle-visibility-btn').dataset.hidden = isHidden ? 'Yes' : '';
            tr.querySelector('.toggle-visibility-btn').addEventListener('click', function() {
                var btn = this;
                var tName = btn.dataset.teacherName;
                var nowHidden = btn.dataset.hidden === 'Yes';
                var makeHidden = !nowHidden;
                btn.disabled = true;
                btn.textContent = 'Saving…';
                google.script.run
                    .withSuccessHandler(function(res) {
                        if (res && res.success) {
                            allTeacherDetailsCache = null; // force reload
                            renderPersonaTable();
                            showToast('success', 'Visibility Updated',
                                tName + (makeHidden ? ' hidden from search.' : ' visible in search.'));
                        } else {
                            showToast('error', 'Error', (res && res.message) || 'Could not update visibility.');
                            btn.disabled = false;
                        }
                    })
                    .withFailureHandler(function(err) {
                        showToast('error', 'Error', err.message || 'Server error.');
                        btn.disabled = false;
                    })
                    .setTeacherVisibility(tName, makeHidden);
            });
            tbody.appendChild(tr);

    });
}

// \u2500\u2500 Global: open Find Replacement modal \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function openCloneModal(teacherName) {
    var nameEl = document.getElementById('cloneTargetName');
    var ctxEl  = document.getElementById('cloneTargetContext');
    if (nameEl) nameEl.textContent = teacherName;
    if (ctxEl)  ctxEl.style.display = 'none';
    showLoading('Analysing best replacements with AI...');
 
    google.script.run
        .withSuccessHandler(function(result) {
            hideLoading();
 
            if (!result || !result.success) {
                showToast('error', 'Analysis Failed', result ? result.message : 'Unknown error from server.');
                return;
            }
 
            // \u2500\u2500 Target context bar \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
            if (result.targetContext) {
                var ctx = result.targetContext;
                if (ctxEl) ctxEl.style.display = 'block';
                var coursesEl  = document.getElementById('cloneTargetCourses');
                var learnersEl = document.getElementById('cloneTargetLearners');
                var escalEl    = document.getElementById('cloneTargetEscalations');
                if (coursesEl)  coursesEl.textContent  = (ctx.courses && ctx.courses.length) ? ctx.courses.join(', ') : 'No courses mapped';
                if (learnersEl) learnersEl.textContent = ctx.activeLearners || 0;
                if (escalEl)    escalEl.textContent    = ctx.escalations || 0;
            }
 
            // \u2500\u2500 AI Summary banner \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
            var summaryEl = document.getElementById('cloneAISummary');
            if (summaryEl) {
                if (result.aiEnriched && result.aiSummary) {
                    summaryEl.style.display = 'block';
                    summaryEl.innerHTML =
                        '<span style="font-size:0.8rem;background:#ede9fe;color:#5b21b6;'
                        + 'padding:2px 8px;border-radius:10px;font-weight:600;margin-right:8px;">\u2726 AI Analysis</span>'
                        + escapeHtml(result.aiSummary);
                } else {
                    summaryEl.style.display = 'none';
                }
            }
 
            // \u2500\u2500 Populate results table \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
            var tbody = document.getElementById('cloneTeacherTableBody');
            if (!tbody) return;
            tbody.innerHTML = '';
 
            if (!result.data || result.data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;padding:1.5rem;'
                    + 'color:var(--text-muted);">No suitable replacements found.</td></tr>';
            } else {
                result.data.forEach(function(match, idx) {
                    try {
                        var name           = String(match.name            || 'Unknown');
                        var matchScore     = Number(match.matchScore)     || 0;
                        var traitScore     = Number(match.traitScore)     || 0;
                        var ageScore       = Number(match.ageScore)       || 0;
                        var courseScore    = Number(match.courseScore)    || 0;
                        var escalScore     = Number(match.escalationScore)|| 0;
                        var upskillCount   = Number(match.upskillCount    || match.activeLearners) || 0;
                        var escalRisk      = String(match.escalationRisk  || 'No Escalations');
                        var escColor       = String(match.escalationColor || '#15803d');
                        var courseOverlap  = String(match.courseOverlap   || 'N/A');
                        var ageGroupMatch  = String(match.ageGroupMatch   || 'N/A');
                        var aiEnriched     = Boolean(match.aiEnriched);
                        var confidence     = String(match.aiConfidence    || '');
                        var aiReason       = String(match.aiReason        || '');
                        var aiWarning      = String(match.aiWarning       || '');
                        var aiCaveat       = String(match.aiCaveat        || '');
 
                        var scoreColor = matchScore >= 70 ? '#15803d' : matchScore >= 40 ? '#d97706' : '#b91c1c';
                        var scoreBg    = matchScore >= 70 ? '#f0fdf4' : matchScore >= 40 ? '#fffbeb' : '#fef2f2';
                        var loadColor  = upskillCount > 35 ? '#15803d' : upskillCount >= 20 ? '#d97706' : '#b91c1c';
 
                        var confidenceHtml = '';
                        if (aiEnriched && confidence) {
                            var confColor = confidence === 'High'   ? '#15803d'
                                          : confidence === 'Medium' ? '#b45309' : '#b91c1c';
                            var confBg    = confidence === 'High'   ? '#dcfce7'
                                          : confidence === 'Medium' ? '#fef3c7' : '#fee2e2';
                            confidenceHtml =
                                '<span style="font-size:0.68rem;background:' + confBg
                                + ';color:' + confColor
                                + ';border:1px solid ' + confColor + '44'
                                + ';padding:1px 7px;border-radius:10px;font-weight:600;margin-left:5px;">'
                                + escapeHtml(confidence) + ' Confidence</span>';
                        }
 
                        var rankLabel = idx === 0
                            ? '<span style="font-size:0.68rem;background:#fbbf24;color:#78350f;'
                              + 'padding:1px 6px;border-radius:4px;margin-left:4px;">Top Pick</span>'
                            : '';
 
                        var reasonHtml  = (aiEnriched && aiReason)
                            ? '<div style="font-size:0.75rem;color:var(--text-muted);margin-top:3px;font-style:italic;">'
                              + '\u2726 ' + escapeHtml(aiReason) + '</div>' : '';
 
                        var warningHtml = (aiEnriched && aiWarning)
                            ? '<div style="font-size:0.72rem;color:#b91c1c;background:#fee2e2;'
                              + 'border-radius:4px;padding:2px 6px;margin-top:3px;display:inline-block;">'
                              + '\u26A0 ' + escapeHtml(aiWarning) + '</div>' : '';
 
                        var caveatHtml  = (aiEnriched && aiCaveat)
                            ? '<div style="font-size:0.7rem;color:var(--text-muted);margin-top:2px;">'
                              + '\u1F4A1 ' + escapeHtml(aiCaveat) + '</div>' : '';
 
                        var auditScoreVal  = Number(match.auditScore)    || 0;
                        var avgClassScore  = match.avgClassScore != null ? Number(match.avgClassScore).toFixed(1) : null;
                        var redFlagCount   = Number(match.redFlagCount)  || 0;

                        var auditLabel = avgClassScore != null
                            ? avgClassScore + '/80'
                            + (redFlagCount > 0 ? ' ⚑' + redFlagCount : '')
                            : 'No data';
                        var auditColor = avgClassScore == null ? '#6b7280'
                            : Number(avgClassScore) >= 60 ? '#15803d'
                            : Number(avgClassScore) >= 40 ? '#d97706' : '#b91c1c';

                        var breakdown = 'Traits:' + traitScore + '/30'
                            + ' | Age:' + ageScore + '/20'
                            + ' | Courses:' + courseScore + '/30'
                            + ' | Stability:' + escalScore + '/20'
                            + ' | Audit:' + auditScoreVal + '/20';

                        var escalCount = Number(match.escalations) || 0;
                        var escalHtml  = escalCount === 0
                            ? '<span style="color:#15803d;font-weight:600;">No Escalations</span>'
                            : '<span style="font-size:1.1rem;font-weight:700;color:' + escColor + ';">' + escalCount + '</span>'
                              + '<span style="font-size:0.72rem;color:' + escColor + ';display:block;">' + escapeHtml(escalRisk) + '</span>';

                        var tr = document.createElement('tr');
                        tr.innerHTML =
                            '<td style="min-width:180px;">'
                                + '<strong>' + escapeHtml(name) + '</strong>'
                                + rankLabel + confidenceHtml
                                + reasonHtml + warningHtml + caveatHtml
                            + '</td>'
                            + '<td>'
                                + '<div title="' + escapeHtml(breakdown)
                                + '" style="display:flex;align-items:center;gap:8px;cursor:help;">'
                                    + '<span style="background:' + scoreBg
                                    + ';color:' + scoreColor
                                    + ';border:1px solid ' + scoreColor + '44'
                                    + ';padding:3px 10px;border-radius:20px;font-weight:700;font-size:0.9rem;">'
                                    + matchScore + '/120</span>'
                                    + '<span style="font-size:0.7rem;color:var(--text-muted);">&#9432;</span>'
                                + '</div>'
                            + '</td>'
                            + '<td style="font-size:0.83rem;">'
                                + escapeHtml(courseOverlap)
                                + '<br><span style="font-size:0.73rem;color:var(--text-muted);">'
                                + 'Age: ' + escapeHtml(ageGroupMatch) + '</span>'
                            + '</td>'
                            + '<td style="color:' + loadColor + ';font-weight:600;">'
                                + upskillCount
                                + '<span style="font-size:0.68rem;font-weight:400;'
                                + 'color:var(--text-muted);display:block;">courses</span>'
                            + '</td>'
                            + '<td>' + escalHtml + '</td>'
                            + '<td style="font-size:0.83rem;color:' + auditColor + ';font-weight:600;">'
                                + auditLabel
                                + (redFlagCount > 0
                                    ? '<span style="font-size:0.68rem;color:#b91c1c;display:block;font-weight:400;">'
                                      + redFlagCount + ' red flag' + (redFlagCount > 1 ? 's' : '') + '</span>'
                                    : '')
                            + '</td>'
                            + '<td>'
                                + '<button class="btn btn-outline btn-sm view-profile-btn">View Profile</button>'
                            + '</td>';

                        tr.querySelector('.view-profile-btn').dataset.teacherName = name;
                        tr.querySelector('.view-profile-btn').addEventListener('click', function() {
                            var modal = document.getElementById('cloneTeacherModal');
                            if (modal) modal.classList.remove('active');
                            switchPage('teacherProfilePage', this.dataset.teacherName);
                        });

                        tbody.appendChild(tr);
 
                    } catch (rowErr) {
                        console.error('[openCloneModal] Row ' + idx + ' error:', rowErr.message, match);
                    }
                });
            }
 
            // Open modal \u2014 same as every other modal in the app
            var modal = document.getElementById('cloneTeacherModal');
            if (modal) modal.classList.add('active');
        })
        .withFailureHandler(function(err) {
            hideLoading();
            showError(err);
        })
        .findSimilarTeachers(teacherName);
}

function renderImpactScore(data) {
  if (!data) return;
  var score = data.score || 0;
  var circle = document.getElementById('impactScoreCircle');
  var valEl   = document.getElementById('impactScoreVal');
  var pctEl   = document.getElementById('impactPercentile');
  var insEl   = document.getElementById('impactInsight');
  var miniEl  = document.getElementById('impactMiniStats');
  if (!circle) return;

  // Animate count-up
  var start = 0, end = score, dur = 900, step = 16;
  var timer = setInterval(function() {
    start = Math.min(start + Math.ceil(end / (dur / step)), end);
    if (valEl) valEl.textContent = start;
    var pct = start / 100;
    var color = start >= 80 ? '#10b981' : start >= 50 ? '#6366f1' : start >= 20 ? '#f59e0b' : '#ef4444';
    circle.style.background = 'conic-gradient(' + color + ' ' + (pct * 360) + 'deg, #e2e8f0 0deg)';
    if (start >= end) clearInterval(timer);
  }, step);

  if (pctEl) pctEl.textContent = 'Top ' + (100 - (data.percentile || 0)) + '% of operators this month';
  if (insEl) insEl.textContent = data.insight || '';

  if (miniEl) {
    miniEl.style.display = 'grid';
    var m = document.getElementById('impactMigrations');
    var a = document.getElementById('impactAudits');
    var e = document.getElementById('impactEmails');
    var t = document.getElementById('impactTasks');
    if (m) m.textContent = data.migrationsHandled || 0;
    if (a) a.textContent = data.auditsRun || 0;
    if (e) e.textContent = data.emailsSent || 0;
    if (t) t.textContent = data.tasksCompleted || 0;
  }
}

var _stuckMigrationsData = null;
var _stuckSortKey = 'daysStuck';

function loadStuckMigrations() {
  google.script.run
    .withSuccessHandler(function(data) {
      _stuckMigrationsData = data;
      renderStuckWidget(data);
    })
    .withFailureHandler(function() {})
    .getStuckMigrations(7);
}

function renderStuckWidget(data) {
  var list = document.getElementById('stuckMigrationsList');
  var badge = document.getElementById('stuckCountBadge');
  if (!list) return;
  var tickets = (data && data.tickets) || [];
  if (badge) badge.textContent = tickets.length;

  if (tickets.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:1rem 0;color:#10b981;font-size:0.82rem;"><i class="fas fa-check-circle"></i> No stuck migrations — all clear!</div>';
    return;
  }
  list.innerHTML = tickets.slice(0, 4).map(function(t) {
    var urgency = t.daysStuck >= 14 ? '#b91c1c' : t.daysStuck >= 10 ? '#d97706' : '#6366f1';
    return '<div style="display:flex;align-items:center;gap:0.6rem;padding:6px 8px;border-radius:8px;background:#f8fafc;border-left:3px solid ' + urgency + ';">'
      + '<div style="flex-shrink:0;text-align:center;min-width:36px;">'
      + '<div style="font-size:1rem;font-weight:800;color:' + urgency + ';line-height:1;">' + t.daysStuck + '</div>'
      + '<div style="font-size:0.55rem;color:#94a3b8;font-weight:600;">DAYS</div></div>'
      + '<div style="flex:1;min-width:0;">'
      + '<div style="font-size:0.78rem;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(t.learnerName) + '</div>'
      + '<div style="font-size:0.68rem;color:#64748b;">' + escapeHtml(t.toTeacher) + ' · ' + escapeHtml(t.stage) + '</div></div>'
      + '<a href="' + t.hubspotLink + '" target="_blank" style="font-size:0.68rem;color:#6366f1;text-decoration:none;flex-shrink:0;"><i class="fas fa-external-link-alt"></i></a>'
      + '</div>';
  }).join('');
  if (tickets.length > 4) {
    list.innerHTML += '<div style="text-align:center;padding:4px 0;font-size:0.72rem;color:#94a3b8;">+ ' + (tickets.length - 4) + ' more — click View All</div>';
  }
}

  var modal = document.getElementById('stuckMigrationsModal');

}

function refreshStuckMigrationsModal() {
  var tbody = document.getElementById('stuckModalBody');
  if (tbody) tbody.innerHTML = '<tr><td colspan="8" style="padding:2rem;text-align:center;color:#94a3b8;"><i class="fas fa-spinner fa-spin"></i> Refreshing…</td></tr>';
  google.script.run
    .withSuccessHandler(function(data) {
      _stuckMigrationsData = data;
      renderStuckWidget(data);
      _renderStuckModalTable(data.tickets || []);
    })
    .withFailureHandler(function() {})
    .getStuckMigrations(7);
}

function _renderStuckModalTable(tickets) {
  var tbody  = document.getElementById('stuckModalBody');
  var cntEl  = document.getElementById('stuckModalCount');
  var footEl = document.getElementById('stuckModalFooterText');
  if (!tbody) return;
  if (cntEl) cntEl.textContent = tickets.length + ' ticket' + (tickets.length !== 1 ? 's' : '');
  if (footEl) footEl.textContent = 'Showing ' + tickets.length + ' WIP tickets older than 7 days';
  if (tickets.length === 0) {
    tbody.innerHTML = '<tr><td colspan="8" style="padding:2rem;text-align:center;color:#10b981;"><i class="fas fa-check-circle"></i> No stuck migrations right now.</td></tr>';
    return;
  }
  tbody.innerHTML = tickets.map(function(t) {
    var urgency = t.daysStuck >= 14 ? '#b91c1c' : t.daysStuck >= 10 ? '#d97706' : '#15803d';
    var urgBg   = t.daysStuck >= 14 ? '#fef2f2' : t.daysStuck >= 10 ? '#fffbeb' : '#f0fdf4';
    return '<tr style="border-bottom:1px solid #f1f5f9;">'
      + '<td style="padding:10px 12px;"><span style="background:' + urgBg + ';color:' + urgency + ';border-radius:6px;padding:3px 10px;font-size:0.8rem;font-weight:700;">' + t.daysStuck + 'd</span></td>'
      + '<td style="padding:10px 12px;font-size:0.8rem;color:#64748b;">' + escapeHtml(t.jlid) + '</td>'
      + '<td style="padding:10px 12px;font-weight:500;font-size:0.85rem;">' + escapeHtml(t.learnerName) + '</td>'
      + '<td style="padding:10px 12px;font-size:0.82rem;">' + escapeHtml(t.fromTeacher) + '</td>'
      + '<td style="padding:10px 12px;font-size:0.82rem;color:#6366f1;font-weight:500;">' + escapeHtml(t.toTeacher) + '</td>'
      + '<td style="padding:10px 12px;"><span style="background:#f1f5f9;border-radius:6px;padding:2px 8px;font-size:0.74rem;color:#475569;">' + escapeHtml(t.stage) + '</span></td>'
      + '<td style="padding:10px 12px;font-size:0.78rem;color:#64748b;">' + escapeHtml(t.createdDate) + '</td>'
      + '<td style="padding:10px 12px;text-align:center;"><a href="' + t.hubspotLink + '" target="_blank" style="background:#ede9fe;color:#5b21b6;border-radius:6px;padding:4px 10px;font-size:0.74rem;font-weight:600;text-decoration:none;white-space:nowrap;"><i class="fas fa-external-link-alt"></i> Escalate</a></td>'
      + '</tr>';
  }).join('');
}

function filterStuckModal(searchVal) {
  if (!_stuckMigrationsData) return;
  var stageFilter = (document.getElementById('stuckModalStageFilter') || {}).value || '';
  var q = (searchVal || '').toLowerCase();
  var filtered = (_stuckMigrationsData.tickets || []).filter(function(t) {
    var matchSearch = !q || [t.jlid, t.learnerName, t.fromTeacher, t.toTeacher, t.stage]
      .some(function(v) { return String(v || '').toLowerCase().indexOf(q) > -1; });
    var matchStage  = !stageFilter || t.stage.indexOf(stageFilter) > -1;
    return matchSearch && matchStage;
  });
  _renderStuckModalTable(filtered);
}

function sortStuckModal(key) {
  if (!_stuckMigrationsData) return;
  _stuckSortKey = key;
  var sorted = (_stuckMigrationsData.tickets || []).slice().sort(function(a, b) {
    return (b[key] || 0) - (a[key] || 0);
  });
  _renderStuckModalTable(sorted);
}

// ═══════════════════════════════════════════════════════════════════
// NOTIFICATION BELL
// ═══════════════════════════════════════════════════════════════════
var _notifOpen = false;
var _notifAutoRefreshTimer = null;

function loadNotifications(username) {
  google.script.run
    .withSuccessHandler(function(data) { _renderNotifications(data); })
    .withFailureHandler(function() {})
    .getStuckMigrations(7); // use stuck migrations as notification source for now
}

function toggleNotifDropdown() {
  var dd = document.getElementById('notifDropdown');
  var bd = document.getElementById('notifBackdrop');
  if (!dd) return;
  _notifOpen = !_notifOpen;
  dd.style.display = _notifOpen ? 'block' : 'none';
  if (bd) bd.style.display = _notifOpen ? 'block' : 'none';
  if (_notifOpen && currentUser) {
    _fetchAndRenderNotifications(currentUser.username);
  }
}

function _fetchAndRenderNotifications(username) {
  var list = document.getElementById('notifList');
  if (list) list.innerHTML = '<div style="padding:1.5rem;text-align:center;color:#94a3b8;font-size:0.83rem;"><i class="fas fa-spinner fa-spin"></i> Loading…</div>';
  google.script.run
    .withSuccessHandler(function(stuck) {
      var items = [];
      if (stuck && stuck.tickets && stuck.tickets.length > 0) {
        stuck.tickets.forEach(function(t) {
          items.push({
            icon: 'fa-exclamation-triangle',
            color: t.daysStuck >= 14 ? '#b91c1c' : '#d97706',
            bg:    t.daysStuck >= 14 ? '#fef2f2' : '#fffbeb',
            title: 'Stuck Migration — ' + t.daysStuck + ' days',
            body:  (t.learnerName || '—') + ' → ' + (t.toTeacher || '—'),
            link:  t.hubspotLink
          });
        });
      }
      _renderNotifItems(items);
    })
    .withFailureHandler(function() {
      var list = document.getElementById('notifList');
      if (list) list.innerHTML = '<div style="padding:1rem;text-align:center;color:#94a3b8;font-size:0.82rem;">Could not load notifications.</div>';
    })
    .getStuckMigrations(7);
}

function _renderNotifications(data) {
  var count = (data && data.count) || 0;
  var badge = document.getElementById('notifBadge');
  var cntEl = document.getElementById('notifDropdownCount');
  if (badge) {
    badge.style.display = count > 0 ? 'flex' : 'none';
    badge.textContent = count > 9 ? '9+' : count;
  }
  if (cntEl) cntEl.textContent = count;
}

function _renderNotifItems(items) {
  var list = document.getElementById('notifList');
  var badge = document.getElementById('notifBadge');
  var cntEl = document.getElementById('notifDropdownCount');
  if (!list) return;
  if (badge) { badge.style.display = items.length > 0 ? 'flex' : 'none'; badge.textContent = items.length > 9 ? '9+' : items.length; }
  if (cntEl) cntEl.textContent = items.length;
  if (items.length === 0) {
    list.innerHTML = '<div style="padding:2rem;text-align:center;"><div style="font-size:2rem;margin-bottom:0.5rem;">🔔</div><div style="color:#64748b;font-size:0.85rem;font-weight:500;">All clear — no notifications</div></div>';
    return;
  }
  list.innerHTML = items.map(function(n) {
    return '<div style="display:flex;gap:0.75rem;padding:10px 16px;border-bottom:1px solid #f8fafc;cursor:pointer;" onclick="if(\'' + (n.link || '') + '\'){window.open(\'' + (n.link || '') + '\',\'_blank\');}">'
      + '<div style="width:32px;height:32px;border-radius:8px;background:' + (n.bg || '#ede9fe') + ';display:flex;align-items:center;justify-content:center;flex-shrink:0;">'
      + '<i class="fas ' + (n.icon || 'fa-bell') + '" style="color:' + (n.color || '#6366f1') + ';font-size:0.8rem;"></i></div>'
      + '<div style="flex:1;min-width:0;">'
      + '<div style="font-size:0.82rem;font-weight:600;color:#1e293b;margin-bottom:2px;">' + escapeHtml(n.title || '') + '</div>'
      + '<div style="font-size:0.75rem;color:#64748b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(n.body || '') + '</div></div>'
      + (n.link ? '<a href="' + n.link + '" target="_blank" style="font-size:0.7rem;color:#6366f1;text-decoration:none;flex-shrink:0;margin-top:2px;" onclick="event.stopPropagation()"><i class="fas fa-external-link-alt"></i></a>' : '')
      + '</div>';
  }).join('');
}

function markAllNotifRead() {
  var badge = document.getElementById('notifBadge');
  var cntEl = document.getElementById('notifDropdownCount');
  if (badge) badge.style.display = 'none';
  if (cntEl) cntEl.textContent = '0';
  var list = document.getElementById('notifList');
  if (list) list.innerHTML = '<div style="padding:2rem;text-align:center;"><div style="font-size:2rem;margin-bottom:0.5rem;">✅</div><div style="color:#64748b;font-size:0.85rem;">Marked all as read</div></div>';
}

// ═══════════════════════════════════════════════════════════════════
// PERSONA CARD GRID (replaces table rows)
// ═══════════════════════════════════════════════════════════════════
var _personaCurrentPage = 1;

function renderPersonaCards() {
  var grid    = document.getElementById('personaCardsGrid');
  var pageEl  = document.getElementById('personaCardsPagination');
  var countEl = document.getElementById('personaResultsCount');
  if (!grid || !personaResults || personaResults.length === 0) return;

  var pageSize = parseInt((document.getElementById('personaPageSizeSelect') || {}).value || '15');
  var total = personaResults.length;
  var totalPages = Math.ceil(total / pageSize);
  if (_personaCurrentPage > totalPages) _personaCurrentPage = 1;

  var start = (_personaCurrentPage - 1) * pageSize;
  var slice = personaResults.slice(start, start + pageSize);

  if (countEl) countEl.textContent = total + ' match' + (total !== 1 ? 'es' : '');

  grid.innerHTML = slice.map(function(t, i) {
    var rank = start + i;
    var gradeColors = { A: { bg:'#dcfce7', text:'#15803d' }, B: { bg:'#dbeafe', text:'#1d4ed8' }, C: { bg:'#fef3c7', text:'#d97706' }, D: { bg:'#fee2e2', text:'#b91c1c' } };
    var gc = gradeColors[t.auditGrade] || { bg:'#f1f5f9', text:'#64748b' };

    var slotMatch = t.slotMatch === '✔️' || t.slotMatch === '\u2714\uFE0F';
    var progressColor = function(v) {
      if (!v || v === 'N/A' || v === 'Not Onboarded') return '#94a3b8';
      var p = parseInt(v); if (isNaN(p)) return '#94a3b8';
      return p >= 80 ? '#15803d' : p >= 50 ? '#d97706' : '#b91c1c';
    };

    var topBadge = rank === 0 ? '<span style="background:#fbbf24;color:#78350f;border-radius:99px;padding:1px 7px;font-size:0.62rem;font-weight:700;margin-left:4px;">Top Pick</span>' : '';
    var rfBadge  = (t.redFlagCount || 0) > 0 ? '<span style="background:#fee2e2;color:#b91c1c;border-radius:99px;padding:1px 7px;font-size:0.62rem;font-weight:700;margin-left:4px;">⚑ ' + t.redFlagCount + ' flag</span>' : '';

    return '<div style="background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;padding:1.1rem;display:flex;flex-direction:column;gap:0.6rem;transition:box-shadow .15s,border-color .15s;" onmouseover="this.style.boxShadow=\'0 4px 18px rgba(99,102,241,0.12)\';this.style.borderColor=\'#c7d2fe\'" onmouseout="this.style.boxShadow=\'\';this.style.borderColor=\'#e2e8f0\'">'
      // Card header
      + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;">'
      + '<div style="display:flex;align-items:center;gap:0.6rem;min-width:0;">'
      + '<div style="width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:#fff;flex-shrink:0;">' + escapeHtml((t.teacherName || '').substring(0,2).toUpperCase()) + '</div>'
      + '<div style="min-width:0;">'
      + '<div style="font-weight:700;font-size:0.88rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(t.teacherName || '') + topBadge + '</div>'
      + '<div style="font-size:0.72rem;color:#64748b;">' + escapeHtml(t.ageYear || '—') + '</div>'
      + '</div></div>'
      // Grade badge
      + '<div style="background:' + gc.bg + ';color:' + gc.text + ';border-radius:8px;padding:4px 10px;text-align:center;flex-shrink:0;">'
      + '<div style="font-size:1.1rem;font-weight:800;line-height:1;">' + (t.auditGrade || '—') + '</div>'
      + '<div style="font-size:0.58rem;font-weight:600;">GRADE</div>'
      + '</div></div>'
      // Rank number + flags
      + '<div style="display:flex;align-items:center;gap:0.4rem;">'
      + '<span style="font-size:0.68rem;color:#94a3b8;background:#f8fafc;border-radius:4px;padding:1px 6px;">#' + (rank + 1) + '</span>'
      + rfBadge
      + '</div>'
      // Slot
      + '<div style="display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border-radius:8px;padding:6px 10px;">'
      + '<span style="font-size:0.74rem;color:#64748b;">Slot Match</span>'
      + '<span style="font-size:0.85rem;">' + (slotMatch ? '<span style="color:#15803d;font-weight:700;">✔ Matches</span>' : '<span style="color:#94a3b8;">✗ No match</span>') + '</span>'
      + '</div>'
      // Audit score
      + '<div style="display:flex;align-items:center;justify-content:space-between;">'
      + '<span style="font-size:0.74rem;color:#64748b;">Audit (45d)</span>'
      + '<span style="font-size:0.82rem;font-weight:600;color:' + gc.text + ';">' + escapeHtml(t.avgClassScore || 'No data') + (t.auditCount45 ? ' <span style="font-size:0.68rem;color:#94a3b8;">(' + t.auditCount45 + ' sessions)</span>' : '') + '</span>'
      + '</div>'
      // Courses
      + '<div style="border-top:1px solid #f1f5f9;padding-top:0.5rem;">'
      + '<div style="font-size:0.7rem;color:#94a3b8;font-weight:600;margin-bottom:4px;">COURSES</div>'
      + '<div style="display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:0.72rem;">'
      + '<div style="color:#475569;">Current: <span style="color:' + progressColor(t.currentCourseProgress) + ';font-weight:600;">' + escapeHtml(t.currentCourseProgress || 'N/A') + '</span></div>'
      + '<div style="color:#475569;">Future 1: <span style="color:' + progressColor(t.futureCourse1Progress) + ';font-weight:600;">' + escapeHtml(t.futureCourse1Progress || '—') + '</span></div>'
      + '</div></div>'
      // Traits gap
      + (t.traitsMissing && t.traitsMissing.length > 0
        ? '<div style="font-size:0.72rem;background:#fff7ed;border-radius:6px;padding:4px 8px;color:#92400e;">Missing traits: ' + escapeHtml(t.traitsMissing.join(', ')) + '</div>'
        : '<div style="font-size:0.72rem;background:#f0fdf4;border-radius:6px;padding:4px 8px;color:#15803d;">All traits matched</div>')
      + '</div>';
  }).join('');

  // Pagination
  if (pageEl) {
    if (totalPages <= 1) { pageEl.innerHTML = ''; return; }
    var html = '';
    for (var p = 1; p <= totalPages; p++) {
      var active = p === _personaCurrentPage;
      html += '<button onclick="_goPersonaPage(' + p + ')" style="width:32px;height:32px;border-radius:8px;border:1.5px solid ' + (active ? '#6366f1' : '#e2e8f0') + ';background:' + (active ? '#6366f1' : '#fff') + ';color:' + (active ? '#fff' : '#374151') + ';font-size:0.8rem;font-weight:' + (active ? '700' : '400') + ';cursor:pointer;">' + p + '</button>';
    }
    pageEl.innerHTML = html;
  }
}

function _goPersonaPage(p) {
  _personaCurrentPage = p;
  renderPersonaCards();
  var container = document.getElementById('personaResultsContainer');
  if (container) container.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

</script>
