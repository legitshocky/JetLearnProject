function calculateInvoicePricingClient(formData) {
    let effectiveBasePrice = 0;
    let discount = parseFloat(formData.discount || '0');
    let customCurrencyExtraDiscountPercentage = parseFloat(formData.customCurrencyExtraDiscountPercentage || '0');
    let finalCurrencySymbol = getCurrencySymbolClient(formData.currency);
    const userSelectedTenureMonths = parseInt(formData.subscriptionTenure || '0');
    const freeClasses = parseInt(formData.freeClasses || '0');
    
    // Parse sessions per week
    let sessionsPerWeekNum = 0;
    if (formData.sessionsPerWeek) {
        const match = String(formData.sessionsPerWeek).match(/(\d+)/);
        if (match) sessionsPerWeekNum = parseInt(match[0]);
    }

    const customPaidAmount = parseFloat(formData.customPaidAmount || '0');
    const selectedPlan = globalInvoiceProducts.find(p => p['Plan Name'] === formData.planName);
    
    let fixedClassesVal = 0;
    if (selectedPlan) {
        fixedClassesVal = parseInt(selectedPlan['Fixed Classes']);
        if (isNaN(fixedClassesVal)) fixedClassesVal = 0;
    }

    if (!selectedPlan) {
        return { effectiveBasePrice: 0, discount: 0, calculatedTotal: 0, finalTotal: 0, currencySymbol: finalCurrencySymbol, displayTotalSessions: 0 };
    }

    // Currency Conversion
    let targetCurrencyCode = formData.currency;
    let finalConversionRateFromEUR = 1;
    if (targetCurrencyCode === 'CUSTOM') {
        targetCurrencyCode = (formData.customCurrencyCode || 'EUR').toUpperCase();
        finalConversionRateFromEUR = (formData.customCurrencyRate && parseFloat(formData.customCurrencyRate) > 0)
            ? parseFloat(formData.customCurrencyRate)
            : getConversionRateClient('EUR', targetCurrencyCode);
        finalCurrencySymbol = getCurrencySymbolClient(targetCurrencyCode);
    } else {
        if (['EUR', 'GBP', 'USD'].includes(targetCurrencyCode)) {
            finalConversionRateFromEUR = 1.0;
        } else {
            finalConversionRateFromEUR = getConversionRateClient('EUR', targetCurrencyCode);
        }
    }

    const planBasePriceForDefaultTenure = parseFloat(String(selectedPlan['Base Price EUR'] || '0').replace(/[^0-9.-]/g, '')) || 0;
    const selectedPlanDefaultMonthsTenure = parseInt(selectedPlan['Months Tenure'] || '1');
    const monthlyRateEUR = selectedPlanDefaultMonthsTenure > 0 ? (planBasePriceForDefaultTenure / selectedPlanDefaultMonthsTenure) : 0;
    
    effectiveBasePrice = monthlyRateEUR * userSelectedTenureMonths;
    if (isNaN(effectiveBasePrice)) effectiveBasePrice = 0;

    if (formData.currency === 'CUSTOM' && effectiveBasePrice > 0 && customCurrencyExtraDiscountPercentage > 0) {
        effectiveBasePrice *= (1 - customCurrencyExtraDiscountPercentage / 100);
    }
    effectiveBasePrice *= finalConversionRateFromEUR;

    // --- FIX: Total Calculation ---
    // The Total is ALWAYS (Base Price - Discount), regardless of what was paid
    let finalTotal = effectiveBasePrice - discount;
    if (finalTotal < 0) finalTotal = 0;

    const numInstallments = parseInt(formData.numberOfInstallments || '1');
    const isInstallment = formData.paymentType === 'Installment';

    // --- FIX: Amount Paid & Balance Logic ---
    let amountPaid = 0;

    if (customPaidAmount > 0) {
        // If user typed a specific amount, that is what is paid
        amountPaid = customPaidAmount;
    } else {
        // If field is empty, auto-calculate based on plan type
        if (isInstallment && numInstallments > 0) {
            amountPaid = finalTotal / numInstallments;
        } else {
            amountPaid = finalTotal; // Upfront means 100% paid
        }
    }

    const balanceDue = Math.max(0, finalTotal - amountPaid);

    // Calculate Classes
    let totalClasses = 0;
    if (fixedClassesVal > 0) {
        totalClasses = fixedClassesVal + freeClasses;
    } else {
        totalClasses = (userSelectedTenureMonths * 4 * sessionsPerWeekNum) + freeClasses;
    }
    totalClasses = Math.max(0, totalClasses);

    // Date Logic
    let weeksRequired = 0;
    if (sessionsPerWeekNum > 0) {
        weeksRequired = Math.ceil(totalClasses / sessionsPerWeekNum);
    } else if (totalClasses > 0) {
        weeksRequired = totalClasses;
    }

    let finalEndDate;
    const startDate = new Date(formData.startDate);
    if (formData.endDate && formData.endDate.trim() !== '' && isInvoiceEndDateManuallySet) {
        finalEndDate = new Date(formData.endDate);
    } else {
        finalEndDate = new Date(startDate);
        if (weeksRequired > 0) {
            finalEndDate.setDate(startDate.getDate() + (weeksRequired * 7) - 1);
        } else {
            finalEndDate.setDate(startDate.getDate());
        }
    }

    // Note: We don't generate the full installment array here for the simple display
    // The backend handles the complex date generation for the PDF.
    
    return { 
        effectiveBasePrice, 
        discount, 
        customCurrencyExtraDiscountPercentage, 
        calculatedTotal: finalTotal, 
        finalTotal, // This is the full deal value
        amountPaid, // This is what is received so far
        balanceDue, // This is the remaining
        currencySymbol: finalCurrencySymbol, 
        subscriptionTenureMonths: userSelectedTenureMonths, 
        startDateFormatted: formData.startDate, 
        endDateFormatted: formData.endDate, 
        numberOfInstallments: numInstallments, 
        displayTotalSessions: totalClasses, 
        planDescription: formData.planName, 
        freeClassesProvided: freeClasses, 
        installments: [] 
    };
}


    const EUR_BASE_RATES_CLIENT = {
      'EUR': 1.0, 'USD': 1.1700, 'GBP': 0.8665, 'INR': 103.16, 'CHF': 0.9348, 'AED': 4.273, 'CAD': 1.6224, 'AUD': 1.7682, 'JPY': 172.50, 'SGD': 1.50, 'HKD': 9.1187, 'ZAR': 20.57, 'CNY': 8.3387, 'NZD': 1.9704, 'SEK': 10.951, 'NOK': 11.6195, 'DKK': 7.45, 'MXN': 21.8069, 'BRL': 6.3207
    };

    function getConversionRateClient(fromCurrency, toCurrency) {
      fromCurrency = fromCurrency.toUpperCase();
      toCurrency = toCurrency.toUpperCase();
      if (fromCurrency === toCurrency) return 1;

      if (liveCurrencyRates && liveCurrencyRates[toCurrency]) {
        return liveCurrencyRates[toCurrency];
      }
      
      const rateFromBase = EUR_BASE_RATES_CLIENT[fromCurrency];
      const rateToBase = EUR_BASE_RATES_CLIENT[toCurrency];
      if (rateFromBase === undefined || rateToBase === undefined) {
        console.warn('No live or fallback rate for ' + fromCurrency + ' to ' + toCurrency + '. Returning 1.');
        return 1;
      }
      return rateToBase / rateFromBase;
    }

    function formatDateDDMMYYYYClient(dateObj) {
      if (!dateObj || isNaN(dateObj.getTime())) return 'N/A';
      const day = String(dateObj.getDate()).padStart(2, '0');
      const month = String(dateObj.getMonth() + 1).padStart(2, '0');
      const year = dateObj.getFullYear();
      return day + '/' + month + '/' + year;
    }

    function validateInvoiceDataClient(formData) {
        const errors = [];
        if (!formData.learnerName) errors.push('Learner Name is required');
        if (!formData.parentName) errors.push('Parent Name is required');
        if (!formData.parentEmail || !isValidEmail(formData.parentEmail)) errors.push('Valid Parent Email is required');
        if (!formData.parentContact) errors.push('Parent Contact is required');
        if (!formData.planName) errors.push('Plan Name is required');
        if (!formData.currency) errors.push('Currency is required');
        if (!formData.sessionsPerWeek) errors.push('Sessions per Week is required');
        if (!formData.subscriptionTenure || parseInt(formData.subscriptionTenure || '0') < 0) errors.push('Subscription Tenure must be a non-negative number.');
        const sessionsNum = parseInt(formData.sessionsPerWeek.split(' ')[0] || '0');
        if (isNaN(sessionsNum) || sessionsNum < 0) errors.push('Sessions per Week must be a non-negative number.');
        if (parseInt(formData.freeClasses || '0') < 0) errors.push('Free Classes cannot be negative.');
        if (!formData.startDate) errors.push('Start Date is required.');
        if (!formData.endDate) errors.push('End Date is required.');
        if (new Date(formData.endDate) < new Date(formData.startDate)) errors.push('End Date cannot be before Start Date.');
        if (!formData.paymentType) errors.push('Payment Type is required.');
        let discount = parseFloat(formData.discount || '0');
        const customPaidAmount = parseFloat(formData.customPaidAmount || '0');
        if (discount < 0) errors.push('Discount cannot be negative.');
        if (customPaidAmount < 0) errors.push('Custom Paid Amount cannot be negative.');
        if (formData.currency === 'CUSTOM') {
            if (!formData.customCurrencyCode) errors.push('Custom Currency Code is required when selecting Custom Currency.');
            if (!formData.customCurrencyRate || parseFloat(formData.customCurrencyRate) <= 0) errors.push('Conversion rate must be a positive number for custom currency.');
            if (parseFloat(formData.customCurrencyExtraDiscountPercentage || '0') < 0 || parseFloat(formData.customCurrencyExtraDiscountPercentage || '0') > 100) errors.push('Custom currency discount percentage must be between 0 and 100.');
        }
        const pricingDetails = calculateInvoicePricingClient(formData);
        if (discount > pricingDetails.effectiveBasePrice) {
            errors.push('Discount amount exceeds the calculated base price. It will be capped automatically.');
        }
        if (formData.paymentType === 'Installment') {
            const numInstallments = parseInt(formData.numberOfInstallments || '0');
            if (isNaN(numInstallments) || numInstallments <= 0) {
                errors.push('Number of Installments must be a positive number for installment plans.');
            }
            if (!formData.installmentType) {
                errors.push('Installment Type is required for installment plans.');
            }
            const dueDay = parseInt(formData.dueDayToPay || '0');
            if (isNaN(dueDay) || dueDay < 1 || dueDay > 31) {
                errors.push('Due Day to Pay must be a number between 1 and 31 for installment plans.');
            }
        }
        return errors;
    }

    function downloadInvoicePDF() {
        const formData = collectInvoiceFormData();
        const validationErrors = validateInvoiceDataClient(formData);
        if (validationErrors.length > 0) {
            showToast('error', 'Validation Error', validationErrors.join('<br>'));
            return;
        }
        showLoading('Generating PDF for download...');
        google.script.run
            .withSuccessHandler(result => {
                hideLoading();
                if (result && result.success) {
                    const byteCharacters = atob(result.data);
                    const byteNumbers = new Array(byteCharacters.length);
                    for (let i = 0; i < byteCharacters.length; i++) {
                        byteNumbers[i] = byteCharacters.charCodeAt(i);
                    }
                    const byteArray = new Uint8Array(byteNumbers);
                    const blob = new Blob([byteArray], { type: 'application/pdf' });
                    const link = document.createElement('a');
                    link.href = URL.createObjectURL(blob);
                    link.download = result.filename;
                    document.body.appendChild(link);
                    link.click();
                    URL.revokeObjectURL(link.href);
                    showToast('success', 'Download Complete', 'Invoice PDF downloaded successfully!');
                } else {
                    showToast('error', 'Download Failed', (result && result.message) ? result.message : 'Unknown error generating/downloading invoice PDF.');
                }
            })
            .withFailureHandler(showError)
            .generateInvoicePDFForDownload(formData);
    }

        if (el) {
            el.addEventListener('change', updateParentOnboardingPlanDetails);
            el.addEventListener('input', updateParentOnboardingPlanDetails);
        }
    });

    onboardingParentEndDate.addEventListener('input', () => {
        isParentInvoiceEndDateManuallySet = true;
        calculateAndDisplayParentOnboardingTotal();
    });

    function loadTasksPage() {
        showLoading('Loading tasks...');
        google.script.run
            .withSuccessHandler(tasks => {
                hideLoading();
                if (!tasks) {
                    tasksTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">Failed to load tasks.</td></tr>';
                    showToast('error', 'Task Load Error', 'Failed to retrieve tasks data from server.');
                    return;
                }
                tasksTableBody.innerHTML = '';
                if (tasks.length === 0) {
                    tasksTableBody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No tasks found.</td></tr>';
                    return;
                }
                tasks.forEach(task => {
                    const statusClass = task.status === 'Completed' ? 'status-success' : task.status === 'Pending' ? 'status-pending' : '';
                    const tr = '<tr><td>' + new Date(task.created).toLocaleDateString() + '</td><td>' + escapeHtml(task.learner) + '</td><td>' + escapeHtml(task.description) + '</td><td>' + escapeHtml(task.assignedTo) + '</td><td><span class="status-badge ' + statusClass + '">' + escapeHtml(task.status) + '</span></td><td>' + (task.status === 'Pending' ? '<button class="btn btn-sm btn-primary complete-task-btn" data-id="' + escapeHtml(task.id) + '"><i class="fas fa-check"></i> Mark Complete</button>' : '') + '</td></tr>';
                    tasksTableBody.innerHTML += tr;
                });
                document.querySelectorAll('.complete-task-btn').forEach(btn => {
                    btn.addEventListener('click', (e) => completeTask(e.target.closest('button').dataset.id));
                });
            })
            .withFailureHandler(showError)
            .getTasks();
    }

    function completeTask(taskId) {
        showConfirm('Complete Task', 'Are you sure you want to mark this task as complete?', confirmed => {
            if (confirmed) {
                showLoading('Updating task...');
                google.script.run
                    .withSuccessHandler(result => {
                        hideLoading();
                        if (result && result.success) {
                            showToast('success', 'Task Updated', 'Task marked as complete.');
                            loadTasksPage();
                        } else {
                            showError({ message: (result && result.message) ? result.message : 'Unknown error updating task status.' });
                        }
                    })
                    .withFailureHandler(showError)
                    .updateTaskStatus(taskId, 'Completed');
            }
        });
    }

function loadTeacherLoadPage() {
    const inputEl = document.getElementById('hsTeacherSearchInput');
    const listEl  = document.getElementById('hsTeacherOptionsList');

    if (!inputEl || !listEl) return;

    // Wire up persona status filter dropdown
    const filterEl = document.getElementById('personaStatusFilter');
    if (filterEl) filterEl.onchange = function() { renderPersonaTable(); };

    // Fetch full teacher details if cache is empty
    if (allTeacherDetailsCache.length === 0) {
        showLoading('Loading teacher directory...');
        google.script.run
            .withSuccessHandler(function(teachers) {
                hideLoading();
                allTeacherDetailsCache = teachers || [];
                globalTeacherDataList  = allTeacherDetailsCache.map(function(t) { return t.name || t; });
                renderTeacherOptions(globalTeacherDataList);
            })
            .withFailureHandler(function(err) { hideLoading(); showError(err); })
            .getTeacherDetailsForTable();
    } else {
        globalTeacherDataList = allTeacherDetailsCache.map(function(t) { return t.name || t; });
        renderTeacherOptions(globalTeacherDataList);
    }

    // Show list on focus
    inputEl.addEventListener('focus', function() { listEl.classList.add('show'); });

    // Filter as you type
    inputEl.addEventListener('input', function() {
        var searchTerm = this.value.toLowerCase();
        var filtered   = globalTeacherDataList.filter(function(t) { return t.toLowerCase().includes(searchTerm); });
        renderTeacherOptions(filtered);
        listEl.classList.add('show');
    });

    // Close when clicking outside
    document.addEventListener('click', function(e) {
        if (!inputEl.contains(e.target) && !listEl.contains(e.target)) {
            listEl.classList.remove('show');
        }
    });
}


// Helper to render the HTML list
function renderTeacherOptions(teachers) {
    const listEl = document.getElementById('hsTeacherOptionsList');
    const inputEl = document.getElementById('hsTeacherSearchInput');
    
    if (!listEl) return;
    listEl.innerHTML = ''; 

    // SAFETY FIX: Default to empty array if null
    const safeList = teachers || []; 

    if (safeList.length === 0) {
        listEl.innerHTML = '<div class="hs-option" style="color:#999; cursor:default;">No teachers found</div>';
        return;
    }

    safeList.forEach(teacherName => {
        const div = document.createElement('div');
        div.className = 'hs-option';
        div.innerHTML = '<div class="hs-option-name">' + escapeHtml(teacherName) + '</div>';
        div.addEventListener('click', () => {
            inputEl.value = teacherName; 
            listEl.classList.remove('show'); 
            loadTeacherSpecificDetails(teacherName); 
        });
        listEl.appendChild(div);
    });
}



// 2. Display Details when Teacher Selected
function loadTeacherSpecificDetails(teacherName) {
    showLoading('Fetching detailed analysis for ' + teacherName + '...');

    const emptyState       = document.getElementById('teacherLoadEmptyState');
    const resultsContainer = document.getElementById('teacherLoadResults');
    if (emptyState)       emptyState.style.display = 'none';
    if (resultsContainer) resultsContainer.style.display = 'none';

    const learnersEl = document.getElementById('loadDisplayLearners');
    if (learnersEl) learnersEl.textContent = '-';

    // Remove previous attrition section to prevent duplicates on teacher switch
    const existing = document.getElementById('attritionRiskSection');
    if (existing) existing.remove();

    // Reset calendar hours & replacement history panels
    _resetCalHoursPanel();
    _resetReplacementHistoryPanel();

    // \u2013\u2013 CALL 1: Basic Load Stats & Proficiency (Google Sheets) \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
    google.script.run
        .withSuccessHandler(data => {
            if (!data || !data.success) {
                showToast('error', 'Error', data ? data.message : 'Unknown error');
                hideLoading();
                return;
            }

            const statusEl = document.getElementById('loadDisplayStatus');
            if (statusEl) {
                statusEl.textContent  = data.status || '-';
                statusEl.style.color  = data.status === 'Active' ? 'var(--success)' : 'var(--danger)';
            }
            document.getElementById('loadDisplayCount').textContent       = data.totalLoad    || '0';
            document.getElementById('loadDisplayLastActive').textContent  = data.lastActivity || 'No recent activity';

            const tbody = document.getElementById('loadDisplayTableBody');
            if (tbody) {
                tbody.innerHTML = '';
                const courses = data.courses || [];
                if (courses.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="2" style="text-align:center; padding:2rem;">No active courses found.</td></tr>';
                } else {
                    courses.forEach(c => {
                        let badgeClass = 'status-info';
                        if (c.proficiency === '100%' || c.proficiency === '91-99%') badgeClass = 'status-success';
                        else if (c.proficiency.includes('51-60'))                   badgeClass = 'status-warning';
                        tbody.innerHTML += '<tr><td style="font-weight:500;">' + escapeHtml(c.course) + '</td><td><span class="status-badge ' + badgeClass + '">' + escapeHtml(c.proficiency) + '</span></td></tr>';
                    });
                }
            }

            if (resultsContainer) resultsContainer.style.display = 'block';

            // \u2013\u2013 CALL 2a: Teaching Hours Distribution (Calendar) \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
            _loadCalendarHours(teacherName);
            // \u2013\u2013 CALL 2b: Replacement History (HubSpot) \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
            _loadReplacementHistory(teacherName);

            // \u2013\u2013 CALL 2: Attrition Risk & Active Pool (HubSpot) \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
            google.script.run
                .withSuccessHandler(report => {
                    hideLoading();
                    if (!report || !report.success) return;

                    const students = report.students || [];
                    if (learnersEl) learnersEl.textContent = students.length;

                    // Build risk section fresh each time
                    const riskSection = document.createElement('div');
                    riskSection.id        = 'attritionRiskSection';
                    riskSection.className = 'audit-log-container';
                    riskSection.style.marginTop = '30px';

                    riskSection.innerHTML = `
                        <h3 class="dashboard-section-title" style="color:#d32f2f;">
                            <i class="fas fa-exclamation-circle"></i> Attrition Risk &amp; Active Pool
                        </h3>
                        <p class="form-text-muted" style="margin-bottom:15px;">
                            Active students (Active, VIP, Friendly, Break &amp; Return).
                            <span style="color:#d32f2f; font-weight:bold;">Red</span> rows indicate 2+ recent moves.
                        </p>
                        <div class="table-container">
                            <table class="data-table">
                                <thead>
                                    <tr>
                                        <th>Learner</th>
                                        <th>Status</th>
                                        <th>Deal Value</th>
                                        <th>Previous Teacher</th>
                                        <th>Last Moved</th>
                                        <th>Reason</th>
                                        <th>Risk (90d)</th>
                                        <th>Links</th>
                                    </tr>
                                </thead>
                                <tbody id="attritionRiskTableBody"></tbody>
                            </table>
                        </div>
                    `;
                    resultsContainer.appendChild(riskSection);

                    const riskTbody = document.getElementById('attritionRiskTableBody');
                    if (!riskTbody) return;

                    if (students.length === 0) {
                        riskTbody.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:1.5rem;">No matching active students found.</td></tr>';
                        return;
                    }

                    students.forEach(s => {

                        // \u2013\u2013 Risk badge & row highlight \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
                        let rowStyle = '';
                        let riskBadge = `<span class="status-badge status-success">Stable</span>`;
                        if (s.recentMoves >= 2) {
                            rowStyle  = 'background-color:#ffebee;';
                            riskBadge = '<span class="status-badge status-failed">' + s.recentMoves + ' Moves</span>';
                        } else if (s.recentMoves === 1) {
                            riskBadge = `<span class="status-badge" style="background-color:#fff3e0; color:#e65100; border:1px solid #ffb74d;">1 Move</span>`;
                        }

                        // \u2013\u2013 Deal Value badge \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
                        const isUnknown     = !s.dealValueLabel || s.dealValueLabel === 'Unknown';
                        const dealValueBadge = isUnknown
                            ? `<span class="status-badge" style="background:#e2e8f0; color:#4a5568;">Unknown</span>`
                            : '<span class="status-badge" style="background-color:' + escapeHtml(s.dealValueBg) + '; color:' + escapeHtml(s.dealValueColor) + '; border:1px solid ' + escapeHtml(s.dealValueColor) + ';">' + escapeHtml(s.dealValueLabel) + '</span>';

                        // \u2013\u2013 Amount display \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
                        // Show local currency amount; if non-EUR also show ~EUR equivalent
                        let amountDisplay = '';
                        if (s.dealAmountLocal > 0) {
                            const localStr = s.dealCurrency !== 'EUR'
                                ? escapeHtml(s.dealCurrency) + ' ' + s.dealAmountLocal.toLocaleString()
                                : '\u20AC' + s.dealAmountLocal.toLocaleString();
                            const eurNote  = (s.dealCurrency !== 'EUR' && s.dealAmountEur > 0)
                                ? ' <small style="color:#888;">(~\u20AC' + s.dealAmountEur.toLocaleString() + ')</small>'
                                : '';
                            amountDisplay = '<div style="font-size:0.85em; margin-top:3px; font-weight:600;">' + localStr + eurNote + '</div>';
                        }

                        // \u2013\u2013 Payment tag: Upfront (green) / Installment (blue) \u2013\u2013
                        const paymentTagBadge = s.paymentTag === 'Installment'
                            ? `<span style="display:inline-block; margin-top:3px; font-size:0.72em; padding:1px 7px; border-radius:4px; background:#dbeafe; color:#1d4ed8; border:1px solid #93c5fd;">Installment</span>`
                            : `<span style="display:inline-block; margin-top:3px; font-size:0.72em; padding:1px 7px; border-radius:4px; background:#dcfce7; color:#15803d; border:1px solid #86efac;">Upfront</span>`;

                        // \u2013\u2013 Tenure label \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
                        const tenureLabel = s.dealTenureMonths > 0
                            ? '<small style="color:#999; display:block; margin-top:2px;">' + s.dealTenureMonths + '-month plan</small>'
                            : '';

                        // \u2013\u2013 Previous teacher \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
                        const prevTeacherDisplay = (!s.prevTeacher || s.prevTeacher === 'N/A')
                            ? '<span style="color:#aaa;">No Teacher Changes</span>'
                            : escapeHtml(s.prevTeacher);

                        // \u2013\u2013 Course (truncated) \u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013\u2013
                        const courseDisplay = s.course && s.course.length > 35
                            ? s.course.substring(0, 35) + '...'
                            : (s.course || '-');

                        const tr = document.createElement('tr');
                        tr.style.cssText = rowStyle;
                        tr.innerHTML =
                          '<td><strong>' + escapeHtml(s.name) + '</strong><br>'
                          + '<small style="color:#666;">' + escapeHtml(s.jlid) + '</small><br>'
                          + '<small style="color:#4a3c8a;" title="' + escapeHtml(s.course||'') + '">' + escapeHtml(courseDisplay) + '</small></td>'
                          + '<td><span class="status-badge status-info">' + escapeHtml(s.status) + '</span></td>'
                          + '<td>' + dealValueBadge + amountDisplay + paymentTagBadge + tenureLabel + '</td>'
                          + '<td>' + prevTeacherDisplay + '</td>'
                          + '<td>' + escapeHtml(s.lastMoveDate) + '</td>'
                          + '<td style="font-size:0.85em;">' + escapeHtml(s.moveReason) + '</td>'
                          + '<td>' + riskBadge + '</td>'
                          + '<td><div style="display:flex;gap:5px;">'
                          + '<a href="' + escapeHtml(s.hubspotLink) + '" target="_blank" class="btn btn-sm btn-outline" title="Open HubSpot Deal" style="color:#ff7a59;border-color:#ff7a59;"><i class="fab fa-hubspot"></i></a>'
                          + '<button class="btn btn-sm btn-outline" onclick="copyToClipboardText(\'' + escapeHtml(s.jlid) + '\')" title="Copy JLID"><i class="fas fa-copy"></i></button>'
                          + '</div></td>';
                        riskTbody.appendChild(tr);
                    });
                })
                .withFailureHandler(error => {
                    hideLoading();
                    console.error('Attrition Report Failed:', error);
                    showToast('error', 'Attrition Report', 'Could not load attrition data.');
                })
                .getTeacherAttritionReport(teacherName);
        })
        .withFailureHandler(err => {
            hideLoading();
            showError(err);
        })
        .getTeacherSpecificLoad(teacherName);
}

// \u2500\u2500 Calendar Hours helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
var _calHoursChart = null;   // Chart.js instance \u2014 destroyed on re-render
var _calHoursCurrentTeacher = '';
var _calHoursCurrentWeeks   = 4;

function _resetCalHoursPanel() {
    const loading = document.getElementById('calHoursLoading');
    const wrap    = document.getElementById('calHoursChartWrap');
    const empty   = document.getElementById('calHoursEmpty');
    if (loading) { loading.style.display = 'block'; }
    if (wrap)    { wrap.style.display    = 'none';  }
    if (empty)   { empty.style.display   = 'none';  }
    ['calHoursTotalHours','calHoursAvgWeek','calHoursPeakDay','calHoursMatched'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.textContent = '\u2014';
    });
    if (_calHoursChart) { try { _calHoursChart.destroy(); } catch(e) {} _calHoursChart = null; }
}

function _loadCalendarHours(teacherName, weeksBack) {
    weeksBack = weeksBack || parseInt(document.getElementById('calHoursWeeksSelect')?.value || '4', 10);
    _calHoursCurrentTeacher = teacherName;
    _calHoursCurrentWeeks   = weeksBack;

    const weeksLabel = document.getElementById('calHoursWeekLabel');
    if (weeksLabel) weeksLabel.textContent = 'last ' + weeksBack + ' wks';

    google.script.run
        .withSuccessHandler(data => _renderCalHours(data))
        .withFailureHandler(err => {
            const loading = document.getElementById('calHoursLoading');
            if (loading) loading.style.display = 'none';
            console.error('[CalHours] Error:', err);
        })
        .getTeacherCalendarHours(teacherName, weeksBack);
}

function reloadCalendarHours() {
    if (!_calHoursCurrentTeacher) return;
    _resetCalHoursPanel();
    _loadCalendarHours(_calHoursCurrentTeacher);
}

function _renderCalHours(data) {
    const loading = document.getElementById('calHoursLoading');
    const wrap    = document.getElementById('calHoursChartWrap');
    const empty   = document.getElementById('calHoursEmpty');
    if (loading) loading.style.display = 'none';

    if (!data || !data.success || !data.hours || data.matched === 0) {
        if (empty) empty.style.display = 'block';
        ['calHoursTotalHours','calHoursAvgWeek','calHoursPeakDay','calHoursMatched'].forEach(id => {
            const el = document.getElementById(id); if (el) el.textContent = '0';
        });
        return;
    }

    document.getElementById('calHoursTotalHours').textContent = data.totalHours + 'h';
    document.getElementById('calHoursAvgWeek').textContent    = data.avgPerWeek + 'h';
    document.getElementById('calHoursPeakDay').textContent    = data.peakDay;
    document.getElementById('calHoursMatched').textContent    = data.matched;

    if (wrap) wrap.style.display = 'block';

    const canvas = document.getElementById('calHoursChart');
    if (!canvas) return;
    if (_calHoursChart) { try { _calHoursChart.destroy(); } catch(e) {} }

    const maxHours = Math.max(...data.hours);
    _calHoursChart = new Chart(canvas.getContext('2d'), {
        type: 'bar',
        data: {
            labels: data.days,
            datasets: [{
                label: 'Teaching Hours',
                data:  data.hours,
                backgroundColor: data.hours.map(h =>
                    h === maxHours && h > 0 ? 'rgba(99,102,241,0.85)' : 'rgba(99,102,241,0.35)'
                ),
                borderColor: 'rgba(99,102,241,0.9)',
                borderWidth: 1,
                borderRadius: 6
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: {
                legend: { display: false },
                tooltip: {
                    callbacks: {
                        label: ctx => {
                            const h = ctx.parsed.y;
                            const events = data.eventCount[ctx.dataIndex];
                            return ' ' + h + 'h  (' + events + ' session' + (events !== 1 ? 's' : '') + ')';
                        }
                    }
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: { callback: v => v + 'h' },
                    grid: { color: 'rgba(0,0,0,0.05)' }
                },
                x: { grid: { display: false } }
            }
        }
    });
}


// \u2500\u2500 Replacement History helpers \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500
function _resetReplacementHistoryPanel() {
    const loading = document.getElementById('replacementHistoryLoading');
    const wrap    = document.getElementById('replacementHistoryTableWrap');
    const empty   = document.getElementById('replacementHistoryEmpty');
    const badges  = document.getElementById('replacementHistoryBadges');
    if (loading) loading.style.display = 'block';
    if (wrap)    wrap.style.display    = 'none';
    if (empty)   empty.style.display   = 'none';
    if (badges)  badges.innerHTML      = '';
}

function _loadReplacementHistory(teacherName) {
    google.script.run
        .withSuccessHandler(data => _renderReplacementHistory(data))
        .withFailureHandler(err => {
            const loading = document.getElementById('replacementHistoryLoading');
            if (loading) loading.style.display = 'none';
            console.error('[RepHistory] Error:', err);
        })
        .getTeacherReplacementHistory(teacherName);
}

function _renderReplacementHistory(data) {
    const loading = document.getElementById('replacementHistoryLoading');
    const wrap    = document.getElementById('replacementHistoryTableWrap');
    const empty   = document.getElementById('replacementHistoryEmpty');
    const badges  = document.getElementById('replacementHistoryBadges');
    const tbody   = document.getElementById('replacementHistoryBody');
    if (loading) loading.style.display = 'none';

    if (!data || !data.success || !data.history || data.history.length === 0) {
        if (empty) empty.style.display = 'block';
        return;
    }

    // KPI badges
    if (badges) {
        badges.innerHTML =
            '<span class="status-badge" style="background:#dcfce7;color:#15803d;border:1px solid #86efac;"><i class="fas fa-user-plus" style="margin-right:4px;"></i>' + data.joinedCount + ' Joined</span>'
          + '<span class="status-badge" style="background:#ffebee;color:#d32f2f;border:1px solid #f48fb1;"><i class="fas fa-user-minus" style="margin-right:4px;"></i>' + data.leftCount + ' Left</span>'
          + '<span class="status-badge status-info">' + data.total + ' Total</span>';
    }

    if (tbody) {
        tbody.innerHTML = '';
        data.history.forEach(r => {
            const isLeft     = r.direction === 'left';
            const dirBadge   = isLeft
                ? `<span class="status-badge" style="background:#ffebee;color:#d32f2f;border:1px solid #f48fb1;"><i class="fas fa-sign-out-alt" style="margin-right:3px;"></i>Left</span>`
                : `<span class="status-badge" style="background:#dcfce7;color:#15803d;border:1px solid #86efac;"><i class="fas fa-sign-in-alt" style="margin-right:3px;"></i>Joined</span>`;

            const stageColor = r.stage === 'Migration Completed' ? '#10b981' : '#f59e0b';
            const stageBadge = '<span class="status-badge" style="background:rgba(0,0,0,0.05);color:' + stageColor + ';font-size:0.7rem;">' + escapeHtml(r.stage) + '</span>';

            const tr = document.createElement('tr');
            if (isLeft) tr.style.backgroundColor = '#fff8f8';
            var jlidHtml = r.jlid ? '<br><small style="color:#6366f1;">' + escapeHtml(r.jlid) + '</small>' : '';

    // =============================================

    const SESSION_TIMEOUT_MS = 30 * 60 * 1000; // 30 minutes
    const WARNING_BEFORE_MS  =  2 * 60 * 1000; // warn 2 mins before
    let sessionTimer = null;
    let sessionWarningTimer = null;

    function resetSessionTimer() {
        if (!currentUser) return;
        clearTimeout(sessionTimer);
        clearTimeout(sessionWarningTimer);

        sessionWarningTimer = setTimeout(() => {
            if (!currentUser) return;
            showToast('warning', 'Session Expiring', 'You will be logged out in 2 minutes due to inactivity.', 10000);
        }, SESSION_TIMEOUT_MS - WARNING_BEFORE_MS);

        sessionTimer = setTimeout(() => {
            if (!currentUser) return;
          currentUser = null;
          sessionStorage.removeItem('currentUser');
          stopPolling();
          stopSessionTimer();
          appContainer.style.display = 'none';
            loginPage.style.display = 'flex';
            switchLoginView('loginView');
            loginForm.reset();
            const inactivityMsg = document.getElementById('inactivityMessage');
            if (inactivityMsg) inactivityMsg.style.display = 'flex';
            showToast('warning', 'Session Expired', 'You have been logged out due to inactivity.');
        }, SESSION_TIMEOUT_MS);
    }

    function startSessionTimer() {
        ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(event => {
            document.addEventListener(event, resetSessionTimer, { passive: true });
        });
        resetSessionTimer();
    }

    function stopSessionTimer() {
        clearTimeout(sessionTimer);
        clearTimeout(sessionWarningTimer);
        ['mousemove', 'keydown', 'click', 'scroll', 'touchstart'].forEach(event => {
            document.removeEventListener(event, resetSessionTimer);
        });
    }

            if (element.tagName === 'SELECT') {
                if ([...element.options].some(opt => opt.value === value)) {
                    element.value = value;
                } else {
                    console.warn(`Value "${value}" not found in select element #${element.id}. Creating and selecting it.`);
                    const newOption = new Option(value, value, true, true);
                    element.appendChild(newOption);
                }
            } else {
                element.value = value;
            }
        }
    };

    // ===================================
    // === DEFINITIVE ERROR HANDLER V2 ===
    // ===================================
    function showError(error) {
        hideLoading();
        console.error('Client-side: GAS Error caught by handler:', error);
        
        // Default message in case the error object is completely unreadable
        let errorMessage = 'An unexpected server error occurred. The server may have returned a null response.';
        
        if (error) {
            // Case 1: Handle Google Apps Script's complex error object format
            if (typeof error.message === 'string' && error.message.includes("Error in protected function")) {
                // Try to get the deeper, more specific cause of the error
                if (error.cause && error.cause.message) {
                    errorMessage = error.cause.message;
                } else {
                    errorMessage = error.message; // Fallback to the generic wrapper message
                }
            } 
            // Case 2: Handle the simple { message: '...' } object created in server-side code
            else if (typeof error.message === 'string') {
                errorMessage = error.message;
            } 
            // Case 3: Handle plain string errors
            else if (typeof error === 'string') {
                errorMessage = error;
            } 
            // Case 4: Fallback for other non-null object types
            else if (typeof error === 'object') {
                try {
                    // Try to stringify for debugging, but provide a user-friendly message
                    console.error("Full error object:", JSON.stringify(error));
                    errorMessage = "An complex error object was received. Check console for details.";
                } catch (e) {
                    errorMessage = 'An unreadable error object was received from the server.';
                }
            }
        }
        
        // Display the final, processed error message to the user
        showToast('error', 'System Error', errorMessage);
    }

                    </tr>
                </thead>

    `;

        let journeyHtml = `<ul style="margin: 0; padding-left: 0; list-style-type: none;">`;
        if (row.timeline && row.timeline.length > 0) {

    container.innerHTML = html;

function fetchMigrationSpecificData() {
        const jlid = jlidInput.value.trim();

        showLoading('Fetching Latest Ticket & Deal...');

        google.script.run
            .withSuccessHandler(result => {
                hideLoading();
                if (result.success) {
                    const data = result.data;

                    // 1. Populate Basic Fields
                    jlidInput.value = data.jlid;
                    learnerInput.value = data.learnerName;

                    // --- NEW: POPULATE TIMEZONE ---
                    const parentTz = data.timezone || "";
                    
                    // A. Save to hidden field (so new rows get it)
                    const globalTz = document.getElementById('globalMigrationTimezone');
                    if(globalTz) globalTz.value = parentTz;

                    // B. Update the visible dropdowns immediately
                    // --- FIX: Defined variable matches the loop variable ---
                    const visibleSelects = document.querySelectorAll('.class-timezone-select');
                    
                    visibleSelects.forEach(select => {
                        // Try to set the value
                        select.value = parentTz;
                        
                        // If the fetched timezone isn't in the list (dropdown is blank), add it dynamically
                        if (select.value === "" && parentTz !== "") {
                            const opt = new Option(parentTz, parentTz, true, true);
                            select.add(opt);
                        }
                    });
                    // -----------------------------

                    // 2. Populate Dropdowns
                    if (migrationCourseSelect && data.course) {
                        addOptionIfNotExists(migrationCourseSelect, data.course);
                        migrationCourseSelect.value = data.course;
                    }

                    if (reasonOfMigrationSelect && data.migrationReason) {
                        addOptionIfNotExists(reasonOfMigrationSelect, data.migrationReason);
                        reasonOfMigrationSelect.value = data.migrationReason;
                        
                        // --- ADD THIS LINE HERE ---
                        // This forces the WATI Template logic to run immediately
                        reasonOfMigrationSelect.dispatchEvent(new Event('change'));
                        // --------------------------
                    }

                    if (clsManagerSelect) clsManagerSelect.value = data.clsManagerName || '';
                    if (jetGuideSelect) jetGuideSelect.value = data.jetGuideName || '';

                    // 3. Populate Teachers
                    if (oldTeacherSelect && data.currentTeacher) {
                        addOptionIfNotExists(oldTeacherSelect, data.currentTeacher);
                        oldTeacherSelect.value = data.currentTeacher;
                    }
                    if (newTeacherSelect && data.newTeacher) {
                        addOptionIfNotExists(newTeacherSelect, data.newTeacher);
                        newTeacherSelect.value = data.newTeacher;
                    }

                    // 4. Populate Schedule from Ticket (if available)
                    classSessionsContainer.innerHTML = '';
                    if (data.ticketSchedule && (data.ticketSchedule.day || data.ticketSchedule.time)) {
                        const newGroup = createClassSessionGroup(true, 'migration');
                        classSessionsContainer.appendChild(newGroup);
                        
                        if(data.ticketSchedule.day) {
                             const daySelect = newGroup.querySelector('.class-day-select');
                             const dayVal = data.ticketSchedule.day.trim();
                             if([...daySelect.options].some(o => o.value === dayVal)) daySelect.value = dayVal;
                        }
                        if(data.ticketSchedule.time) {
                            const t = data.ticketSchedule.time.toUpperCase();
                            const match = t.match(/(\d+)/);
                            if(match) newGroup.querySelector('.class-hour-select').value = match[0].padStart(2,'0');
                            newGroup.querySelector('.class-minute-select').value = '00'; 
                            newGroup.querySelector('.class-meridiem-select').value = t.includes('AM') ? 'AM' : 'PM';
                        }
                    } else {
                        // Create default empty row
                        classSessionsContainer.appendChild(createClassSessionGroup(true, 'migration'));
                    }

                    // Re-apply timezone to the newly created row (just in case)
                    const refreshedSelects = document.querySelectorAll('.class-timezone-select');
                    refreshedSelects.forEach(select => {
                        select.value = parentTz;
                         if (select.value === "" && parentTz !== "") {
                            const opt = new Option(parentTz, parentTz, true, true);
                            select.add(opt);
                        }
                    });

                    showToast('success', 'Data Loaded', `Fetched from ${data.source}`);
                } else {
                    showToast('error', 'Error', result.message);
                }
            })
            .withFailureHandler(showError)
            .fetchMigrationHybridData(jlid);
    }

// 2. Helper to add missing teachers to dropdowns dynamically
function addOptionIfNotExists(selectElement, value) {
    if (!value) return;
    // Check if option exists (case-insensitive check is safer)
    const exists = Array.from(selectElement.options).some(o => o.value.toLowerCase() === value.toLowerCase());
    
    if (!exists) {
        const newOpt = document.createElement('option');
        newOpt.value = value;
        newOpt.textContent = value;
        selectElement.appendChild(newOpt);
        console.log(`Added dynamic teacher option: ${value}`);
    }
}

// Helper to copy text from an input field
function copyToClipboard(elementId) {
    const copyText = document.getElementById(elementId);
    copyText.select();
    copyText.setSelectionRange(0, 99999); // For mobile devices
    navigator.clipboard.writeText(copyText.value).then(() => {
        showToast('success', 'Copied!', 'Text copied to clipboard.');
    });
}

function fillRenewalFinancials(item) {
    // Plan Name
    const planSelect = document.getElementById('renewalPlanName');
    planSelect.innerHTML = `<option value="${item.name}" selected>${item.name}</option>`;

    // Financials
    document.getElementById('renewalUnitPrice').value = item.unitPrice || 0;
    document.getElementById('renewalDiscount').value = item.discount || 0;
    document.getElementById('renewalNetPrice').value = item.netPrice || 0;
    
    // Payment Date
    const dateInput = document.getElementById('renewalPaymentDate');
    if (item.paymentDate) {
        dateInput.value = item.paymentDate; 
    } else {
        dateInput.valueAsDate = new Date();
    }

    // Payment Type Logic
    const type = (item.paymentType || '').toLowerCase();
    
    if (type.includes('installment')) {
        const instRadio = document.getElementById('renewalPayInstallment');
        instRadio.checked = true;
        
        const installBox = document.getElementById('renewalInstallmentBox');
        if(installBox) installBox.style.display = 'block';

        document.getElementById('renewalInstallmentCount').value = item.installments || 1;
        
        // Match Frequency
        const freqSelect = document.getElementById('renewalInstallmentFreq');
        const incomingFreq = (item.frequency || '').toLowerCase();
        
        for (let i = 0; i < freqSelect.options.length; i++) {
            if (incomingFreq.includes(freqSelect.options[i].value.toLowerCase())) {
                freqSelect.selectedIndex = i;
                break;
            }
        }
    } else {
        const upfrontRadio = document.getElementById('renewalPayUpfront');
        upfrontRadio.checked = true;
        const installBox = document.getElementById('renewalInstallmentBox');
        if(installBox) installBox.style.display = 'none';
    }
    
    // Close modal if open
    const modal = document.getElementById('lineItemPickerModal');
    if (modal) modal.classList.remove('active');
    
    showToast('success', 'Data Loaded', `Filled form for: ${item.name}`);
}

// --- 3. ADD THIS HELPER FUNCTION TO SHOW THE MODAL ---
function showLineItemPicker(items) {
    const tbody = document.getElementById('lineItemPickerBody');
    if(!tbody) return; 
    
    tbody.innerHTML = '';

    items.forEach((item, index) => {
        // Index 0 is the newest (sorted by ID in code.js)
        const isNewest = index === 0 ? '<span class="badge" style="background:#4caf50; color:#fff; padding:2px 6px; font-size:10px; border-radius:4px; margin-left:5px;">LATEST</span>' : '';
        
        // FIX: Use 'paymentDate' instead of 'createdDate'
        // If paymentDate is missing, fall back to "N/A"
        const displayDate = item.paymentDate || "N/A";

        const row = document.createElement('tr');
        row.innerHTML = `
            <td>${displayDate} ${isNewest}</td>
            <td>${item.name}</td>
            <td style="font-weight:bold;">${item.currency || ''} ${item.netPrice}</td>
            <td><button type="button" class="btn btn-sm btn-primary select-renewal-btn">Select</button></td>
        `;
        
        // Add click listener
        const btn = row.querySelector('.select-renewal-btn');
        btn.addEventListener('click', function(e) {
            e.preventDefault(); 
            fillRenewalFinancials(item);
        });
        
        tbody.appendChild(row);
    });

    const modal = document.getElementById('lineItemPickerModal');
    if(modal) modal.classList.add('active');
}

function getShortTimezoneLabel(longTz) {
    if (!longTz) return "";
    
    // Convert to lowercase for easier matching
    const tz = longTz.toLowerCase();

    // --- North America ---
    if (tz.includes("eastern time") || tz.includes("indiana (east)")) return "EST"; 
    if (tz.includes("central time") || tz.includes("central america") || tz.includes("mexico city") || tz.includes("saskatchewan")) return "CST"; 
    if (tz.includes("mountain time") || tz.includes("arizona") || tz.includes("chihuahua")) return "MST"; 
    if (tz.includes("pacific time") || tz.includes("baja california")) return "PST"; 
    if (tz.includes("alaska")) return "AKST";
    if (tz.includes("hawaii")) return "HST";
    if (tz.includes("atlantic time") || tz.includes("la paz") || tz.includes("santiago")) return "AST"; 
    if (tz.includes("newfoundland")) return "NST";

    // --- Europe ---
    if (tz.includes("london") || tz.includes("dublin") || tz.includes("lisbon") || tz.includes("edinburgh") || tz.includes("casablanca") || tz.includes("monrovia")) return "UK Time";
    if (tz.includes("amsterdam") || tz.includes("berlin") || tz.includes("paris") || tz.includes("rome") || tz.includes("madrid") || tz.includes("vienna") || tz.includes("stockholm") || tz.includes("brussels") || tz.includes("copenhagen") || tz.includes("warsaw") || tz.includes("prague") || tz.includes("budapest") || tz.includes("belgrade") || tz.includes("west central africa")) return "CET";
    if (tz.includes("athens") || tz.includes("bucharest") || tz.includes("helsinki") || tz.includes("kyiv") || tz.includes("riga") || tz.includes("sofia") || tz.includes("tallinn") || tz.includes("vilnius") || tz.includes("cairo") || tz.includes("jerusalem") || tz.includes("beirut") || tz.includes("amman") || tz.includes("harare")) return "EET";
    if (tz.includes("moscow") || tz.includes("st. petersburg") || tz.includes("volgograd") || tz.includes("minsk")) return "MSK";

    // --- Asia & Middle East (Updated for your screenshot) ---
    // Matches: India, Kolkata, Chennai, Mumbai, New Delhi, Bombay, Calcutta, Madras
    if (tz.includes("india") || tz.includes("kolkata") || tz.includes("chennai") || tz.includes("mumbai") || tz.includes("new delhi") || tz.includes("bombay") || tz.includes("calcutta") || tz.includes("madras") || tz.includes("sri jayawardenepura")) return "IST";
    
    if (tz.includes("dubai") || tz.includes("muscat") || tz.includes("abu dhabi")) return "GST";
    if (tz.includes("kuwait") || tz.includes("riyadh") || tz.includes("baghdad") || tz.includes("nairobi")) return "AST"; 
    if (tz.includes("tehran")) return "IRST";
    if (tz.includes("islamabad") || tz.includes("karachi") || tz.includes("tashkent")) return "PKT";
    if (tz.includes("kathmandu")) return "NPT";
    if (tz.includes("dhaka") || tz.includes("astana")) return "BST"; 
    if (tz.includes("yangon")) return "MMT";
    if (tz.includes("bangkok") || tz.includes("hanoi") || tz.includes("jakarta")) return "ICT"; 
    if (tz.includes("singapore") || tz.includes("kuala lumpur") || tz.includes("hong kong") || tz.includes("beijing") || tz.includes("chongqing") || tz.includes("taipei") || tz.includes("perth") || tz.includes("ulaanbaatar")) return "SGT"; 
    if (tz.includes("tokyo") || tz.includes("osaka") || tz.includes("sapporo") || tz.includes("seoul")) return "JST";

    // --- Australia & Pacific ---
    if (tz.includes("adelaide") || tz.includes("darwin")) return "ACST";
    if (tz.includes("brisbane") || tz.includes("canberra") || tz.includes("melbourne") || tz.includes("sydney") || tz.includes("hobart") || tz.includes("guam") || tz.includes("port moresby")) return "AEST";
    if (tz.includes("auckland") || tz.includes("wellington")) return "NZT";
    if (tz.includes("fiji")) return "FJT";

    // --- South America ---
    if (tz.includes("brasilia") || tz.includes("buenos aires") || tz.includes("georgetown")) return "BRT";
    if (tz.includes("bogota") || tz.includes("lima") || tz.includes("quito")) return "PET"; 

    // --- Fallback: Extract (GMT+XX:XX) ---
    // Updated Regex to handle space: matches (GMT+05:30) AND (GMT +5:30)
    const gmtMatch = longTz.match(/\(GMT\s*[+-]\d{1,2}:\d{2}\)/);
    if(gmtMatch) return gmtMatch[0];

    return longTz;
}
