function loadOnboardingTracker() {
    const grid = document.getElementById('onboardingTrackerGrid');
    if (grid) grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--text-muted);">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;display:block;margin-bottom:1rem;"></i>Loading...</div>`;

    google.script.run
        .withSuccessHandler(_renderOnboardingTracker)
        .withFailureHandler(err => showToast('error', 'Onboarding Tracker', err.message || err))
        .getOnboardingTrackerData();

    // Populate modal dropdowns
    _populateOnboardingModalDropdowns();
}

function _renderOnboardingTracker(data) {
    const grid = document.getElementById('onboardingTrackerGrid');
    if (!grid) return;

    const records = (data && data.success) ? (data.records || []) : [];

    // KPIs
    const setKpi = (id, val) => { const el = document.getElementById(id); if (el) el.textContent = val; };
    setKpi('obKpiTotal',      records.length);
    setKpi('obKpiFirstClass', records.filter(r => r.firstClassDone === 'Yes').length);
    setKpi('obKpiFirstAudit', records.filter(r => r.firstAuditDone === 'Yes').length);
    setKpi('obKpi30Day',      records.filter(r => r.reviewDone     === 'Yes').length);

    if (records.length === 0) {
        grid.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:4rem;color:var(--text-muted);">
            <i class="fas fa-user-plus" style="font-size:3rem;opacity:.3;display:block;margin-bottom:1rem;"></i>
            No teachers in onboarding yet. Click <strong>Add Teacher</strong> to get started.
        </div>`;
        return;
    }

    grid.innerHTML = records.map(r => _buildOnboardingCard(r)).join('');
}

function _buildOnboardingCard(r) {
    const steps = [
        { key: 'trainingPct',    label: 'Course Training',    done: r.trainingPct >= 100, pct: r.trainingPct, isProgress: true },
        { key: 'firstClassDone', label: 'First Class Logged', done: r.firstClassDone === 'Yes' },
        { key: 'firstAuditDone', label: 'First Audit Done',   done: r.firstAuditDone === 'Yes' },
        { key: 'reviewDone',     label: '30-Day Review',      done: r.reviewDone === 'Yes' }
    ];
    const doneCount = steps.filter(s => s.done).length;
    const overallPct = Math.round((doneCount / steps.length) * 100);
    const barColor = overallPct === 100 ? '#10b981' : overallPct >= 50 ? '#6366f1' : '#f59e0b';

    const stepsHtml = steps.map(s => {
        if (s.isProgress) {
            return `<div style="margin-bottom:8px;">
                <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
                    <span style="font-size:0.75rem;color:#475569;">${s.label}</span>
                    <span style="font-size:0.75rem;font-weight:700;color:#6366f1;">${s.pct}%</span>
                </div>
                <div style="background:#e2e8f0;border-radius:99px;height:6px;">
                    <div style="background:#6366f1;height:6px;border-radius:99px;width:${Math.min(s.pct,100)}%;transition:width .5s;"></div>
                </div>
                     <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap;">${_buildTrainingPctButtons(r.id, s.pct)}
                </div>
            </div>`;
        }
        return `<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 0;border-bottom:1px solid #f1f5f9;">
            <span style="font-size:0.78rem;color:#475569;">${s.label}</span>
            <button type="button"'
            + ' onclick="toggleOnboardingStep(\'' + r.id + '\',\'' + s.key + '\',\'' + (s.done ? 'No' : 'Yes') + '\',this)"'
            + ' style="font-size:0.7rem;padding:3px 12px;border-radius:99px;'
            + 'border:1px solid ' + (s.done ? '#86efac' : '#e2e8f0') + ';'
            + 'background:' + (s.done ? '#dcfce7' : '#f8fafc') + ';'
            + 'color:' + (s.done ? '#15803d' : '#94a3b8') + ';cursor:pointer;font-weight:600;">'
            + (s.done ? '<i class="fas fa-check" style="margin-right:3px;"></i>Done' : 'Mark Done')
            + '</button>        
            </div>`;
                
        }).join('');

    const daysIn = r.joinDate ? Math.floor((Date.now() - new Date(r.joinDate).getTime()) / 86400000) : '?';

    return `<div style="background:#fff;border-radius:16px;border:1.5px solid #e2e8f0;padding:1.25rem;display:flex;flex-direction:column;gap:8px;">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
            <div>
                <div style="font-weight:700;font-size:0.95rem;color:#0f172a;">${escapeHtml(r.teacherName)}</div>
                <div style="font-size:0.72rem;color:#64748b;margin-top:2px;">
                    ${escapeHtml(r.tpManager || '\u2014')} \u00B7 Joined ${escapeHtml(r.joinDate || '\u2014')} \u00B7 Day ${daysIn}
                </div>
            </div>
            <span style="font-size:0.72rem;font-weight:700;padding:3px 10px;border-radius:99px;background:${overallPct===100?'#dcfce7':'rgba(99,102,241,0.1)'};color:${overallPct===100?'#15803d':'#6366f1'};white-space:nowrap;">${overallPct}%</span>
        </div>
        <div style="background:#e2e8f0;border-radius:99px;height:5px;margin-bottom:4px;">
            <div style="background:${barColor};height:5px;border-radius:99px;width:${overallPct}%;transition:width .5s;"></div>
        </div>
        ${stepsHtml}
        <div style="margin-top:4px;">
            <input type="text" placeholder="Add note..." value="${escapeHtml(r.notes || '')}"
                onblur="updateOnboardingField('${r.id}','notes',this.value,this)"
                style="width:100%;padding:6px 10px;border:1px solid #e2e8f0;border-radius:8px;font-size:0.78rem;box-sizing:border-box;color:#374151;">
        </div>
    </div>`;
}
function _buildTrainingPctButtons(recordId, currentPct) {
  var html = '';
  var vals = [25, 50, 75, 100];
  for (var i = 0; i < vals.length; i++) {
    var v = vals[i];
    var bg    = currentPct >= v ? '#6366f1' : '#fff';
    var color = currentPct >= v ? '#fff' : '#6b7280';
    html += '<button type="button"'
      + ' onclick="updateOnboardingField(\'' + recordId + '\',\'trainingPct\',' + v + ',this)"'
      + ' style="font-size:0.65rem;padding:2px 8px;border-radius:99px;border:1px solid #e2e8f0;'
      + 'background:' + bg + ';color:' + color + ';cursor:pointer;">' + v + '%</button>';
  }
  return html;
}

function toggleOnboardingStep(id, field, newVal, btn) {
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i>';
    google.script.run
        .withSuccessHandler(() => loadOnboardingTracker())
        .withFailureHandler(err => { btn.disabled = false; showToast('error', 'Update Failed', err.message || err); })
        .updateOnboardingRecord(id, field, newVal);
}

function updateOnboardingField(id, field, value, el) {
    if (el) el.disabled = true;
    google.script.run
        .withSuccessHandler(() => {
            if (el) el.disabled = false;
            loadOnboardingTracker();
        })
        .withFailureHandler(err => {
            if (el) el.disabled = false;
            showToast('error', 'Update Failed', err.message || err);
        })
        .updateOnboardingRecord(id, field, value);
}

function openAddOnboardingModal() {
    _populateOnboardingModalDropdowns();
    document.getElementById('addOnboardingModal').classList.add('active');
}

function _populateOnboardingModalDropdowns() {
    // Teachers
    const tSel = document.getElementById('obTeacherSelect');
    if (tSel && allTeacherDetailsCache.length > 0) {
        const existing = tSel.querySelectorAll('option:not([disabled])');
        if (!existing.length) {
            allTeacherDetailsCache.forEach(t => {
                const o = document.createElement('option');
                o.value = t.name || t;
                o.textContent = t.name || t;
                tSel.appendChild(o);
            });
        }
    }
    // TP Managers
    const mSel = document.getElementById('obTpManager');
    if (mSel && window.globalTpManagers && window.globalTpManagers.length) {
        if (!mSel.querySelectorAll('option:not([disabled])').length) {
            window.globalTpManagers.forEach(m => {
                const o = document.createElement('option');
                o.value = m; o.textContent = m;
                mSel.appendChild(o);
            });
        }
    }
    // Courses
    const cSel = document.getElementById('obCourse');
    if (cSel) {
        const courseSrc = document.getElementById('migrationCourse');
        if (courseSrc && !cSel.querySelectorAll('option:not([disabled])').length) {
            [...courseSrc.options].forEach(opt => {
                if (!opt.disabled && opt.value) {
                    const o = document.createElement('option');
                    o.value = opt.value; o.textContent = opt.text;
                    cSel.appendChild(o);
                }
            });
        }
    }
}

// Submit new onboarding record
document.addEventListener('DOMContentLoaded', function() {
    const form = document.getElementById('addOnboardingForm');
    if (form) {
        form.addEventListener('submit', function(e) {
            e.preventDefault();
            const data = {
                teacherName:   document.getElementById('obTeacherSelect').value,
                joinDate:      document.getElementById('obJoinDate').value,
                tpManager:     document.getElementById('obTpManager').value,
                primaryCourse: document.getElementById('obCourse').value
            };
            if (!data.teacherName || !data.joinDate) {
                showToast('error', 'Validation', 'Teacher name and join date are required.');
                return;
            }
            showLoading('Adding teacher to tracker...');
            google.script.run
                .withSuccessHandler(() => {
                    hideLoading();
                    document.getElementById('addOnboardingModal').classList.remove('active');
                    form.reset();
                    showToast('success', 'Added', data.teacherName + ' added to onboarding tracker.');
                    loadOnboardingTracker();
                })
                .withFailureHandler(err => { hideLoading(); showToast('error', 'Error', err.message || err); })
                .addOnboardingRecord(data);
        });
    }
});

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// PERSONA CARD GRID (3-per-row, grade badges, pagination)
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
var _personaCurrentPage = 1;

function renderPersonaCards() {
  var grid    = document.getElementById('personaCardsGrid');
  var pageEl  = document.getElementById('personaCardsPagination');
  var countEl = document.getElementById('personaResultsCount');
  if (!grid) return;

  if (!personaResults || personaResults.length === 0) {
    grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:2rem;color:#94a3b8;font-size:0.85rem;">No teachers match the criteria. Try different slots or courses.</div>';
    if (countEl) countEl.textContent = '0 matches';
    if (pageEl)  pageEl.innerHTML = '';
    return;
  }

  var pageSize   = parseInt((document.getElementById('personaPageSizeSelect') || {}).value || '15');
  var total      = personaResults.length;
  var totalPages = Math.ceil(total / pageSize);
  if (_personaCurrentPage > totalPages) _personaCurrentPage = 1;

  var start = (_personaCurrentPage - 1) * pageSize;
  var slice = personaResults.slice(start, start + pageSize);

  if (countEl) countEl.textContent = total + ' match' + (total !== 1 ? 'es' : '');

  var gradeColors = {
    A: { bg:'#dcfce7', text:'#15803d' },
    B: { bg:'#dbeafe', text:'#1d4ed8' },
    C: { bg:'#fef3c7', text:'#d97706' },
    D: { bg:'#fee2e2', text:'#b91c1c' }
  };

  grid.innerHTML = slice.map(function(t, i) {
    var rank = start + i;
    var gc   = gradeColors[t.auditGrade] || { bg:'#f1f5f9', text:'#64748b' };

    var slotRaw  = String(t.slotMatch || '');
    var isMatch  = slotRaw.indexOf('\u2714') !== -1;
    var isPartial= slotRaw.indexOf('\u26A0') !== -1;

    function pColor(v) {
      if (!v || v === 'N/A' || v === 'Not Onboarded' || v === '\u2014') return '#94a3b8';
      var n = parseInt(v); return isNaN(n) ? '#94a3b8' : n >= 80 ? '#15803d' : n >= 50 ? '#d97706' : '#b91c1c';
    }

    var topBadge = rank === 0
      ? '<span style="background:#fbbf24;color:#78350f;border-radius:99px;padding:1px 7px;font-size:0.6rem;font-weight:700;margin-left:4px;">Top Pick</span>'
      : '';
    var rfCount = Number(t.redFlagCount) || 0;
    var rfBadge = rfCount > 0
      ? '<span style="background:#fee2e2;color:#b91c1c;border-radius:99px;padding:1px 7px;font-size:0.6rem;font-weight:700;margin-left:4px;">\u2691 ' + rfCount + '</span>'
      : '';

    var slotHtml = isMatch
      ? '<span style="color:#15803d;font-weight:700;">\u2714 Matches</span>'
      : isPartial
        ? '<span style="color:#d97706;font-size:0.78rem;">' + escapeHtml(slotRaw) + '</span>'
        : '<span style="color:#94a3b8;">\u2717 No match</span>';

    var hasAudit = t.avgClassScore && t.avgClassScore !== 'No data';
    var auditVal = hasAudit
      ? escapeHtml(t.avgClassScore) + (t.auditCount45 ? ' <span style="font-size:0.65rem;color:#94a3b8;">(' + t.auditCount45 + ' sessions)</span>' : '')
      : 'No data';

    var traitLine = (t.traitsMissing && t.traitsMissing.length > 0)
      ? '<div style="font-size:0.7rem;background:#fff7ed;border-radius:6px;padding:4px 8px;color:#92400e;">Missing: ' + escapeHtml(t.traitsMissing.slice(0,2).join(', ')) + (t.traitsMissing.length > 2 ? ' +' + (t.traitsMissing.length-2) + ' more' : '') + '</div>'
      : '<div style="font-size:0.7rem;background:#f0fdf4;border-radius:6px;padding:4px 8px;color:#15803d;">All traits matched \u2714</div>';

    return '<div style="background:#fff;border-radius:14px;border:1.5px solid #e2e8f0;padding:1.1rem;display:flex;flex-direction:column;gap:0.55rem;transition:box-shadow .15s,border-color .15s;cursor:default;" onmouseover="this.style.boxShadow=\'0 4px 18px rgba(99,102,241,0.12)\';this.style.borderColor=\'#c7d2fe\'" onmouseout="this.style.boxShadow=\'\';this.style.borderColor=\'#e2e8f0\'">'
      + '<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:0.5rem;">'
        + '<div style="display:flex;align-items:center;gap:0.55rem;min-width:0;">'
          + '<div style="width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:0.8rem;font-weight:700;color:#fff;flex-shrink:0;">' + escapeHtml((t.teacherName||'').substring(0,2).toUpperCase()) + '</div>'
          + '<div style="min-width:0;">'
            + '<div style="font-weight:700;font-size:0.86rem;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">' + escapeHtml(t.teacherName||'') + topBadge + rfBadge + '</div>'
            + '<div style="font-size:0.7rem;color:#64748b;">' + escapeHtml(t.ageYear||'\u2014') + '</div>'
          + '</div>'
        + '</div>'
        + '<div style="background:' + gc.bg + ';color:' + gc.text + ';border-radius:8px;padding:4px 10px;text-align:center;flex-shrink:0;">'
          + '<div style="font-size:1rem;font-weight:800;line-height:1;">' + (t.auditGrade||'\u2014') + '</div>'
          + '<div style="font-size:0.55rem;font-weight:600;opacity:0.7;">GRADE</div>'
        + '</div>'
      + '</div>'
      + '<div style="display:flex;align-items:center;gap:0.4rem;flex-wrap:wrap;">'
        + '<span style="font-size:0.65rem;color:#94a3b8;background:#f8fafc;border-radius:4px;padding:1px 6px;">#' + (rank+1) + '</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;background:#f8fafc;border-radius:8px;padding:5px 10px;">'
        + '<span style="font-size:0.72rem;color:#64748b;">Slot Match</span>'
        + '<span style="font-size:0.8rem;">' + slotHtml + '</span>'
      + '</div>'
      + '<div style="display:flex;align-items:center;justify-content:space-between;">'
        + '<span style="font-size:0.72rem;color:#64748b;">Audit (45d)</span>'
        + '<span style="font-size:0.8rem;font-weight:600;color:' + gc.text + ';">' + auditVal + '</span>'
      + '</div>'
      + '<div style="border-top:1px solid #f1f5f9;padding-top:0.45rem;display:grid;grid-template-columns:1fr 1fr;gap:3px;font-size:0.72rem;">'
        + '<div style="color:#64748b;">Current: <span style="font-weight:600;color:' + pColor(t.currentCourseProgress) + ';">' + escapeHtml(t.currentCourseProgress||'N/A') + '</span></div>'
        + '<div style="color:#64748b;">Future 1: <span style="font-weight:600;color:' + pColor(t.futureCourse1Progress) + ';">' + escapeHtml(t.futureCourse1Progress||'\u2014') + '</span></div>'
      + '</div>'
      + traitLine
      + '<button onclick="switchPage(\'teacherProfilePage\',\'' + escapeHtml(t.teacherName||'') + '\')" style="margin-top:2px;padding:5px;background:#f8fafc;border:1.5px solid #e2e8f0;border-radius:8px;font-size:0.75rem;color:#475569;cursor:pointer;font-weight:500;transition:background .15s;" onmouseover="this.style.background=\'#ede9fe\';this.style.color=\'#5b21b6\'" onmouseout="this.style.background=\'#f8fafc\';this.style.color=\'#475569\'">View Profile \u2192</button>'
      + '</div>';
  }).join('');

  // Pagination
  if (pageEl) {
    if (totalPages <= 1) { pageEl.innerHTML = ''; return; }
    var pHtml = '';
    for (var p = 1; p <= totalPages; p++) {
      var active = p === _personaCurrentPage;
      pHtml += '<button onclick="_goPersonaPage(' + p + ')" style="width:32px;height:32px;border-radius:8px;border:1.5px solid '+(active?'#6366f1':'#e2e8f0')+';background:'+(active?'#6366f1':'#fff')+';color:'+(active?'#fff':'#374151')+';font-size:0.8rem;font-weight:'+(active?'700':'400')+';cursor:pointer;">' + p + '</button>';
    }
    pageEl.innerHTML = pHtml;
  }
}

function _goPersonaPage(p) {
  _personaCurrentPage = p;
  renderPersonaCards();
  var c = document.getElementById('personaResultsContainer');
  if (c) c.scrollIntoView({ behavior:'smooth', block:'start' });
}

// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
// STUCK MIGRATIONS MODAL
// \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550
var _stuckModalData = null;

function openStuckMigrationsModal() {
  var modal = document.getElementById('stuckMigrationsModal');
  if (!modal) return;
  modal.style.display = 'flex';
  document.body.style.overflow = 'hidden';
  if (_stuckModalData) {
    _renderStuckModalTable(_stuckModalData);
  } else {
    _showStuckModalLoading(true);
    google.script.run
      .withSuccessHandler(function(data) {
        _stuckModalData = (data && data.tickets) ? data.tickets : [];
        _showStuckModalLoading(false);
        _renderStuckModalTable(_stuckModalData);
      })
      .withFailureHandler(function() {
        _showStuckModalLoading(false);
        var tb = document.getElementById('stuckModalTableBody');
        if (tb) tb.innerHTML = '<tr><td colspan="8" style="padding:2rem;text-align:center;color:#ef4444;">Failed to load. Please try again.</td></tr>';
      })
      .getStuckMigrations(7);
  }
}

function _showStuckModalLoading(show) {
  var ld = document.getElementById('stuckModalLoading');
  var em = document.getElementById('stuckModalEmpty');
  if (ld) ld.style.display = show ? 'block' : 'none';
  if (em) em.style.display = 'none';
  var tb = document.getElementById('stuckModalTableBody');
  if (tb && show) tb.innerHTML = '';
}

function closeStuckMigrationsModal() {
  var modal = document.getElementById('stuckMigrationsModal');
  if (modal) modal.style.display = 'none';
  document.body.style.overflow = '';
}

function refreshStuckMigrationsModal() {
  _stuckModalData = null;
  _showStuckModalLoading(true);
  google.script.run
    .withSuccessHandler(function(data) {
      _stuckModalData = (data && data.tickets) ? data.tickets : [];
      _showStuckModalLoading(false);
      _renderStuckModalTable(_stuckModalData);
      if (typeof refreshStuckMigrations === 'function') refreshStuckMigrations();
    })
    .withFailureHandler(function() { _showStuckModalLoading(false); })
    .getStuckMigrations(7);
}

function _renderStuckModalTable(tickets) {
  var tbody   = document.getElementById('stuckModalTableBody');
  var subtitle = document.getElementById('stuckModalSubtitle');
  var emptyEl = document.getElementById('stuckModalEmpty');
  if (!tbody) return;

  // Apply sort from dropdown
  var sortBy = (document.getElementById('stuckModalSortBy')||{}).value || 'daysStuck';
  var sorted = tickets.slice().sort(function(a, b) {
    if (sortBy === 'daysStuck') return (b.daysStuck||0) - (a.daysStuck||0);
    var av = (a[sortBy]||'').toLowerCase(), bv = (b[sortBy]||'').toLowerCase();
    return av < bv ? -1 : av > bv ? 1 : 0;
  });

  if (subtitle) subtitle.textContent = sorted.length + ' WIP ticket' + (sorted.length !== 1 ? 's' : '') + ' stuck for >7 days';

  if (sorted.length === 0) {
    tbody.innerHTML = '';
    if (emptyEl) emptyEl.style.display = 'block';
    return;
  }
  if (emptyEl) emptyEl.style.display = 'none';

  tbody.innerHTML = sorted.map(function(t) {
    var days    = t.daysStuck || 0;
    var urgency = days >= 14 ? '#b91c1c' : days >= 10 ? '#d97706' : '#15803d';
    var urgBg   = days >= 14 ? '#fef2f2' : days >= 10 ? '#fffbeb' : '#f0fdf4';
    var jlid    = escapeHtml(t.jlid || t.learnerUid || '—');
    var learner = escapeHtml(t.learnerName || t.subject || '—');
    var from    = escapeHtml(t.fromTeacher || t.current_teacher || '—');
    var to      = escapeHtml(t.toTeacher || t.new_teacher || '—');
    var stage   = escapeHtml(t.stage || t.stageLabel || '—');
    var created = escapeHtml(t.createdDate || '—');
    var link    = t.hubspotLink || t.ticketUrl || '#';
    return '<tr style="border-bottom:1px solid #f1f5f9;" onmouseover="this.style.background=\'#f8fafc\'" onmouseout="this.style.background=\'\'">'

function filterStuckModal(searchVal) {
  if (!_stuckModalData) return;
  var stageFilter = (document.getElementById('stuckModalStageFilter')||{}).value || '';

  var filtered = _stuckModalData.filter(function(t) {
    var hay = [t.jlid||t.learnerUid, t.learnerName||t.subject, t.fromTeacher||t.current_teacher, t.toTeacher||t.new_teacher, t.stage||t.stageLabel].join(' ').toLowerCase();
    var matchQ     = !q || hay.indexOf(q) > -1;
    var matchStage = !stageFilter || (t.stage||t.stageLabel||'').indexOf(stageFilter) > -1;
    return matchQ && matchStage;
  });
  _renderStuckModalTable(filtered);
}

function sortStuckModal(key) {
  if (!_stuckModalData) return;
  var sorted = _stuckModalData.slice().sort(function(a,b){ return (b[key]||0)-(a[key]||0); });
  _renderStuckModalTable(sorted);
}

function loadLearnerMigrationPage() {
    _mcSetRegistryLoading(true);
    google.script.run
        .withSuccessHandler(_mcHandleRegistryData)
        .withFailureHandler(function(err) {
            _mcSetRegistryLoading(false);
            showToast('error', 'Migration Center', err.message || 'Failed to load registry');
        })
        .getMigrationRegistry();
}

function _mcHandleRegistryData(result) {
    _mcSetRegistryLoading(false);
    if (!result || !result.success) {
        showToast('error', 'Migration Center', (result && result.message) || 'Unknown error');
        return;
    }
    var stats   = result.stats   || {};
    var tickets = result.tickets || [];
    mcRegistryData = tickets;
    mcFilteredData = tickets.slice();

    var setKpi = function(id, val) { var el = document.getElementById(id); if (el) el.textContent = val; };
    setKpi('mcKpiTotal',     stats.total);
    setKpi('mcKpiPending',   stats.pending);
    setKpi('mcKpiCompleted', stats.completed);
    setKpi('mcKpiRate',      stats.successRate + '%');

    _mcRenderTable(mcFilteredData);
    _mcComputeInsights(mcRegistryData);
}

function _mcSetRegistryLoading(show) {
    var tbody = document.getElementById('mcRegistryBody');
    if (!tbody) return;
    if (show) {
        tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;padding:3rem;color:var(--text-muted);">' +
            '<i class="fas fa-spinner fa-spin" style="font-size:1.5rem;display:block;margin-bottom:0.75rem;"></i>' +
            'Loading registry...</td></tr>';
    }
}

function filterMigrationRegistry() {
    var q     = (document.getElementById('mcSearch')     && document.getElementById('mcSearch').value     || '').toLowerCase();
    var stage = (document.getElementById('mcStageFilter') && document.getElementById('mcStageFilter').value || '');
    mcFilteredData = mcRegistryData.filter(function(t) {
        var hay = [t.jlid, t.learnerName, t.fromTeacher, t.toTeacher, t.reason, t.stageLabel].join(' ').toLowerCase();
        return (!q || hay.includes(q)) && (!stage || t.stageLabel === stage);
    });
    _mcRenderTable(mcFilteredData);
}

function _mcRenderTable(tickets) {
    var tbody = document.getElementById('mcRegistryBody');
    var empty = document.getElementById('mcRegistryEmpty');
    if (!tbody) return;

    if (!tickets || tickets.length === 0) {
        tbody.innerHTML = '';
        if (empty) empty.style.display = 'block';
        return;
    }
    if (empty) empty.style.display = 'none';

    function stageBadge(label) {
        if (label === 'Migration Completed')       return 'background:#d1fae5;color:#065f46;';
        if (label.indexOf('Rejected')  > -1)       return 'background:#fee2e2;color:#991b1b;';
        if (label.indexOf('Approved')  > -1)       return 'background:#dbeafe;color:#1e40af;';
        if (label.indexOf('Execution') > -1)       return 'background:#ede9fe;color:#5b21b6;';
        if (label === 'Migration Triggered')        return 'background:#fef3c7;color:#92400e;';
        return 'background:#f1f5f9;color:#475569;';
    }
    function daysColor(d) { return d > 14 ? '#ef4444' : d > 7 ? '#f59e0b' : '#10b981'; }

    tbody.innerHTML = tickets.map(function(t) {
        return '<tr>' +
          '<td>' +
            '<div style="font-weight:700;font-size:0.85rem;color:var(--dark);">' + escapeHtml(t.learnerName) + '</div>' +
            '<div style="font-size:0.72rem;color:var(--text-muted);">' + escapeHtml(t.jlid) + (t.course ? ' · ' + escapeHtml(t.course) : '') + '</div>' +
            '<div style="font-size:0.7rem;color:#94a3b8;margin-top:2px;">' + escapeHtml(t.createdDate) + '</div>' +
          '</td>' +
          '<td>' +
            '<div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">' +
              '<span style="font-size:0.8rem;font-weight:600;color:var(--dark);">' + escapeHtml(t.fromTeacher) + '</span>' +
              '<i class="fas fa-arrow-right" style="color:#94a3b8;font-size:0.7rem;"></i>' +
              '<span style="font-size:0.8rem;font-weight:600;color:#6366f1;">' + escapeHtml(t.toTeacher) + '</span>' +
            '</div>' +
            '<div style="font-size:0.7rem;color:#94a3b8;margin-top:3px;">' + escapeHtml(t.reason) + '</div>' +
          '</td>' +
          '<td><span style="font-size:0.72rem;font-weight:600;padding:3px 9px;border-radius:99px;white-space:nowrap;' + stageBadge(t.stageLabel) + '">' + escapeHtml(t.stageLabel) + '</span></td>' +
          '<td style="text-align:center;"><span style="font-size:0.88rem;font-weight:700;color:' + daysColor(t.daysInStage) + ';">' + t.daysInStage + '</span></td>' +
          '<td style="text-align:right;"><a href="' + escapeHtml(t.hubspotLink) + '" target="_blank" ' +
            'style="font-size:0.75rem;color:#6366f1;text-decoration:none;padding:3px 9px;border:1px solid #e2e8f0;border-radius:6px;">' +
            '<i class="fas fa-external-link-alt"></i> HS</a></td>' +
        '</tr>';
    }).join('');
}

function _mcComputeInsights(tickets) {
    var insightsEl = document.getElementById('mcAiInsightsContent');
    var riskEl     = document.getElementById('mcRiskScore');
    var loadEl     = document.getElementById('mcLoadBar');
    if (!insightsEl) return;

    var WIP_STAGES = ['WIP','WIP - TP Approval Pending','WIP - CLS Approval Pending',
                      'WIP - Approved by CLS','WIP - PR Approval Pending','Execution Pending'];
    var wipTickets      = tickets.filter(function(t) { return WIP_STAGES.indexOf(t.stageLabel) > -1; });
    var rejectedTickets = tickets.filter(function(t) { return t.stageLabel === 'WIP - Rejected by CLS'; });
    var stuckTickets    = wipTickets.filter(function(t) { return t.daysInStage > 7; });
    var avgDaysStuck    = stuckTickets.length > 0
        ? Math.round(stuckTickets.reduce(function(s,t){ return s + t.daysInStage; }, 0) / stuckTickets.length) : 0;

    var riskRaw  = (stuckTickets.length * 3) + (rejectedTickets.length * 5) + (avgDaysStuck / 2);
    var riskPct  = Math.min(100, Math.round(riskRaw));
    var loadPct  = wipTickets.length > 0 ? Math.min(100, Math.round((stuckTickets.length / wipTickets.length) * 100)) : 0;
    var riskLabel = riskPct >= 70 ? 'High Risk' : riskPct >= 40 ? 'Moderate' : 'Low Risk';
    var riskColor = riskPct >= 70 ? '#ef4444' : riskPct >= 40 ? '#f59e0b' : '#10b981';

    insightsEl.innerHTML =
        '<div style="display:flex;flex-direction:column;gap:6px;font-size:0.8rem;margin-bottom:1rem;">' +
          '<div style="display:flex;justify-content:space-between;color:rgba(196,181,253,0.85);"><span>WIP tickets</span><span style="font-weight:700;color:#e2e8f0;">' + wipTickets.length + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;color:rgba(196,181,253,0.85);"><span>Stuck &gt;7 days</span><span style="font-weight:700;color:#fbbf24;">' + stuckTickets.length + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;color:rgba(196,181,253,0.85);"><span>Rejected by CLS</span><span style="font-weight:700;color:#f87171;">' + rejectedTickets.length + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;color:rgba(196,181,253,0.85);"><span>Avg days stuck</span><span style="font-weight:700;color:#e2e8f0;">' + avgDaysStuck + 'd</span></div>' +
          '<div style="display:flex;justify-content:space-between;align-items:center;border-top:1px solid rgba(255,255,255,0.1);padding-top:6px;margin-top:2px;">' +
            '<span style="color:rgba(196,181,253,0.85);">Assessment</span>' +
            '<span style="font-weight:700;font-size:0.82rem;padding:2px 10px;border-radius:99px;background:' + riskColor + '22;color:' + riskColor + ';border:1px solid ' + riskColor + '44;">' + riskLabel + '</span>' +
          '</div>' +
        '</div>';

    if (riskEl) {
        riskEl.style.display = 'block';
        var rv = document.getElementById('mcRiskValue'); if (rv) rv.textContent = riskPct + '%';
        var rb = document.getElementById('mcRiskBar');   if (rb) rb.style.width = riskPct + '%';
    }
    if (loadEl) {
        loadEl.style.display = 'block';
        var lv = document.getElementById('mcLoadValue');    if (lv) lv.textContent = stuckTickets.length + '/' + wipTickets.length;
        var lb = document.getElementById('mcLoadBarFill');  if (lb) lb.style.width = loadPct + '%';
    }
}

function runMigrationAiAnalysis() {
    var btn = document.getElementById('mcRunAnalysisBtn');
    if (btn) btn.innerHTML = '<i class="fas fa-spinner fa-spin" style="margin-right:6px;"></i>Analysing...';
    google.script.run
        .withSuccessHandler(function(result) {
            if (btn) btn.innerHTML = '<i class="fas fa-play-circle" style="margin-right:6px;"></i>Run Analysis';
            if (result && result.success) {
                mcRegistryData = result.tickets || [];
                _mcComputeInsights(mcRegistryData);
                showToast('success', 'AI Insights', 'Analysis updated from live data.');
            }
        })
        .withFailureHandler(function() {
            if (btn) btn.innerHTML = '<i class="fas fa-play-circle" style="margin-right:6px;"></i>Run Analysis';
        })
        .getMigrationRegistry();
}

function openNewMigrationWizard() {
    mwState = { step: 1, jlid: '', learnerData: null, selectedTeacher: null, teacherResults: [] };
    _mwShowStep(1);
    var ji = document.getElementById('mwJlidInput'); if (ji) ji.value = '';
    var lc = document.getElementById('mwLearnerCard'); if (lc) lc.style.display = 'none';
    var sl = document.getElementById('mwStep1Loading'); if (sl) sl.style.display = 'none';
    var tr = document.getElementById('mwTeacherResults'); if (tr) tr.style.display = 'none';
    document.getElementById('newMigrationWizardModal').classList.add('active');
}

function closeNewMigrationWizard() {
    document.getElementById('newMigrationWizardModal').classList.remove('active');
}

function _mwShowStep(n) {
    mwState.step = n;
    [1, 2, 3].forEach(function(i) {
        var body = document.getElementById('mwStep' + i);
        var pill = document.getElementById('mwStep' + i + 'Pill');
        if (body) body.style.display = (i === n) ? 'block' : 'none';
        if (pill) {
            pill.classList.remove('mw-active', 'mw-done');
            if (i < n)   pill.classList.add('mw-done');
            if (i === n) pill.classList.add('mw-active');
        }
    });
    var back    = document.getElementById('mwBackBtn');
    var next    = document.getElementById('mwNextBtn');
    var confirm = document.getElementById('mwConfirmBtn');
    if (back)    back.style.display    = n > 1 ? 'inline-flex' : 'none';
    if (next)    next.style.display    = n < 3 ? 'inline-flex' : 'none';
    if (confirm) confirm.style.display = n === 3 ? 'inline-flex' : 'none';
}

function mwGoNext() {
    if (mwState.step === 1) {
        if (!mwState.learnerData) { showToast('error', 'Wizard', 'Please fetch a learner first.'); return; }
        _mwPopulateStep2();
        _mwShowStep(2);
    } else if (mwState.step === 2) {
        if (!mwState.selectedTeacher) { showToast('error', 'Wizard', 'Please select a teacher.'); return; }
        _mwPopulateStep3();
        _mwShowStep(3);
    }
}

function mwGoBack() {
    if (mwState.step > 1) _mwShowStep(mwState.step - 1);
}

function mwFetchLearner() {
    var jlid = (document.getElementById('mwJlidInput').value || '').trim();
    if (!jlid) { showToast('error', 'Wizard', 'Please enter a JLID.'); return; }

    var lc = document.getElementById('mwLearnerCard'); if (lc) lc.style.display = 'none';
    var sl = document.getElementById('mwStep1Loading'); if (sl) sl.style.display = 'block';
    google.script.run
        .withSuccessHandler(function(result) {

            if (!result || !result.success) {
                showToast('error', 'Learner Fetch', (result && result.message) || 'Not found.'); return;
            }

        if (globalCourses && globalCourses.length) {
            courseEl.innerHTML = globalCourses.map(function(c) {

function mwFindTeachers() {
    var day    = (document.getElementById('mwSlotDay')   && document.getElementById('mwSlotDay').value)   || '';
    var date   = (document.getElementById('mwSlotDate')  && document.getElementById('mwSlotDate').value)  || new Date().toISOString().split('T')[0];
    var time   = (document.getElementById('mwSlotTime')  && document.getElementById('mwSlotTime').value)  || '';
    var course = (document.getElementById('mwCourse')    && document.getElementById('mwCourse').value)    || '';

    if (!course) { showToast('error', 'Wizard', 'Please select a course.'); return; }

    var slotStr  = (day && time) ? (day + ' ' + time) : '';
    var searchData = {
        requestedDate:  date,
        requestedSlot:  slotStr,
        requestedSlots: slotStr ? [{ date: date, slot: slotStr }] : [],
        currentCourse:  course,
        futureCourse1:  '', futureCourse2: '', futureCourse3: '',
        learnerAge:     (document.getElementById('mwAge') && document.getElementById('mwAge').value) || '',
        techTraits:     ((document.getElementById('mwTechTraits') && document.getElementById('mwTechTraits').value) || '').trim(),
        mathTraits:     ((document.getElementById('mwMathTraits') && document.getElementById('mwMathTraits').value) || '').trim()
    };

    var sl = document.getElementById('mwStep2Loading'); if (sl) sl.style.display = 'block';
    var tr = document.getElementById('mwTeacherResults'); if (tr) tr.style.display = 'none';

    google.script.run
        .withSuccessHandler(function(result) {
            var sl2 = document.getElementById('mwStep2Loading'); if (sl2) sl2.style.display = 'none';
            if (!result || !result.success) {
                showToast('error', 'Teacher Search', (result && result.message) || 'Search failed.'); return;
            }

            var sl3 = document.getElementById('mwStep2Loading'); if (sl3) sl3.style.display = 'none';
            showToast('error', 'Teacher Search', err.message || String(err));

        var score     = Math.round(t._rankScore || t.matchScore || 0);
        var barColor  = score >= 80 ? '#10b981' : score >= 60 ? '#6366f1' : '#f59e0b';
        var grade     = t.auditGrade || '—';

        var gradeColor  = gradeColors[grade] || '#94a3b8';

        var slotOk      = String(t.slotMatch || '').indexOf('\u2714') > -1 || String(t.slotMatch || '').toLowerCase().indexOf('match all') > -1;
        var name        = t.teacherName || t.name || '';
        return '<div class="mw-teacher-card ' + (isSelected ? 'selected' : '') + '" onclick="mwSelectTeacher(' + i + ')" id="mwTCard_' + i + '">' +
          '<div style="width:28px;height:28px;background:' + barColor + '18;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:800;color:' + barColor + ';flex-shrink:0;">' + (i+1) + '</div>' +
          '<div style="flex:1;min-width:0;">' +
            '<div style="font-size:0.88rem;font-weight:700;color:#0f172a;">' + escapeHtml(name) + '</div>' +
            '<div style="font-size:0.72rem;color:#64748b;margin-top:2px;">Audit: <strong style="color:' + gradeColor + ';">' + grade + '</strong>' +
              (slotOk ? ' <span style="color:#10b981;margin-left:8px;"><i class="fas fa-calendar-check"></i> Slot free</span>' : '') +
            '</div>' +
          '</div>' +
          '<div style="text-align:right;flex-shrink:0;">' +
            '<div style="font-size:1rem;font-weight:800;color:' + barColor + ';">' + score + '</div>' +
            '<div style="font-size:0.65rem;color:#94a3b8;">score</div>' +
          '</div>' +
        '</div>';
    }).join('');
    container.style.display = 'flex';
}

}

function _mwPopulateStep3() {
    var d = mwState.learnerData;
    var t = mwState.selectedTeacher;
    if (!d || !t) return;
    var name = t.teacherName || t.name || '';
    var summary = document.getElementById('mwReviewSummary');
    if (!summary) return;
    summary.innerHTML =
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:1rem;">' +
          '<div><div style="font-size:0.7rem;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;">Learner</div>' +
            '<div style="font-weight:700;">' + escapeHtml(d.learnerName || '—') + ' <span style="font-weight:400;color:#64748b;">(' + escapeHtml(d.jlid || '') + ')</span></div></div>' +
          '<div><div style="font-size:0.7rem;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;">Course</div>' +
            '<div style="font-weight:600;">' + escapeHtml(d.course || '—') + '</div></div>' +
          '<div><div style="font-size:0.7rem;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;">From Teacher</div>' +
            '<div style="font-weight:600;color:#64748b;">' + escapeHtml(d.currentTeacher || '—') + '</div></div>' +
          '<div><div style="font-size:0.7rem;text-transform:uppercase;color:#94a3b8;margin-bottom:4px;">To Teacher</div>' +
            '<div style="font-weight:700;color:#6366f1;">' + escapeHtml(name) + '</div></div>' +
        '</div>';
}

function mwConfirmMigration() {
    var reason = document.getElementById('mwReason') && document.getElementById('mwReason').value;
    if (!reason) { showToast('error', 'Wizard', 'Please select a migration reason.'); return; }
    var d   = mwState.learnerData;
    var t   = mwState.selectedTeacher;
    var cls = document.getElementById('mwClsManager') && document.getElementById('mwClsManager').value;
    if (!d || !t) { showToast('error', 'Wizard', 'Learner or teacher data missing.'); return; }
    var name = t.teacherName || t.name || '';
    var migrationData = {
        jlid:                d.jlid,
        learner:             d.learnerName,
        oldTeacher:          d.currentTeacher,
        newTeacher:          name,
        course:              d.course,
        reason:              reason,
        clsManager:          cls || d.clsManagerName || '',
        parentEmail:         d.parentEmail || '',
        parentName:          d.parentName  || '',
        notes:               (document.getElementById('mwNotes') && document.getElementById('mwNotes').value) || '',
        sendEmailToTeacher:  true,
        migrationIntervenedBy: (currentUser && currentUser.username) || ''
    };
    showConfirm(
        'Confirm Migration',
        'Migrate ' + migrationData.learner + ' to ' + migrationData.newTeacher + '?',
        function(confirmed) {
            if (!confirmed) return;
            showLoading('Processing migration...');
            google.script.run
                .withSuccessHandler(function(result) {
                    hideLoading();
                    closeNewMigrationWizard();
                    if (result && result.success) {
                        showToast('success', 'Migration Initiated', result.message || 'Migration email sent.');
                        loadLearnerMigrationPage();
                    } else {
                        showToast('error', 'Migration Failed', (result && result.message) || 'Unknown error.');
                    }
                })
                .withFailureHandler(function(err) {
                    hideLoading();
                    showToast('error', 'Migration Failed', err.message || String(err));
                })
                .sendMigrationEmail(migrationData, []);
        }
    );
}
</script>
