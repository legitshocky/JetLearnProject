<style>
    :root {
      /* Clean Light + Indigo Brand Theme */
      --primary: #6366f1;
      --primary-light: #818cf8;
      --primary-dark: #4f46e5;
      --secondary: #f8f9ff;
      --accent: #ec4899;
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;
      --info: #3b82f6;
      --dark: #111827;
      --light: #f4f5f7;
      --gray: #e5e7eb;
      --gray-100: #f3f4f6;
      --gray-200: #e5e7eb;
      --gray-300: #d1d5db;
      --gray-400: #9ca3af;
      --gray-500: #6b7280;
      --gray-600: #4b5563;
      --gray-700: #374151;
      --gray-800: #1f2937;
      --gray-900: #111827;
      --text: #374151;
      --text-light: #6b7280;
      --text-muted: #9ca3af;
      
      /* Enhanced Shadows */
      --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px -1px rgba(0, 0, 0, 0.1);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -2px rgba(0, 0, 0, 0.1);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -4px rgba(0, 0, 0, 0.1);
      --shadow-xl: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
      --shadow-2xl: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
      
      /* Glassmorphism */
      --glass-bg: rgba(255, 255, 255, 0.85);
      --glass-border: rgba(255, 255, 255, 0.2);
      
      /* Transitions */
      --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-fast: all 0.15s cubic-bezier(0.4, 0, 0.2, 1);
      --transition-slow: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
      
      /* Border Radius */
      --radius-sm: 0.375rem;
      --radius-md: 0.5rem;
      --radius-lg: 0.75rem;
      --radius-xl: 1rem;
      --radius-2xl: 1.5rem;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html {
      scroll-behavior: smooth;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      color: var(--text);
      background-color: var(--light);
      line-height: 1.6;
      transition: background-color 0.3s ease, color 0.3s ease;
      overflow-x: hidden;
    }
    
    body.loaded {
      animation: fadeIn 0.5s ease-in-out;
    }

    
    @keyframes cardSlideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes sidebarItemIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes headerSlideDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes badgePop {
      0%   { transform: scale(0.6); opacity: 0; }
      60%  { transform: scale(1.2); }
      100% { transform: scale(1); opacity: 1; }
    }
    
    
    
    /* ============================================= */
    /* START: PROFESSIONAL DARK MODE STYLES          */
    /* ============================================= */
    .theme-switch {
      position: relative;
      display: inline-block;
      width: 50px;
      height: 28px;
      align-self: center;
    }
    .theme-switch input {
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: var(--primary-light);
      transition: .4s;
      border-radius: 28px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 20px;
      width: 20px;
      left: 4px;
      bottom: 4px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    .slider .fa-sun, .slider .fa-moon {
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        color: white;
        font-size: 0.9rem;
        transition: opacity 0.3s ease;
    }
    .slider .fa-sun {
        left: 7px;
        opacity: 1;
    }
    .slider .fa-moon {
        right: 7px;
        opacity: 0;
    }

    input:checked + .slider {
      background-color: var(--secondary);
    }
    input:checked + .slider:before {
      transform: translateX(22px);
      background-color: var(--primary);
    }
    input:checked + .slider .fa-sun {
        opacity: 0;
    }
    input:checked + .slider .fa-moon {
        opacity: 1;
        color: var(--primary);
    }

    /* Dark mode toggle — deeper variant of light theme */
    body.dark-mode {
      --light: #0f0f23;
      --secondary: #1a1a35;
      --gray: rgba(255,255,255,0.09);
      --dark: #f1f5f9;
      --text: rgba(255,255,255,0.78);
      --text-light: rgba(255,255,255,0.48);
    }
    body.dark-mode .main-content {
      background: #0f0f23 !important;
    }
    body.dark-mode .app-footer {
      background: #0b0b22 !important;
      border-color: rgba(255,255,255,0.07) !important;
      color: rgba(255,255,255,0.35) !important;
    }
    body.dark-mode .dashboard-section,
    body.dark-mode .main-metric-card,
    body.dark-mode .form-container,
    body.dark-mode .audit-log-container,
    body.dark-mode .modal,
    body.dark-mode .kpi-card,
    body.dark-mode .health-card,
    body.dark-mode .learner-profile-card,
    body.dark-mode .ai-summary-card,
    body.dark-mode .timeline-card,
    body.dark-mode .settings-form-container,
    body.dark-mode .health-container,
    body.dark-mode .report-section,
    body.dark-mode .report-filters {
      background: #1a1a35 !important;
      border-color: rgba(255,255,255,0.08) !important;
      color: rgba(255,255,255,0.8) !important;
    }
    body.dark-mode .form-control { background: #252545 !important; border-color: rgba(255,255,255,0.1) !important; color: white !important; }
    body.dark-mode .audit-table th, body.dark-mode .data-table th { background: #252545 !important; color: rgba(255,255,255,0.5) !important; }
    body.dark-mode .audit-table td, body.dark-mode .data-table td { color: rgba(255,255,255,0.75) !important; border-color: rgba(255,255,255,0.05) !important; }
    body.dark-mode .page-title { color: white !important; }
    body.dark-mode .dashboard-section-title, body.dark-mode .form-title, body.dark-mode .modal-title { color: white !important; }
    body.dark-mode .main-metric-value { color: white !important; }

    /* Dark mode components — inherit base dark styles, no overrides needed */

    /* dark-mode text — all handled by base dark variables now */

    body.dark-mode .form-select {
        background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='%23B0B3B8'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7' /%3e%3c/svg%3e");
    }

    body.dark-mode .audit-table th,
    body.dark-mode .data-table th {
      background-color: #18191A;
      border-bottom-color: var(--gray);
    }

    body.dark-mode .btn-outline {
      color: var(--dark);
      border-color: var(--gray);
    }
    body.dark-mode .btn-outline:hover {
      background-color: #3A3B3C;
      color: var(--dark);
    }

    body.dark-mode .login-right {
      background-color: var(--secondary);
    }

    body.dark-mode .dropdown-content {
      background-color: var(--secondary);
      border: 1px solid var(--gray);
    }
    body.dark-mode .dropdown-content a {
      color: var(--text);
    }
    body.dark-mode .dropdown-content a:hover {
      background-color: var(--primary-light);
      color: white;
    }

    body.dark-mode .upload-area {
      background: #f8f9ff;
      border-color: rgba(99,102,241,0.25);
    }
    body.dark-mode .upload-area:hover {
      border-color: var(--primary-light);
    }
    body.dark-mode .kpi-card,
    body.dark-mode .health-card {
      background-color: var(--secondary);
      border: 1px solid var(--gray);
    }
    body.dark-mode .ai-summary,
    body.dark-mode .sales-note-box {
      background-color: #18191A;
      border-color: var(--gray);
    }
    body.dark-mode .page-tabs {
        border-bottom-color: var(--gray);
    }
    body.dark-mode .modal-header,
    body.dark-mode .modal-footer {
        border-color: var(--gray);
    }
    body.dark-mode .toast {
        background-color: #242526;
        border: 1px solid #3A3B3C;
        color: var(--text);
    }
     body.dark-mode .toast-title {
        color: var(--dark);
     }
    /* ============================================= */
    /* END: PROFESSIONAL DARK MODE STYLES            */
    /* ============================================= */

    /* ── CORE LAYOUT ── */
    .app-container {
      display: grid;
      grid-template-columns: 260px 1fr;
      height: 100vh;
      overflow: hidden;
    }

    /* Sidebar — Deep Dark */
    .sidebar {
      background: linear-gradient(180deg, #0b0b22 0%, #0e0e28 55%, #110a24 100%);
      color: white;
      padding: 0;
      position: relative;
      z-index: 10;
      box-shadow: 4px 0 30px rgba(0,0,0,0.5);
      overflow: hidden;
      border-right: 1px solid rgba(99,102,241,0.12);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    .sidebar::before {
      content: '';
      position: absolute;
      top: -100px; left: -80px;
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(99,102,241,0.15) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: orbPulse 12s ease-in-out infinite;
    }
    .sidebar::after {
      content: '';
      position: absolute;
      bottom: 80px; right: -60px;
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(168,85,247,0.1) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
      animation: orbPulse 16s ease-in-out infinite reverse;
    }

    .sidebar-header {
      padding: 1.5rem 1.5rem 1.25rem;
      border-bottom: 1px solid rgba(99,102,241,0.15);
      position: relative;
      z-index: 1;
      flex-shrink: 0;
    }
    .sidebar-header h2 {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 1.2rem;
      letter-spacing: -0.03em;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: linear-gradient(135deg, #ffffff 30%, #c4b5fd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .sidebar-header h2 i {
      font-size: 1.4rem;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(129,140,248,0.5));
    }

    .sidebar-menu {
      padding: 0.5rem 1rem;
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      scrollbar-width: none;     /* hide scrollbar in sidebar */
    }
    .sidebar-menu::-webkit-scrollbar { display: none; }

    .menu-item {
      display: flex;
      align-items: center;
      padding: 0.7rem 1rem;
      border-radius: 10px;
      margin-bottom: 0.2rem;
      cursor: pointer;
      transition: all 0.22s cubic-bezier(0.4,0,0.2,1);
      color: rgba(255,255,255,0.5);
      position: relative;
      z-index: 1;
      animation: sidebarItemIn 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .menu-item:nth-child(1)  { animation-delay: 0.04s; }
    .menu-item:nth-child(2)  { animation-delay: 0.08s; }
    .menu-item:nth-child(3)  { animation-delay: 0.12s; }
    .menu-item:nth-child(4)  { animation-delay: 0.16s; }
    .menu-item:nth-child(5)  { animation-delay: 0.20s; }
    .menu-item:nth-child(6)  { animation-delay: 0.24s; }
    .menu-item:nth-child(7)  { animation-delay: 0.28s; }
    .menu-item:nth-child(8)  { animation-delay: 0.32s; }
    .menu-item:nth-child(9)  { animation-delay: 0.36s; }
    .menu-item:nth-child(10) { animation-delay: 0.40s; }
    .menu-item:nth-child(11) { animation-delay: 0.44s; }
    .menu-item:nth-child(12) { animation-delay: 0.48s; }
    .menu-item:nth-child(13) { animation-delay: 0.52s; }
    .menu-item:nth-child(14) { animation-delay: 0.56s; }
    .menu-item:nth-child(15) { animation-delay: 0.60s; }
    .menu-item:nth-child(16) { animation-delay: 0.64s; }
    .menu-item:nth-child(17) { animation-delay: 0.68s; }
    .menu-item:hover {
      background: rgba(99,102,241,0.14);
      color: white;
      transform: translateX(4px);
      border: 1px solid rgba(99,102,241,0.18);
    }
    .menu-item.active {
      background: linear-gradient(90deg, rgba(99,102,241,0.25), rgba(168,85,247,0.12));
      color: white;
      border: 1px solid rgba(99,102,241,0.28);
      box-shadow: 0 2px 12px rgba(99,102,241,0.2);
    }
    .menu-item i {
      margin-right: 0.75rem;
      font-size: 1rem;
      width: 22px;
      text-align: center;
      color: rgba(255,255,255,0.35);
      transition: all 0.2s ease;
    }
    .menu-item:hover i, .menu-item.active i {
      color: #818cf8;
      transform: scale(1.12);
    }
    .menu-item span { font-weight: 500; font-size: 0.875rem; }
    .menu-item .badge {
      margin-left: auto;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white;
      font-size: 0.65rem;
      padding: 0.18rem 0.5rem;
      border-radius: 999px;
      animation: badgePop 0.4s cubic-bezier(0.34,1.56,0.64,1) 1s both;
    }

    .sidebar-footer {
      flex-shrink: 0;
      padding: 0.875rem 1rem;
      border-top: 1px solid rgba(255,255,255,0.08);
      position: relative;
      z-index: 2;
    }

    .user-profile {
      display: flex;
      align-items: center;
      gap: 0.625rem;
      min-width: 0;
    }

    .user-avatar {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      color: #ffffff;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border: 1px solid rgba(129,140,248,0.35);
      box-shadow: 0 2px 8px rgba(99,102,241,0.35);
    }

    .user-info {

    }

    .user-name {

    /* logout-btn now styled in login section above */

      overflow-y: auto;

      position: relative;
      display: flex;
      flex-direction: column;

    /* Header animate in */
    /* Dashboard section title gradient */
    /* Sub metric labels */

    /* Data table */

    /* AI summary */

    /* Settings / health containers */

      background: #ffffff;
      border: 1px solid #e9eaf0;
      border-radius: 14px;

      animation: cardSlideUp 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    /* Light theme text */
    strong { color: #111827; }
    label { color: #374151; }
    



    .page-title {
      font-family: 'Sora', sans-serif;
      font-weight: 800;
      font-size: 1.75rem;
      letter-spacing: -0.04em;
      color: #111827;
      animation: headerSlideDown 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .page-title span { color: var(--primary); }

    /* Header layout — title LEFT, actions RIGHT */
    .header {
      display: flex !important;
      justify-content: space-between !important;
      align-items: center !important;
      width: 100%;
    }
    .header-actions {
      display: flex;
      gap: 0.75rem;
      align-items: center;
      margin-left: auto;       /* always push to right */

    }

      padding: 0.75rem 1.25rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      transition: var(--transition);
      border: none;

     /* Dropdown Button styles */
    .dropdown {
        position: relative;
        display: inline-block;

    /* Dashboard */
    .dashboard-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .main-metric-card {

      border: 1px solid #e9eaf0;
      border-radius: 14px;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;

    .donut-chart-container {

    }
    .donut-center-text {

    .activity-icon.email { background-color: rgba(33, 150, 243, 0.1); color: var(--info); }

    .activity-details {

    .activity-title {

    .activity-description {
      font-size: 0.85rem;

    .activity-time {

    .form-container {
      background: #ffffff;
      border: 1px solid #e9eaf0;
      border-radius: 14px;

      margin: 0 auto;
      animation: cardSlideUp 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    .form-title {
      font-size: 1.4rem;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      color: #111827;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 1.5rem;
      margin-bottom: 1.5rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group.full-width {
      grid-column: span 2;
    }

    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #374151;
      font-size: 0.875rem;
    }

    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      font-family: inherit;
      background: #ffffff;
      color: #111827;
      transition: all 0.22s ease;

    .form-control::placeholder { color: #9ca3af; }
    .form-control:hover:not(:focus) { border-color: #818cf8; }

      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
      background: #ffffff;
    }

    .form-select {
      appearance: none;
      background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 24 24' stroke='currentColor'%3e%3cpath stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='M19 9l-7 7-7-7' /%3e%3c/svg%3e");
      background-repeat: no-repeat;
      background-position: right 0.75rem center;
      background-size: 1rem;
    }

    .radio-group {
      display: flex;
      gap: 1.5rem;
    }

    .radio-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .radio-input {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
    }

    .form-actions {
      display: flex;
      justify-content: flex-end;
      gap: 1rem;
      margin-top: 1.5rem;
    }

    .class-session-group .form-grid {
        grid-template-columns: 1fr 1fr 1fr 1fr auto;
        gap: 0.5rem;
        align-items: flex-end;
    }
    .class-session-group .form-group {
        margin-bottom: 0;
    }
    .visually-hidden {
      position: absolute;
      width: 1px;
      height: 1px;
      margin: -1px;
      padding: 0;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      border: 0;
    }

    .audit-log-container {
      background: #ffffff;
      border: 1px solid #e9eaf0;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(99,102,241,0.07), 0 1px 3px rgba(0,0,0,0.06);
      animation: cardSlideUp 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }

    .audit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }

    .audit-filters {
      display: flex;
      gap: 1rem;
      align-items: center;
      flex-wrap: wrap;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .filter-label {
      font-size: 0.9rem;
      color: var(--text-light);
    }

    .table-container {
      overflow-x: auto;
      border-radius: 12px;
      border: 1px solid #e9eaf0;
      overflow: hidden;
    }

    .audit-table {
      width: 100%;
      border-collapse: collapse;
    }

    .audit-table th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: #f8f9ff;
      font-weight: 600;
      font-size: 0.72rem;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-family: 'Sora', sans-serif;
      border-bottom: 1px solid #e9eaf0;
    }
    .audit-table td {
      padding: 0.75rem 1rem;
      border-bottom: 1px solid #f3f4f6;
      font-size: 0.875rem;
      color: #374151;
      transition: background 0.15s ease;
    }
    .audit-table tr:hover td { background: #f8f9ff; }

    .status-badge {
      display: inline-block;
      padding: 0.25rem 0.75rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 500;
    }

    .status-success, .status-match {
      background: rgba(16,185,129,0.14);
      color: #34d399;
      border: 1px solid rgba(16,185,129,0.22);
    }
    .status-failed, .status-mismatch {
      background: rgba(239,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);

      background: rgba(245,158,11,0.12);
      color: #fbbf24;
      border: 1px solid rgba(245,158,11,0.2);

    .status-info {
      background: rgba(59,130,246,0.12);
      color: #60a5fa;
      border: 1px solid rgba(59,130,246,0.2);

    .status-skipped {
      background: rgba(255,255,255,0.06);
      color: rgba(255,255,255,0.4);
      border: 1px solid rgba(255,255,255,0.08);
    }
    .status-error {
      background: rgba(239,68,68,0.12);
      color: #f87171;
      border: 1px solid rgba(239,68,68,0.2);
    }

    /* ============================================= */
    /* ✨ STUNNING LOGIN PAGE — FULL REDESIGN       */
    /* ============================================= */

    @keyframes gradientShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    @keyframes floatUp {
      0%   { transform: translateY(110vh) scale(0.4) rotate(0deg); opacity: 0; }
      8%   { opacity: 1; }
      92%  { opacity: 0.6; }
      100% { transform: translateY(-12vh) scale(1) rotate(360deg); opacity: 0; }
    }
    @keyframes orbPulse {
      0%, 100% { transform: scale(1) translate(0, 0); }
      33%       { transform: scale(1.08) translate(20px, -15px); }
      66%       { transform: scale(0.94) translate(-15px, 10px); }
    }
    /* ── Lovable-style login entrance animations ── */
    @keyframes loginLogoEntrance {
      0%   { opacity: 0; transform: translateY(-20px) scale(0.85); }
      60%  { transform: translateY(3px) scale(1.03); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes loginTitleEntrance {
      0%   { opacity: 0; transform: translateX(-32px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes loginSubtitleEntrance {
      0%   { opacity: 0; transform: translateY(16px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes loginFeatureEntrance {
      0%   { opacity: 0; transform: translateX(-24px) scale(0.96); }
      70%  { transform: translateX(3px) scale(1.01); }
      100% { opacity: 1; transform: translateX(0) scale(1); }
    }
    @keyframes loginStatsEntrance {
      0%   { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes loginRightEntrance {
      0%   { opacity: 0; transform: translateX(40px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes loginFormFieldEntrance {
      0%   { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }
    @keyframes loginBtnEntrance {
      0%   { opacity: 0; transform: translateY(10px) scale(0.97); }
      70%  { transform: translateY(-2px) scale(1.01); }
      100% { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes statusBarEntrance {
      0%   { opacity: 0; transform: translateX(16px); }
      100% { opacity: 1; transform: translateX(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 4px 18px rgba(99,102,241,0.4); }
      50%       { box-shadow: 0 4px 28px rgba(99,102,241,0.65), 0 0 40px rgba(168,85,247,0.2); }
    }
    @keyframes slideInUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeInLeft {
      from { opacity: 0; transform: translateX(-28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInRight {
      from { opacity: 0; transform: translateX(28px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes cardFloat {
      0%, 100% { transform: translateY(0px); }
      50%       { transform: translateY(-8px); }
    }
    @keyframes shimmer {
      0%   { left: -120%; }
      100% { left: 160%; }
    }
    @keyframes ringPulse {
      0%   { box-shadow: 0 0 0 0 rgba(99,102,241,0.45); }
      70%  { box-shadow: 0 0 0 10px rgba(99,102,241,0); }
      100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
    }
    @keyframes checkPop {
      0%   { transform: scale(0) rotate(-45deg); opacity: 0; }
      60%  { transform: scale(1.25) rotate(5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes statCount {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes borderGlow {
      0%, 100% { border-color: rgba(99,102,241,0.4); }
      50%       { border-color: rgba(99,102,241,0.85); box-shadow: 0 0 18px 2px rgba(99,102,241,0.18); }
    }
    @keyframes confirmPop {
      from { opacity: 0; transform: scale(0.88) translateY(20px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* --- ROOT CONTAINER — full-height split layout --- */
    .login-container {
      min-height: 100vh;
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
      background: #08081a !important;
      isolation: isolate;
    }

    .login-bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 110% 80% at 75% 105%, rgba(90,30,190,0.90) 0%, rgba(60,15,130,0.55) 35%, transparent 65%),
        radial-gradient(ellipse 50% 35% at 98% 98%, rgba(110,40,210,0.55) 0%, transparent 50%),
        linear-gradient(175deg, #07071a 0%, #090920 45%, #0c0825 100%);
      z-index: 0;
    }

    /* ── Login canvas animation ── */
    .login-anim-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
      pointer-events: none;
      opacity: 0.85;
    }

    .login-particles {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 1;
      overflow: hidden;
    }
    .particle {
      position: absolute;
      bottom: -120px;
      border-radius: 50%;
      animation: floatUp linear infinite;
    }
    .particle:nth-child(1)  { width: 10px; height: 10px; left: 7%;  background: rgba(99,102,241,0.5);   animation-duration: 14s; animation-delay: 0s; }
    .particle:nth-child(2)  { width: 7px;  height: 7px;  left: 18%; background: rgba(168,85,247,0.45);  animation-duration: 18s; animation-delay: 2s; }
    .particle:nth-child(3)  { width: 14px; height: 14px; left: 30%; background: rgba(236,72,153,0.35);  animation-duration: 22s; animation-delay: 4s; }
    .particle:nth-child(4)  { width: 6px;  height: 6px;  left: 44%; background: rgba(255,255,255,0.25); animation-duration: 16s; animation-delay: 1s; }
    .particle:nth-child(5)  { width: 11px; height: 11px; left: 56%; background: rgba(99,102,241,0.4);   animation-duration: 20s; animation-delay: 3s; }
    .particle:nth-child(6)  { width: 8px;  height: 8px;  left: 68%; background: rgba(168,85,247,0.5);   animation-duration: 17s; animation-delay: 5s; }
    .particle:nth-child(7)  { width: 12px; height: 12px; left: 79%; background: rgba(236,72,153,0.3);   animation-duration: 24s; animation-delay: 2.5s; }
    .particle:nth-child(8)  { width: 9px;  height: 9px;  left: 91%; background: rgba(255,255,255,0.2);  animation-duration: 19s; animation-delay: 4.5s; }

    /* --- MAIN LOGIN VIEW --- */
    .login-view {
      position: relative;
      z-index: 5;
      display: flex;
      flex-direction: row;
      width: 100%;
      flex: 1;
      height: 100vh;
      min-height: 100vh;
      align-items: stretch;
      animation: loginRightEntrance 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .login-view.hidden { display: none !important; }

    .login-left {

      flex-direction: column;
      color: white;
      padding: 4rem 4rem 3rem 4.5rem;

      z-index: 5;

      gap: 1.5rem;

    .login-logo {

    .login-logo i {

    .login-logo h1 {
      font-family: "Sora", sans-serif;
      font-weight: 700;
      font-size: 1.15rem;
      margin: 0;
      letter-spacing: -0.02em;

    }
    .login-title {
      font-family: "Sora", sans-serif;
      font-size: 3.6rem;
      font-weight: 800;
      line-height: 1.0;
      letter-spacing: -0.045em;
      color: #ffffff !important;
      margin: 0;
      animation: loginTitleEntrance 0.7s cubic-bezier(0.16,1,0.3,1) 0.28s both;

    .login-title span {

    .login-subtitle {

      font-weight: 400;

    .login-features {
      display: flex;
      flex-direction: column;
      gap: 0.45rem;
      max-width: 390px;
    }
    .feature-item {
      display: flex;
      align-items: center;
      gap: 0.875rem;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.055) !important;
      border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.10) !important;
      transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
      cursor: default;
    }
    .feature-item:nth-child(1) { animation: loginFeatureEntrance 0.6s cubic-bezier(0.16,1,0.3,1) 0.55s both; }
    .feature-item:nth-child(2) { animation: loginFeatureEntrance 0.6s cubic-bezier(0.16,1,0.3,1) 0.68s both; }
    .feature-item:nth-child(3) { animation: loginFeatureEntrance 0.6s cubic-bezier(0.16,1,0.3,1) 0.81s both; }
    .feature-item:hover {
      background: rgba(99,102,241,0.12) !important;
      border-color: rgba(129,140,248,0.25) !important;
      transform: translateX(4px);
    }
    .feature-icon {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, rgba(99,102,241,0.30), rgba(168,85,247,0.30)) !important;
      border-radius: 10px;
      border: 1px solid rgba(129,140,248,0.25) !important;
      flex-shrink: 0;
    }
    .feature-icon i {
      font-size: 13px;
      color: #a5b4fc !important;
    }
    .feature-text h3 {
      font-size: 0.875rem;
      font-weight: 700;
      margin-bottom: 0.15rem;
      font-family: "Sora", sans-serif;
      color: #ffffff !important;
    }
    .feature-text p {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.50) !important;
      line-height: 1.4;
      margin: 0;
    }

    /* Stats row — pinned to absolute bottom of left panel */
    .login-stat-row {
      flex-shrink: 0;
      display: flex;
      gap: 2.5rem;
      padding-top: 1.25rem;
      padding-bottom: 0.25rem;
      border-top: 1px solid rgba(255,255,255,0.10);
      animation: loginStatsEntrance 0.7s cubic-bezier(0.16,1,0.3,1) 0.95s both;
    }
    .login-stat { display: flex; flex-direction: column; gap: 2px; }
    .login-stat-num {
      font-family: "Sora", sans-serif;
      font-size: 1.5rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      color: #ffffff !important;
    }
    .login-stat-label {
      font-size: 0.62rem;
      color: rgba(255,255,255,0.45) !important;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* RIGHT PANEL */
    .login-right {
      width: 360px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      background: rgba(4, 4, 16, 0.72);
      border-left: 1px solid rgba(255,255,255,0.06);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 3rem 2.5rem 2rem;
      position: relative;
      z-index: 5;
      animation: loginRightEntrance 0.75s cubic-bezier(0.16,1,0.3,1) 0.15s both;
      height: 100%;
    }
    /* form content wrapper — vertically centers the actual form */
    .login-right-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .login-right > * {
      width: 100%;
      background: transparent;
      border-radius: 0;
      border: none;
      box-shadow: none;
      padding: 0;
      animation: none;
    }
    .login-form-title {
      font-family: "Sora", sans-serif;
      font-size: 1.65rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.25rem;
      letter-spacing: -0.03em;
      text-align: left;
      animation: loginFormFieldEntrance 0.55s cubic-bezier(0.16,1,0.3,1) 0.40s both;
    }
    .login-form-subtitle {
      font-size: 0.82rem;
      color: rgba(255,255,255,0.48);
      margin-bottom: 1.75rem;
      text-align: left;
      animation: loginFormFieldEntrance 0.55s cubic-bezier(0.16,1,0.3,1) 0.50s both;
    }
    .login-form {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
    }
    .login-form .form-group {
      display: flex;
      flex-direction: column;
      gap: 0.4rem;
      margin-bottom: 0;
    }
    .login-form .form-group:nth-child(1) { animation: loginFormFieldEntrance 0.5s cubic-bezier(0.16,1,0.3,1) 0.60s both; }
    .login-form .form-group:nth-child(2) { animation: loginFormFieldEntrance 0.5s cubic-bezier(0.16,1,0.3,1) 0.70s both; }
    .login-form .remember-forgot        { animation: loginFormFieldEntrance 0.5s cubic-bezier(0.16,1,0.3,1) 0.78s both; }
    .login-form .form-label {
      font-size: 0.65rem;
      font-weight: 600;
      color: rgba(255,255,255,0.55);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
    }
    .login-form .form-label i { font-size: 0.62rem; color: #818cf8; }
    .login-form .form-control {
      width: 100%;
      padding: 0.78rem 0.9rem;
      font-size: 0.875rem;
      font-family: inherit;
      color: #ffffff;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 8px;
      outline: none;
      transition: all 0.25s ease;
      caret-color: #818cf8;
    }
    .login-form .form-control::placeholder { color: rgba(255,255,255,0.28); }
    .login-form .form-control:hover:not(:focus) {
      border-color: rgba(129,140,248,0.40);
      background: rgba(255,255,255,0.09);
    }
    .login-form .form-control:focus {
      border-color: rgba(129,140,248,0.65);
      background: rgba(99,102,241,0.09);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.13);
    }
    .password-input-wrapper { position: relative; }
    .password-input-wrapper .form-control { padding-right: 2.8rem; }
    .password-toggle {
      position: absolute;
      right: 0.7rem; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      color: rgba(255,255,255,0.45);
      cursor: pointer; padding: 0.35rem;
      display: flex; align-items: center;
      border-radius: 6px;
      transition: all 0.2s ease;
    }
    .password-toggle:hover { color: #818cf8; background: rgba(129,140,248,0.1); }
    .remember-forgot {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .remember-me { display: flex; align-items: center; }
    .remember-me label {
      display: flex; align-items: center; gap: 0.45rem;
      cursor: pointer; user-select: none; margin-bottom: 0;
    }
    .remember-me input[type="checkbox"] { display: none; }
    .custom-checkbox {
      width: 15px; height: 15px;
      border: 1.5px solid rgba(255,255,255,0.18);
      border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s ease; flex-shrink: 0;
    }
    .custom-checkbox::after {
      content: "\2713"; color: white; font-size: 9px; font-weight: 700;
      opacity: 0; transform: scale(0);
      transition: all 0.2s cubic-bezier(0.34,1.56,0.64,1);
    }
    .remember-me input:checked + label .custom-checkbox,
    .remember-me input:checked ~ label .custom-checkbox {
      background: linear-gradient(135deg, #6366f1, #a855f7);
      border-color: transparent;
    }
    .remember-me input:checked + label .custom-checkbox::after,
    .remember-me input:checked ~ label .custom-checkbox::after {
      opacity: 1; transform: scale(1);
    }
    .checkbox-text { font-size: 0.78rem; color: rgba(255,255,255,0.55); }
    .forgot-password-link {
      font-size: 0.78rem; color: #818cf8; font-weight: 500;
      text-decoration: none; cursor: pointer; transition: color 0.2s ease;
    }
    .forgot-password-link:hover { color: #c4b5fd; text-decoration: underline; }
    .login-btn {
      position: relative;
      width: 100%;
      padding: 0.875rem 1.5rem;
      font-size: 0.9rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, #6366f1 0%, #8b5cf6 60%, #a855f7 100%);
      border: none; border-radius: 8px; cursor: pointer; overflow: hidden;
      transition: all 0.3s ease;
      display: flex; align-items: center; justify-content: center; gap: 0.5rem;
      box-shadow: 0 4px 18px rgba(99,102,241,0.4);
      margin-top: 0.25rem;
      animation: loginBtnEntrance 0.55s cubic-bezier(0.16,1,0.3,1) 0.88s both, pulseGlow 3s ease-in-out 1.5s infinite;
    }
    .login-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 28px rgba(99,102,241,0.55);
      animation-play-state: paused;
    }
    .login-btn:active { transform: translateY(0); }
    .btn-text { display: flex; align-items: center; gap: 0.5rem; position: relative; z-index: 1; }
    .btn-shine {
      position: absolute; top: 0; left: -120%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.25) 50%, transparent 100%);
      transform: skewX(-20deg);
    }
    .login-btn:hover .btn-shine { animation: shimmer 0.65s ease forwards; }
    .back-to-login-link {
      display: inline-flex; align-items: center; gap: 0.5rem;
      justify-content: flex-start; width: 100%; padding: 0.6rem 0;
      font-size: 0.82rem; font-weight: 500;
      color: rgba(255,255,255,0.50);
      background: transparent; border: none; cursor: pointer;
      transition: color 0.2s ease; text-decoration: none; margin-top: 0.5rem;
      animation: loginFormFieldEntrance 0.5s cubic-bezier(0.16,1,0.3,1) 1.0s both;
    }
    .back-to-login-link:hover { color: #818cf8; }

    /* status bar inside right panel */
    .login-status-bar {
      font-size: 0.67rem;
      color: rgba(255,255,255,0.38);
      letter-spacing: 0.02em;
      margin-bottom: 1.75rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      animation: statusBarEntrance 0.5s cubic-bezier(0.16,1,0.3,1) 0.3s both;
    }
    .login-status-bar::before {
      content: "";
      display: inline-block;
      width: 6px; height: 6px;
      border-radius: 50%;
      background: #4ade80;
      box-shadow: 0 0 6px rgba(74,222,128,0.6);
    }
    .login-version {
      font-size: 0.65rem;
      color: rgba(255,255,255,0.22);
      letter-spacing: 0.06em;
      text-align: center;
      flex-shrink: 0;
      padding-top: 1rem;
      border-top: 1px solid rgba(255,255,255,0.06);
      animation: loginFormFieldEntrance 0.5s cubic-bezier(0.16,1,0.3,1) 1.1s both;
    }

    /* ============================================= */
    /* RESPONSIVE DESIGN FOR LOGIN                  */
    /* ============================================= */
    @media (max-width: 960px) {
      .login-container { flex-direction: column; height: auto; min-height: 100vh; }
      .login-left { flex: none; }
      .login-right { width: 100%; }
      .login-left { padding: 3rem 2rem 2rem; }
      .login-right {
        border-left: none;
        border-top: 1px solid rgba(255,255,255,0.07);
        padding: 2.5rem 2rem 3rem;
      }
      .login-title { font-size: 2.5rem; }
      .login-stat-row { display: none; }
    }
    @media (max-width: 480px) {
      .login-left { padding: 2rem 1.5rem; }
      .login-right { padding: 2rem 1.5rem; }
      .login-title { font-size: 2rem; }
    }

    body.dark-mode .login-right { background: rgba(8,8,22,0.96); }

    body.dark-mode .login-form .form-control {
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.12);
      color: #ffffff;
    }

    /* ============================================= */
    /* ✨ LOGOUT BUTTON (sidebar)                   */
    /* ============================================= */
    .logout-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      color: rgba(255,255,255,0.6);
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      width: 34px; height: 34px;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logout-btn:hover {
      color: #fff;
      background: rgba(239,68,68,0.18);
      border-color: rgba(239,68,68,0.45);
      box-shadow: 0 0 14px rgba(239,68,68,0.22);
      transform: scale(1.08);
    }
    .logout-btn:active { transform: scale(0.96); }
    .logout-btn i { font-size: 0.85rem; }
    ai-briefing-card {
      background: linear-gradient(135deg, #1e1b4b 0%, #312e6b 100%);
      color: white;
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      border: 1px solid rgba(129, 140, 248, 0.3);
      box-shadow: 0 10px 30px -5px rgba(30, 27, 75, 0.5);
      animation: fadeInDown 0.6s cubic-bezier(0.16,1,0.3,1) both;
    }
    .ai-briefing-icon {
      flex-shrink: 0;
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: rgba(99, 102, 241, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid rgba(129, 140, 248, 0.4);
    }
    .ai-briefing-icon i { font-size: 1.5rem; color: #a5b4fc; }
    .ai-briefing-title {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #a5b4fc;
      margin-bottom: 0.25rem;
    }
    .ai-briefing-text { font-size: 1rem; font-weight: 500; line-height: 1.5; color: rgba(255, 255, 255, 0.9); margin: 0; }

    .kpi-grid-v2 {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .kpi-card-v2 {
      background: var(--secondary);
      border: 1px solid var(--gray);
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      animation: cardSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .kpi-card-v2:nth-child(1) { animation-delay: 0.1s; }
    .kpi-card-v2:nth-child(2) { animation-delay: 0.15s; }
    .kpi-card-v2:nth-child(3) { animation-delay: 0.2s; }
    .kpi-card-v2:nth-child(4) { animation-delay: 0.25s; }

    .kpi-header { display: flex; justify-content: space-between; align-items: center; }
    .kpi-title { font-size: 0.8rem; font-weight: 500; color: var(--text-light); }
    .kpi-badge { font-size: 0.65rem; font-weight: 600; padding: 2px 7px; border-radius: 99px; }
    .kpi-main { display: flex; align-items: flex-end; justify-content: space-between; gap: 1rem; }
    .kpi-value { font-family: 'Sora', sans-serif; font-size: 2rem; font-weight: 800; color: var(--dark); line-height: 1; }
    .kpi-sparkline { flex: 1; height: 30px; }
    .kpi-footer { font-size: 0.75rem; color: var(--text-muted); }
    .kpi-footer.positive { color: var(--success); }
    .kpi-footer.negative { color: var(--danger); }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .action-card {
      background: var(--secondary);
      border: 1px solid var(--gray);
      border-left-width: 4px;
      border-radius: var(--radius-md);
      padding: 1rem 1.25rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      cursor: pointer;
      transition: all 0.2s ease;
      animation: cardSlideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
    }
    .action-card:hover { transform: translateY(-3px); box-shadow: var(--shadow-md); border-color: var(--primary); }
    .action-card-icon { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 1.1rem; }
    .action-card-title { font-weight: 600; color: var(--dark); font-size: 0.9rem; }
    .action-card-subtitle { font-size: 0.8rem; color: var(--text-light); }
    
    .action-card.risk { border-left-color: var(--danger); }
    .action-card.risk .action-card-icon { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
    .action-card.opportunity { border-left-color: var(--success); }
    .action-card.opportunity .action-card-icon { background: rgba(16, 185, 129, 0.1); color: var(--success); }
    .action-card.info { border-left-color: var(--info); }
    .action-card.info .action-card-icon { background: rgba(59, 130, 246, 0.1); color: var(--info); }
    
    .analytics-grid { display: grid; grid-template-columns: 2fr 1.5fr; gap: 1rem; }

    @keyframes placeholder-shimmer { 0% { transform: translateX(-100%); } 100% { transform: translateX(100%); } }
    .action-card-placeholder { background-color: var(--secondary); border: 1px solid var(--gray); border-radius: var(--radius-md); padding: 1rem 1.25rem; display: flex; align-items: center; gap: 1rem; position: relative; overflow: hidden; }
    .action-card-placeholder::after { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent); animation: placeholder-shimmer 1.5s infinite; }
    body:not(.dark-mode) .action-card-placeholder::after { background: linear-gradient(90deg, transparent, rgba(0,0,0,0.04), transparent); }
    .placeholder-icon { width: 40px; height: 40px; border-radius: 50%; background-color: var(--gray); flex-shrink: 0; }
    .placeholder-content { flex: 1; }
    .placeholder-line { height: 12px; background-color: var(--gray); border-radius: 4px; margin-bottom: 8px; }
    .placeholder-line.short { width: 60%; }

    body.dark-mode .ai-briefing-card { background: linear-gradient(135deg, #1e1b4b 0%, #312e6b 100%); border-color: rgba(129, 140, 248, 0.3); }
    body.dark-mode .kpi-card-v2 { background: var(--secondary); border-color: var(--gray); }

    @media (max-width: 1200px) {
        .kpi-grid-v2 { grid-template-columns: repeat(2, 1fr); }
        .analytics-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 768px) {
        .kpi-grid-v2 { grid-template-columns: 1fr; }
        .ai-briefing-card { flex-direction: column; text-align: center; }
    }


    /* ============================================= */
    /* ✨ CONFIRM / LOGOUT MODAL (replaces generic) */
    /* ============================================= */
    #confirmModal {
      position: fixed !important;
      inset: 0 !important;
      background: rgba(5,5,20,0.75) !important;
      backdrop-filter: blur(14px) !important;
      -webkit-backdrop-filter: blur(14px) !important;
      display: none !important;
      align-items: center !important;
      justify-content: center !important;
      z-index: 99999 !important;
    }
    #confirmModal.active { display: flex !important; }

    .confirm-card {
      position: relative;
      background: rgba(15,15,40,0.92);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 20px;
      padding: 2.25rem 2rem 2rem;
      text-align: center;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 32px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(99,102,241,0.08);
      animation: confirmPop 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }

    .confirm-card-icon {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, rgba(239,68,68,0.18), rgba(239,68,68,0.08));
      border: 1px solid rgba(239,68,68,0.28);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 1.1rem;
      font-size: 1.3rem;
      color: #f87171;
    }

    .confirm-card-title {
      font-family: 'Sora', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      color: #ffffff;
      margin-bottom: 0.4rem;
    }
    .confirm-card-msg {
      font-size: 0.875rem;
      color: rgba(255,255,255,0.75);
      line-height: 1.6;
      margin-bottom: 1.75rem;
    }
    .confirm-card-actions {
      display: flex;
      gap: 0.75rem;
    }
    .confirm-stay-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: 1px solid rgba(255,255,255,0.10);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.80);
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s ease;
    }
    .confirm-stay-btn:hover {
      background: rgba(255,255,255,0.10);
      color: #fff;
    }
    .confirm-go-btn {
      flex: 1;
      padding: 0.75rem 1rem;
      border-radius: 10px;
      border: none;
      background: linear-gradient(135deg, #ef4444, #dc2626);
      color: white;
      font-family: inherit;
      font-size: 0.875rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      box-shadow: 0 4px 16px rgba(239,68,68,0.35);
      display: flex; align-items: center; justify-content: center;
    }
    .confirm-go-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(239,68,68,0.5);
    }
    .confirm-go-btn:active { transform: translateY(0); }

    .confirm-card-close {
      position: absolute;
      top: 0.9rem; right: 0.9rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.60);
      width: 28px; height: 28px;
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      font-size: 0.75rem;
      transition: all 0.2s ease;
    }
    .confirm-card-close:hover {
      color: #fff;
      background: rgba(255,255,255,0.10);
    }

    /* For non-logout confirms — neutral icon */
    #confirmModal:not([data-type="logout"]) .confirm-card-icon {
      background: linear-gradient(135deg, rgba(99,102,241,0.18), rgba(99,102,241,0.08));
      border-color: rgba(99,102,241,0.28);
      color: #818cf8;
    }
    #confirmModal:not([data-type="logout"]) .confirm-go-btn {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      box-shadow: 0 4px 16px rgba(99,102,241,0.35);
    }
    #confirmModal:not([data-type="logout"]) .confirm-go-btn:hover {
      box-shadow: 0 8px 24px rgba(99,102,241,0.5);
    }

    /* old responsive block removed — see new one in login section */
    @media (max-width: 640px) {
      .login-title { font-size: 1.75rem; }

      .login-right > * {
        padding: 1.5rem;
      }

      .login-title {
        font-size: 1.75rem;
      }

      .login-form-title {
        font-size: 1.5rem;
      }

      .feature-item {
        padding: 1rem;
      }
    }

    /* System Health */
    .health-container {
      background-color: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
    }

    .health-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }

    .health-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
    }

    .status-healthy {
      background-color: var(--success);
    }

    .status-warning {
      background-color: var(--warning);
    }

    .status-critical {
      background-color: var(--danger);
    }

    .health-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
    }

    .health-card {
      background-color: var(--secondary);
      border-radius: 8px;
      padding: 1.5rem;
    }

    .health-card-title {
      font-size: 0.9rem;
      color: var(--text-light);
      margin-bottom: 0.5rem;
    }

    .health-card-value {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }

    .health-card-description {
      font-size: 0.85rem;
      color: var(--text-light);
    }

    /* Teacher Persona Tool */
    #personaPage {
      display: block;
      width: 100%;
      box-sizing: border-box;
    }

    #personaPage .header {
      margin-bottom: 2rem;
      width: 100%;
    }

    #personaPage .form-container {
      background-color: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      max-width: 800px;
      margin: 0 auto;
    }

    #personaResultsContainer {
      width: 100%;
      margin-top: 2rem;
      background-color: white;
      border-radius: 12px;
      padding: 1.5rem;
      box-shadow: var(--shadow-sm);
      box-sizing: border-box;
    }

    .persona-results-table th {
      white-space: nowrap;
    }

    .persona-results-table td {
      vertical-align: top;
      font-size: 0.85rem;
    }

    .persona-results-table td:first-child {
      font-weight: 500;
    }

    .traits-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 0.75rem;
      margin-top: 0.5rem;
    }

    .checkbox-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }

    .checkbox-input {
      width: 16px;
      height: 16px;
      accent-color: var(--primary);
    }

    /* Tables on new pages */
    .data-table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      overflow: hidden;
    }
    .data-table th, .data-table td {
      padding: 0.75rem 1rem;
      text-align: left;
      border-bottom: 1px solid var(--gray);
    }
    .data-table th {
      background-color: var(--secondary);
      font-weight: 600;
      color: var(--text-light);
      font-size: 0.9rem;
    }
    .data-table tbody tr:last-child td {
      border-bottom: none;
    }
    .data-table .action-buttons {
      display: flex;
      gap: 0.5rem;
    }
    .data-table .teacher-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }
    .data-table .teacher-link:hover {
        text-decoration: underline;
    }
    .data-table .action-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-light);
      font-size: 1rem;
      padding: 0.25rem;
      transition: color 0.2s;
    }
    .data-table .action-btn:hover {
      color: var(--primary);
    }

    /* NEW/UPDATED Reports Page specific styles */
    .report-filters {
        display: flex;
        gap: 1rem;
        flex-wrap: wrap;
        margin-bottom: 1.5rem;
        background-color: white;
        padding: 1rem;
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
        align-items: center;
    }
    .report-filters .form-group {
        margin-bottom: 0;
        flex: 1;
        min-width: 150px;
    }
    .report-section {
        background-color: white;
        padding: 1.5rem;
        border-radius: 12px;
        box-shadow: var(--shadow-sm);
        margin-bottom: 1.5rem;
    }
    .report-section h3 {
        font-family: 'Poppins', sans-serif;
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 1.5rem;
        padding-bottom: 0.75rem;
        border-bottom: 2px solid var(--primary);
        display: flex;
        justify-content: space-between;
        align-items: center;
    }
    .kpi-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
        gap: 1.5rem;
    }
    .kpi-card {
        text-align: center;
        padding: 1.5rem;
        background-color: var(--secondary);
        border-radius: 8px;
    }
    .kpi-card .label {
        font-size: 0.9rem;
        font-weight: 500;
        color: var(--text-light);
        margin-bottom: 0.5rem;
    }
    .kpi-card .value {
        font-size: 2rem;
        font-weight: 700;
        color: var(--dark);
    }
    .kpi-card .change {
        font-size: 1rem;
        font-weight: 600;
    }
    .kpi-card .change.positive { color: var(--danger); }
    .kpi-card .change.negative { color: var(--success); }

    .ai-summary {
        background-color: var(--secondary);
        border-left: 5px solid var(--primary);
        padding: 1.5rem;
        border-radius: 8px;
        margin-top: 1rem;
    }
    .ai-summary h4 {
        color: var(--primary);
        font-size: 1rem;
        font-weight: 600;
        margin-bottom: 0.5rem;
    }
    .ai-summary p {
        font-size: 0.95rem;
        line-height: 1.6;
    }

    .chart-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 2rem;
        align-items: center;
    }

    .toggle-buttons {
        font-size: 0.8rem;
    }
    .toggle-buttons button {
        background: none;
        border: 1px solid var(--gray);
        padding: 0.25rem 0.5rem;
        border-radius: 4px;
        cursor: pointer;
    }
    .toggle-buttons button.active {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    .report-table-view {
        display: none;
    }
    
    .report-chart-view, .report-table-view {
        margin-bottom: 1.5rem;
    }

    /* Settings page specific */
    .settings-form-container {
      background-color: white;
      border-radius: 12px;
      padding: 2rem;
      box-shadow: var(--shadow-sm);
      max-width: 700px;
      margin: 0 auto;
    }
    .settings-form-container .form-group {
      margin-bottom: 1.5rem;
    }
    .settings-form-container .form-actions {
      margin-top: 2rem;
      border-top: 1px solid var(--gray);
      padding-top: 1.5rem;
    }

    /* NEW STYLES FOR TABS */
    .page-tabs {
      display: flex;
      border-bottom: 2px solid var(--gray);
      margin-bottom: 2rem;
      overflow-x: auto; 
      white-space: nowrap; 
    }
    .tab-button {
      padding: 0.75rem 1.5rem;
      cursor: pointer;
      background-color: transparent;
      border: none;
      font-size: 1rem;
      font-weight: 500;
      color: var(--text-light);
      position: relative;
      transition: color 0.3s ease;
      flex-shrink: 0; 
    }
    .tab-button.active {
      color: var(--primary);
    }
    .tab-button.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background-color: var(--primary);
    }
    .tab-content {
      display: none;
      animation: fadeIn 0.5s;
    }
    .tab-content.active {
      display: block;
    }

    /* Teacher Profile Page */
    .teacher-profile-header {
      display: flex;
      align-items: center;
      gap: 1.5rem;
      margin-bottom: 2rem;
      padding: 1.5rem;
      background-color: white;
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
    }
    .teacher-profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background-color: var(--primary);
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 600;
    }
    .teacher-profile-info h2 {
      margin: 0 0 0.5rem;
      color: var(--dark);
    }
    .teacher-profile-info p {
      margin: 0;
      color: var(--text-light);
    }
    .course-category-container {
        margin-bottom: 2rem;
    }
    .course-category-title {
        font-size: 1.25rem;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 1rem;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid var(--primary);
    }
    .course-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
        gap: 1rem;
    }
    .course-card {
        background-color: white;
        padding: 1rem;
        border-radius: 8px;
        box-shadow: var(--shadow-sm);
        font-size: 0.9rem;
    }
    .course-card-title {
        font-weight: 500;
        margin-bottom: 0.5rem;
    }
    .course-card-progress {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        color: var(--text-light);
    }

    .course-catalog-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
    }
    @media (max-width: 1200px) {
      .course-catalog-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 680px) {
      .course-catalog-grid { grid-template-columns: 1fr; }
    }
 
    .course-catalog-card {
      background: #fff;
      border: 1px solid var(--gray);
      border-radius: 12px;
      padding: 1.05rem 1.1rem 0.95rem;
      cursor: pointer;
      transition: box-shadow 0.18s ease, border-color 0.18s ease, transform 0.15s ease;
    }
    .course-catalog-card:hover {
      box-shadow: 0 4px 18px rgba(99, 102, 241, 0.11);
      border-color: #c7d2fe;
      transform: translateY(-2px);
    }
    .course-catalog-icon {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, rgba(99,102,241,0.13), rgba(168,85,247,0.09));
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
      font-size: 0.88rem;
      flex-shrink: 0;
    }
 
    /* Dark mode overrides for course catalog */
    body.dark-mode .course-catalog-card {
      background: var(--gray-800);
      border-color: var(--gray-700);
    }
    body.dark-mode .course-catalog-card:hover {
      border-color: var(--primary-light);
      box-shadow: 0 4px 18px rgba(99, 102, 241, 0.22);
    }
    body.dark-mode #courseDetailPanel {
      background: var(--gray-900) !important;
    }

    /* Batch Processing Page */
    .upload-area {
        border: 2px dashed var(--gray);
        border-radius: 12px;
        padding: 2rem;
        text-align: center;
        background-color: var(--secondary);
        cursor: pointer;
        margin-bottom: 1rem;
    }
    .upload-area:hover {
        border-color: var(--primary);
    }
    .upload-area i {
        font-size: 3rem;
        color: var(--primary-light);
        margin-bottom: 1rem;
    }
    #batch-results-table th, #batch-results-table td {
        font-size: 0.85rem;
    }

    /* Learner History Page */
    #historyResultsContainer {
      max-width: 900px;
      margin-left: auto;
      margin-right: auto;
    }
    .learner-profile-card, .ai-summary-card, .timeline-card {
      background: #ffffff;
      border: 1px solid #e9eaf0;
      border-radius: 14px;
      padding: 1.5rem;
      box-shadow: 0 2px 12px rgba(99,102,241,0.07);
      margin-bottom: 1.5rem;
    }
    .learner-profile-card h3, .ai-summary-card h3, .timeline-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      font-family: 'Sora', sans-serif;
      color: #111827;
      margin-bottom: 1rem;
      border-bottom: 1px solid #e9eaf0;
      padding-bottom: 0.5rem;
    }
    .learner-profile-card p, .ai-summary-card p {
      font-size: 0.9rem;
      color: #374151;
      line-height: 1.6;
    }
    .learner-profile-card strong, .ai-summary-card strong {
      color: #111827;
      font-weight: 600;
    }
    .timeline-event {
      display: flex;
      margin-bottom: 1rem;
      border-left: 3px solid var(--primary);
      padding-left: 1rem;
    }
    .timeline-date {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--text-light);
      min-width: 150px;
      margin-right: 1rem;
      flex-shrink: 0;
    }
    .timeline-description {
      font-size: 0.9rem;
      color: var(--text);
    }
    .timeline-event.migration {
      border-left-color: var(--accent);
    }
    .timeline-event.onboarding {
      border-left-color: var(--success);
    }
    .ai-summary-card {
      background-color: var(--secondary);
      border: 1px solid var(--primary-light);
    }
    .ai-summary-card h3 {
      color: var(--primary);
      border-bottom-color: var(--primary-light);
    }
    .ai-summary-card p {
      white-space: pre-wrap; 
    }

    /* NEW: Audit Center & Details Modal Styles */
    #auditCenterPage .report-filters {
        max-width: none;
        margin: 0 auto 1.5rem auto;
    }
    .mismatch-list {
        list-style: none;
        padding-left: 0;
        margin: 0;
        font-size: 0.85rem;
    }
    .mismatch-list li {
        padding: 0.3rem 0.5rem;
        border-radius: 4px;
        border-left: 3px solid var(--danger);
        background-color: rgba(244, 67, 54, 0.05);
    }
    .mismatch-list li + li { margin-top: 0.25rem; }
    .mismatch-list strong { color: var(--dark); }
    .hubspot-link {
        color: var(--primary);
        text-decoration: none;
        font-weight: 500;
    }
    .hubspot-link:hover { text-decoration: underline; }
    .audit-details-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 1.5rem;
    }
    .audit-details-section {
        margin-bottom: 1.5rem;
    }
    .audit-details-section h4 {
        font-size: 1.1rem;
        font-weight: 600;
        color: var(--dark);
        margin-bottom: 1rem;
        border-bottom: 1px solid var(--gray);
        padding-bottom: 0.5rem;
    }
    .audit-details-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
    }
    .audit-details-table td {
        padding: 0.5rem;
        border-bottom: 1px solid var(--gray);
    }
    .audit-details-table td:first-child {
        font-weight: 500;
        color: var(--text-light);
        width: 35%;
    }
    .sales-note-box {
        background-color: var(--secondary);
        border-radius: 8px;
        padding: 1rem;
        font-family: monospace;
        font-size: 0.85rem;
        white-space: pre-wrap;
        word-break: break-word;
        max-height: 400px;
        overflow-y: auto;
    }

    /* Responsive */
    @media (max-width: 1200px) {
      .dashboard-grid {
        grid-template-columns: 1fr;
      }
      .main-metric-card, .recent-activities {
        grid-column: span 1;
      }
      .health-grid {
        grid-template-columns: repeat(2, 1fr);
      }
      #personaPage, #personaPage .header, #personaResultsContainer {
        max-width: 960px;
      }
      .chart-container {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 992px) {
      .app-container {
        grid-template-columns: 240px 1fr;
      }
      #personaPage, #personaPage .header, #personaResultsContainer {
        max-width: 720px;
      }
      .audit-details-grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 768px) {
      .app-container {
        grid-template-columns: 1fr;
      }
      .sidebar {
        position: fixed;
        top: 0;
        left: -280px;
        bottom: 0;
        transition: var(--transition);
      }
      .sidebar.active {
        left: 0;
      }
      .main-content {
        padding: 1rem;
      }
      .form-grid {
        grid-template-columns: 1fr;
      }
      .form-group.full-width {
        grid-column: span 1;
      }
      .login-container {
        flex-direction: column;
      }
      .login-left {
        display: none;
      }
      .login-right {
        width: 100%;
        padding: 2rem;
      }
      .health-grid {
        grid-template-columns: 1fr;
      }
      #personaPage, #personaPage .header, #personaPage .form-container, #personaResultsContainer {
        padding: 1rem;
        max-width: 100%;
      }
      #personaForm .form-grid {
        grid-template-columns: 1fr;
      }
      #personaForm .form-group.full-width {
        grid-column: span 1;
      }
      .report-filters {
          flex-direction: column;
          align-items: stretch;
      }
      .report-filters .form-group {
          width: 100%;
      }
      .page-tabs {
          overflow-x: auto;
          -webkit-overflow-scrolling: touch;
          justify-content: flex-start;
      }
      .tab-button {
          flex-shrink: 0;
      }
    }

    @media (max-width: 576px) {
      .header {
        flex-direction: column;
        align-items: flex-start;
        gap: 1rem;
      }
      .header-actions {
        width: 100%;
        flex-direction: column;
      }
      .btn {
        width: 100%;
        justify-content: center;
      }
      .class-session-group .form-grid {
          grid-template-columns: 1fr;
      }
      .sub-metrics-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Animations */
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    .fade-in {
      animation: fadeIn 0.5s ease-in-out;
    }

    /* Toast notifications */
    .toast-container {
      position: fixed;
      top: 1rem;
      right: 1rem;
      z-index: 1000;
      max-width: 400px;
    }

    .toast {
      padding: 1rem;
      border-radius: 12px;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.12), 0 2px 8px rgba(99,102,241,0.08);
      animation: cardSlideUp 0.3s cubic-bezier(0.16,1,0.3,1);
      background: #ffffff;
      border: 1px solid #e9eaf0;
      color: #374151;
    }

    .toast-icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .toast-success .toast-icon { background: rgba(16,185,129,0.12); color: #059669; }
    .toast-error .toast-icon   { background: rgba(239,68,68,0.12); color: #dc2626; }
    .toast-warning .toast-icon { background: rgba(245,158,11,0.12); color: #d97706; }
    .toast-info .toast-icon    { background: rgba(99,102,241,0.12); color: #6366f1; }

    .toast-content {
      flex: 1;
    }

    .toast-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
    }

    .toast-message {
      font-size: 0.9rem;
      color: var(--text-light);
    }

    .toast-close {
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      font-size: 1.1rem;
    }

    /* Loading spinner */
    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(74, 60, 138, 0.1);
      border-radius: 50%;
      border-top-color: var(--primary);
      animation: spin 1s ease-in-out infinite;
      margin: 0 auto;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* Modal */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .modal-overlay.active {
      display: flex;
    }

    .modal {
      background: #ffffff;
      border: 1px solid #e9eaf0;
      border-radius: 16px;
      width: 90%;
      max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.15), 0 4px 16px rgba(99,102,241,0.1);
      color: #374151;
      animation: confirmPop 0.35s cubic-bezier(0.16,1,0.3,1) both;
    }

    .modal-overlay.active .modal {
      transform: translateY(0);
    }

    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid #e9eaf0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .modal-title {
      font-weight: 700;
      font-size: 1.15rem;
      font-family: 'Sora', sans-serif;
      color: #111827;
    }
    .modal-close {
      background: #f3f4f6;

/* --- HubSpot-style Dropdown CSS --- */
.hs-dropdown-container {
    position: relative;
    width: 100%;
    max-width: 500px;
    font-family: 'Inter', sans-serif;
}

.hs-input-box {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid #d1d5db;
    border-radius: 10px;
    font-size: 14px;
    color: var(--color-text-primary, #33475b);
    background-color: #ffffff;
    cursor: text;
    transition: all 0.2s ease;
}

.hs-input-box:focus {
    background-color: #fff;
    border-color: #6366f1;
    outline: none;
    box-shadow: 0 0 0 3px rgba(99,102,241,0.12);
}

.hs-options-list {
    display: none;
    position: fixed;   /* fixed escapes ALL stacking contexts — no z-index fight */
    min-width: 280px;
    max-height: 260px;
    overflow-y: auto;
    background: #ffffff;
    border: 1px solid #e2e8f0;
    border-radius: 10px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.16), 0 2px 8px rgba(0,0,0,0.08);
    z-index: 999999;
}

.hs-options-list.show {
    display: block;
    animation: fadeInUp 0.15s ease both;
}

.hs-option {
    padding: 9px 14px;
    cursor: pointer;
    border-bottom: 1px solid #f3f4f6;
    transition: background 0.12s ease;
}

.hs-option:first-child { border-radius: 10px 10px 0 0; }
.hs-option:last-child  { border-bottom: none; border-radius: 0 0 10px 10px; }

.hs-option:hover, .hs-option.hs-highlighted {
    background-color: #f0f0ff;
}

.hs-option-name {
    font-weight: 600;
    color: #111827;
    font-size: 13px;
}

.hs-option-email {
    font-size: 11px;
    color: #9ca3af;
    margin-top: 1px;
}

/* Dropdown always floats above content */
.form-container:has(.hs-dropdown-container) {
    overflow: visible !important;
}

body.dark-mode .hs-input-box {
