    /* ══════════════════════════════════════════
       AI TEACHER DASHBOARD
    ══════════════════════════════════════════ */

    /* KPI Row */
    .ai-kpi-row {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 1rem;
      margin-bottom: 1.5rem;
    }
    .ai-kpi-card {
      background: #ffffff;
      border: 1px solid #e9eaf0;
      border-radius: 14px;
      padding: 1.1rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 0.875rem;
      box-shadow: 0 2px 8px rgba(99,102,241,0.06);
      transition: all 0.22s ease;
      animation: cardSlideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
    }
    .ai-kpi-card:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(99,102,241,0.12); }
    .ai-kpi-icon {
      width: 42px; height: 42px; border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.1rem; flex-shrink: 0;
    }
    .ai-kpi-body { flex: 1; min-width: 0; }
    .ai-kpi-value {
      font-family: 'Sora', sans-serif;
      font-size: 1.6rem; font-weight: 800;
      letter-spacing: -0.04em; color: #111827;
      line-height: 1;
    }
    .ai-kpi-label { font-size: 0.72rem; color: #6b7280; margin-top: 0.2rem; }
    .ai-kpi-trend {
      font-size: 0.68rem; font-weight: 600;
      display: flex; flex-direction: column; align-items: center; gap: 2px;
      flex-shrink: 0;
    }
    .ai-kpi-trend.up   { color: #10b981; }
    .ai-kpi-trend.down { color: #ef4444; }
    .ai-kpi-trend.neutral { color: #f59e0b; }

    /* 2-col grid */
    .ai-dashboard-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.25rem;
    }
    .ai-col-left, .ai-col-right {
      display: flex; flex-direction: column; gap: 1.25rem;
    }

    /* Shared card shell */
    .ai-insight-card, .ai-chart-card, .ai-health-card, .ai-reco-card {
      background: #ffffff;
      border: 1px solid #e9eaf0;
      border-radius: 14px;
      overflow: hidden;
      box-shadow: 0 2px 8px rgba(99,102,241,0.06);
      animation: cardSlideUp 0.45s cubic-bezier(0.16,1,0.3,1) both;
    }
    .ai-card-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #f3f4f6;
    }
    .ai-card-title {
      font-family: 'Sora', sans-serif;
      font-size: 0.9rem; font-weight: 700; color: #111827;
      display: flex; align-items: center; gap: 0.5rem;
    }
    .ai-card-title i { color: #6366f1; }
    .ai-card-sub { font-size: 0.72rem; color: #9ca3af; }

    /* Insights body */
    .ai-insights-body {
      padding: 1.25rem;
      min-height: 160px;
      max-height: 320px;
      overflow-y: auto;
    }
    .ai-insight-item {
      display: flex; gap: 0.75rem; align-items: flex-start;
      padding: 0.75rem 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .ai-insight-item:last-child { border-bottom: none; }
    .ai-insight-dot {
      width: 8px; height: 8px; border-radius: 50%;
      flex-shrink: 0; margin-top: 5px;
    }
    .ai-insight-dot.green  { background: #10b981; box-shadow: 0 0 6px rgba(16,185,129,0.5); }
    .ai-insight-dot.amber  { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.5); }
    .ai-insight-dot.red    { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
    .ai-insight-dot.purple { background: #8b5cf6; box-shadow: 0 0 6px rgba(139,92,246,0.5); }
    .ai-insight-text { font-size: 0.82rem; color: #374151; line-height: 1.5; }
    .ai-insight-text strong { color: #111827; }

    /* Chart card */
    .ai-chart-card canvas { display: block; padding: 1rem 1.25rem 1.25rem; }

    /* Health list */
    .ai-health-search { padding: 0.75rem 1.25rem 0; }
    .ai-health-list {
      padding: 0.5rem 0;
      max-height: 340px;
      overflow-y: auto;
    }
    .ai-health-row {
      display: flex; align-items: center; gap: 0.75rem;
      padding: 0.6rem 1.25rem;
      transition: background 0.15s ease;
    }
    .ai-health-row:hover { background: #f8f9ff; }
    .ai-health-avatar {
      width: 32px; height: 32px; border-radius: 9px;
      background: linear-gradient(135deg, #6366f1, #a855f7);
      color: white; font-size: 0.65rem; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .ai-health-name { flex: 1; font-size: 0.82rem; font-weight: 600; color: #111827; }
    .ai-health-learners { font-size: 0.72rem; color: #6b7280; }
    .ai-health-bar-wrap {
      width: 80px; height: 6px; background: #f3f4f6;
      border-radius: 99px; overflow: hidden;
    }
    .ai-health-bar {
      height: 100%; border-radius: 99px;
      transition: width 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .ai-health-score {
      font-size: 0.72rem; font-weight: 700; width: 28px; text-align: right;
    }
    .score-green  { color: #10b981; }
    .score-amber  { color: #f59e0b; }
    .score-red    { color: #ef4444; }
    .bar-green    { background: linear-gradient(90deg, #10b981, #34d399); }
    .bar-amber    { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
    .bar-red      { background: linear-gradient(90deg, #ef4444, #f87171); }

    /* Reco list */
    .ai-reco-list { padding: 0.75rem 1.25rem; }
    .ai-reco-item {
      display: flex; gap: 0.75rem; align-items: flex-start;
      padding: 0.75rem;
      margin-bottom: 0.5rem;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.18s ease;
    }
    .ai-reco-item[onclick] { cursor: pointer; }
    .ai-reco-item.reco-high   { background: rgba(239,68,68,0.05);  border-color: rgba(239,68,68,0.15); }
    .ai-reco-item.reco-medium { background: rgba(245,158,11,0.05); border-color: rgba(245,158,11,0.15); }
    .ai-reco-item.reco-low    { background: rgba(99,102,241,0.05); border-color: rgba(99,102,241,0.15); }
    .ai-reco-item.reco-high[onclick]:hover   { background: rgba(239,68,68,0.10);  border-color: rgba(239,68,68,0.35);  transform: translateY(-1px); box-shadow: 0 4px 12px rgba(239,68,68,0.12); }
    .ai-reco-item.reco-medium[onclick]:hover { background: rgba(245,158,11,0.10); border-color: rgba(245,158,11,0.35); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(245,158,11,0.12); }
    .ai-reco-item.reco-low[onclick]:hover    { background: rgba(99,102,241,0.10); border-color: rgba(99,102,241,0.35); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.12); }
    .ai-reco-icon { font-size: 1rem; flex-shrink: 0; margin-top: 1px; }
    .ai-reco-body { flex: 1; }
    .ai-reco-title { font-size: 0.82rem; font-weight: 700; color: #111827; margin-bottom: 0.2rem; }
    .ai-reco-desc  { font-size: 0.75rem; color: #6b7280; line-height: 1.45; }

    /* Empty state */
    .ai-empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0.75rem;
      padding: 2.5rem 1.5rem; color: #9ca3af; text-align: center;
    }
    .ai-empty-state i { font-size: 2rem; opacity: 0.4; }
    .ai-empty-state p { font-size: 0.82rem; margin: 0; }

    /* AI loading pulse */
    .ai-thinking {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 1rem 1.25rem; color: #6366f1; font-size: 0.82rem; font-weight: 600;
    }
    .ai-thinking-dots span {
      display: inline-block; width: 6px; height: 6px;
      background: #6366f1; border-radius: 50%;
      animation: thinkDot 1.2s ease-in-out infinite;
    }
    .ai-thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
    .ai-thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes thinkDot {
      0%, 80%, 100% { transform: scale(0.5); opacity: 0.4; }
      40%           { transform: scale(1.1); opacity: 1; }
    }

    /* Dark mode overrides for AI dashboard */
    body.dark-mode .ai-kpi-card,
    body.dark-mode .ai-insight-card,
    body.dark-mode .ai-chart-card,
    body.dark-mode .ai-health-card,
    body.dark-mode .ai-reco-card {
      background: #1a1a35 !important;
      border-color: rgba(255,255,255,0.07) !important;
    }
    body.dark-mode .ai-card-header  { border-color: rgba(255,255,255,0.06) !important; }
    body.dark-mode .ai-card-title   { color: #ffffff !important; }
    body.dark-mode .ai-kpi-value    { color: #ffffff !important; }
    body.dark-mode .ai-kpi-label    { color: rgba(255,255,255,0.45) !important; }
    body.dark-mode .ai-insight-text { color: rgba(255,255,255,0.78) !important; }
    body.dark-mode .ai-insight-text strong { color: #ffffff !important; }
    body.dark-mode .ai-insight-item { border-color: rgba(255,255,255,0.06) !important; }
    body.dark-mode .ai-health-name  { color: #ffffff !important; }
    body.dark-mode .ai-health-row:hover { background: rgba(99,102,241,0.08) !important; }
    body.dark-mode .ai-health-bar-wrap { background: rgba(255,255,255,0.08) !important; }
    body.dark-mode .ai-reco-title   { color: #ffffff !important; }
    body.dark-mode .ai-reco-desc    { color: rgba(255,255,255,0.55) !important; }
    body.dark-mode .ai-empty-state  { color: rgba(255,255,255,0.3) !important; }

    /* Responsive */
    @media (max-width: 1200px) {
      .ai-kpi-row { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .ai-dashboard-grid { grid-template-columns: 1fr; }
      .ai-kpi-row { grid-template-columns: repeat(2, 1fr); }
    }

    /* ── Persona Card Grid (search results) ───────────── */
    #personaCardsGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1rem;
