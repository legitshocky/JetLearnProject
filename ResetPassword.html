<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Your Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #f7fafc;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    .reset-container {
      background-color: white;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.06);
      width: 90%;
      max-width: 400px;
      text-align: center;
    }
    h1 {
      color: #2d3748;
      font-size: 1.5rem;
      margin-bottom: 1rem;
    }
    .form-group {
      margin-bottom: 1.5rem;
      text-align: left;
    }
    .form-label {
      display: block;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: #4a5568;
    }
    .form-control {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-family: inherit;
      box-sizing: border-box;
    }
    .btn {
      width: 100%;
      padding: 0.875rem;
      border-radius: 8px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      background-color: #4a3c8a;
      color: white;
      font-size: 1rem;
      transition: background-color 0.3s ease;
    }
    .btn:disabled {
        background-color: #a59cc9;
        cursor: not-allowed;
    }
    #message {
      margin-top: 1rem;
      font-weight: 500;
      min-height: 20px;
    }
    .success { color: #4caf50; }
    .error { color: #f44336; }
  </style>
</head>
<body>
  <div class="reset-container">
    <h1>Set a New Password</h1>
    <form id="resetPasswordForm">
      <!-- The token from the URL is injected here by the doGet function in code.js -->
      <input type="hidden" id="resetToken" value="<?= token ?>">
      
      <div class="form-group">
        <label for="newPassword" class="form-label">New Password</label>
        <input type="password" id="newPassword" class="form-control" required placeholder="Enter your new password">
      </div>
      
      <div class="form-group">
        <label for="confirmPassword" class="form-label">Confirm New Password</label>
        <input type="password" id="confirmPassword" class="form-control" required placeholder="Confirm your new password">
      </div>
      
      <button type="submit" class="btn">Reset Password</button>
    </form>
    <p id="message"></p>
  </div>

  <script>
    const form = document.getElementById('resetPasswordForm');
    const messageEl = document.getElementById('message');
    const submitButton = form.querySelector('button');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      
      const token = document.getElementById('resetToken').value;
      const newPassword = document.getElementById('newPassword').value;
      const confirmPassword = document.getElementById('confirmPassword').value;
      
      // --- Client-side Validation ---
      if (!token) {
        messageEl.textContent = 'Error: No reset token found. Please use the link from your email again.';
        messageEl.className = 'error';
        return;
      }

      if (newPassword.length < 6) {
        messageEl.textContent = 'Password must be at least 6 characters long.';
        messageEl.className = 'error';
        return;
      }

      if (newPassword !== confirmPassword) {
        messageEl.textContent = 'Passwords do not match. Please try again.';
        messageEl.className = 'error';
        return;
      }
      
      // --- UI Feedback and Backend Call ---
      messageEl.textContent = 'Processing...';
      messageEl.className = '';
      submitButton.disabled = true;

      google.script.run
        .withSuccessHandler(result => {
          if (result && result.success) {
            messageEl.textContent = result.message + ' You may now close this window.';
            messageEl.className = 'success';
            form.style.display = 'none'; // Hide the form on success
          } else {
            messageEl.textContent = (result && result.message) ? result.message : 'An unknown error occurred.';
            messageEl.className = 'error';
            submitButton.disabled = false;
          }
        })
        .withFailureHandler(error => {
          messageEl.textContent = 'An error occurred: ' + error.message;
          messageEl.className = 'error';
          submitButton.disabled = false;
        })
        .resetPassword(token, newPassword);
    });
  </script>
</body>
</html>
